<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Delay Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-raised: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --accent: #ff6b35;
    --accent-glow: rgba(255, 107, 53, 0.15);
    --accent-secondary: #ffd166;
    --cyan: #4ecdc4;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255, 107, 53, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(78, 205, 196, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 209, 102, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 24px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header .label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
  }

  header h1 span {
    color: var(--accent);
  }

  .bpm-input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }

  .bpm-input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .bpm-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .bpm-row label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .bpm-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--surface-raised);
    outline: none;
    cursor: pointer;
  }

  .bpm-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 16px rgba(255, 107, 53, 0.4);
    cursor: grab;
    transition: transform 0.15s ease;
  }

  .bpm-row input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  .bpm-value-box {
    position: relative;
  }

  .bpm-value-box input[type="number"] {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    background: transparent;
    border: none;
    outline: none;
    width: 110px;
    text-align: right;
    -moz-appearance: textfield;
  }

  .bpm-value-box input[type="number"]::-webkit-outer-spin-button,
  .bpm-value-box input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  .bpm-value-box .unit {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    position: absolute;
    right: 2px;
    bottom: -2px;
  }

  /* Pulse indicator */
  .pulse-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .pulse-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse var(--pulse-speed, 0.353s) ease-in-out infinite;
  }

  .pulse-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px rgba(255, 107, 53, 0.6); }
  }

  /* Results grid */
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.35s forwards;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s ease, transform 0.2s ease;
    cursor: default;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card.highlighted {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--surface), rgba(255, 107, 53, 0.05));
  }

  .card.highlighted::after {
    content: '●';
    position: absolute;
    top: 12px;
    right: 14px;
    color: var(--accent);
    font-size: 8px;
  }

  .card .note-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card .note-symbol {
    font-size: 16px;
    color: var(--accent-secondary);
    opacity: 0.7;
  }

  .card .ms-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .card .ms-value .unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .card .hz-value {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cyan);
    margin-top: 6px;
    opacity: 0.7;
  }

  /* Dotted & Triplet toggle */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
  }

  .toggle-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .toggle-btn:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Footer formula */
  .formula {
    text-align: center;
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.45s forwards;
  }

  .formula span { color: var(--accent-secondary); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 540px) {
    .results { grid-template-columns: 1fr; }
    .bpm-row { flex-wrap: wrap; }
    .bpm-value-box input[type="number"] { font-size: 26px; width: 90px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="label">Music Production Tool</div>
    <h1>BPM <span>Delay</span> Calculator</h1>
  </header>

  <div class="bpm-input-area">
    <div class="bpm-row">
      <label>Tempo</label>
      <input type="range" id="bpmSlider" min="20" max="300" value="170">
      <div class="bpm-value-box">
        <input type="number" id="bpmInput" min="20" max="300" value="170">
        <span class="unit">bpm</span>
      </div>
    </div>
    <div class="pulse-row">
      <div class="pulse-dot" id="pulseDot"></div>
      <span class="pulse-label" id="pulseLabel">Quarter-note pulse</span>
    </div>
  </div>

  <div class="toggle-row">
    <button class="toggle-btn active" data-mode="normal">Normal</button>
    <button class="toggle-btn" data-mode="dotted">Dotted</button>
    <button class="toggle-btn" data-mode="triplet">Triplet</button>
  </div>

  <div class="results" id="results"></div>

  <div class="formula">
    Formula: <span>60,000 ÷ BPM</span> = ms per quarter note
  </div>
</div>

<script>
const notes = [
  { name: '1/1',    label: 'Whole',           multiplier: 4,    symbol: '𝅝' },
  { name: '1/2',    label: 'Half',            multiplier: 2,    symbol: '𝅗𝅥' },
  { name: '1/4',    label: 'Quarter',         multiplier: 1,    symbol: '♩' },
  { name: '1/8',    label: 'Eighth',          multiplier: 0.5,  symbol: '♪' },
  { name: '1/16',   label: 'Sixteenth',       multiplier: 0.25, symbol: '𝅘𝅥𝅯' },
  { name: '1/32',   label: 'Thirty-second',   multiplier: 0.125,symbol: '𝅘𝅥𝅰' },
];

const slider = document.getElementById('bpmSlider');
const input = document.getElementById('bpmInput');
const resultsEl = document.getElementById('results');
const pulseDot = document.getElementById('pulseDot');
let currentMode = 'normal';

function getModeMultiplier(mode) {
  if (mode === 'dotted') return 1.5;
  if (mode === 'triplet') return 2 / 3;
  return 1;
}

function calculate() {
  const bpm = parseFloat(input.value) || 120;
  const quarterMs = 60000 / bpm;
  const modeMul = getModeMultiplier(currentMode);

  // Update pulse animation speed
  const pulseSpeed = (quarterMs / 1000) + 's';
  pulseDot.style.setProperty('--pulse-speed', pulseSpeed);

  resultsEl.innerHTML = '';
  notes.forEach(note => {
    const ms = quarterMs * note.multiplier * modeMul;
    const hz = 1000 / ms;
    const isQuarter = note.name === '1/4' && currentMode === 'normal';

    const card = document.createElement('div');
    card.className = 'card' + (isQuarter ? ' highlighted' : '');
    card.innerHTML = `
      <div class="note-name">
        <span class="note-symbol">${note.symbol}</span>
        ${note.name} — ${note.label}${currentMode !== 'normal' ? ' ' + currentMode : ''}
      </div>
      <div class="ms-value">${ms < 10 ? ms.toFixed(2) : ms < 100 ? ms.toFixed(1) : ms.toFixed(1)}<span class="unit">ms</span></div>
      <div class="hz-value">${hz.toFixed(2)} Hz</div>
    `;
    resultsEl.appendChild(card);
  });
}

slider.addEventListener('input', () => {
  input.value = slider.value;
  calculate();
});

input.addEventListener('input', () => {
  let v = parseFloat(input.value);
  if (v < 20) v = 20;
  if (v > 300) v = 300;
  slider.value = v;
  calculate();
});

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    calculate();
  });
});

calculate();
</script>

</body>
</html>
