// DJ_DRAW routing map
const DJ_DRAW = {
  deadmau5: drawDeadmau5,
  skrillex: drawSkrillex,
  marshmello: drawMarshmello,
  daftpunk: drawDaftPunk,
  tiesto: drawTiesto,
  subtronics: drawSubtronics,
  avicii: drawAvicii,
  excision: drawExcision,
  zedd: drawZedd,
  aphextwin: drawAphexTwin,
  calvinharris: drawCalvinHarris,
  rezz: drawRezz,
};

function renderPlayer(p) {
  if (p.state === 'dead') return;
  if (p.state === 'respawning' && p.stateTimer % 6 < 3) return;

  const pos = worldToScreen(p.x, p.y);
  const z = state.camera.zoom;
  const w = p.w * z, h = p.h * z;
  const color = p.useAltColor ? p.def.altColor : p.def.color;
  const outline = p.useAltColor ? p.def.altOutline : p.def.outlineColor;
  let bodyColor = p.state === 'hitstun' ? '#ffffff' : p.state === 'grabbed' ? '#ffaaaa' : color;

  // Startup flash: white flash on last 2 startup frames before active
  if (p.state === 'attack' && p.attackData) {
    const framesUntilActive = p.attackData.startup - p.attackFrame;
    if (framesUntilActive > 0 && framesUntilActive <= 2) {
      bodyColor = framesUntilActive === 1 ? '#ffffff' : '#ffddaa';
    }
  }

  // Tumble spin visual
  if (p.tumbling && p.state === 'hitstun') {
    bodyColor = state.frameCount % 4 < 2 ? '#ff6666' : '#ffffff';
  }

  // Draw tumble afterimage ghosts
  if (p.afterimages && p.afterimages.length > 0) {
    for (const ai of p.afterimages) {
      const aiPos = worldToScreen(ai.x, ai.y);
      ctx.save();
      ctx.translate(aiPos.x, aiPos.y - h / 2);
      ctx.globalAlpha = ai.alpha;
      ctx.scale(p.squish.sx, p.squish.sy);
      ctx.scale(ai.facing, 1);
      const drawFn = DJ_DRAW[p.fighterKey];
      if (drawFn) drawFn(ctx, p, w, h, z, color, outline, bodyColor);
      ctx.restore();
    }
  }

  // Draw dodge trail ghosts
  if (p.dodgeTrail && p.dodgeTrail.length > 0) {
    for (const trail of p.dodgeTrail) {
      const trailPos = worldToScreen(trail.x, trail.y);
      ctx.save();
      ctx.translate(trailPos.x, trailPos.y - h / 2);
      ctx.globalAlpha = trail.alpha;
      ctx.scale(p.squish.sx, p.squish.sy);
      ctx.scale(p.facing, 1);
      const drawFn = DJ_DRAW[p.fighterKey];
      if (drawFn) drawFn(ctx, p, w, h, z, color, outline, bodyColor);
      ctx.restore();
    }
  }

  ctx.save();
  ctx.translate(pos.x, pos.y - h / 2);
  ctx.scale(p.squish.sx, p.squish.sy);

  // Idle breathing
  if (p.state === 'idle' && !p.onLedge) {
    const breathe = Math.sin(state.frameCount * 0.05) * 1.5;
    ctx.translate(0, breathe);
  }

  // Ledge hang: bob slightly
  if (p.onLedge) {
    const ledgeBob = Math.sin(state.frameCount * 0.08) * 2;
    ctx.translate(0, ledgeBob);
  }

  if (p.invincible > 0 && p.invincible % 8 < 4) ctx.globalAlpha = 0.6;
  if (p.state === 'dodge' || p.state === 'spotdodge' || p.state === 'airdodge') ctx.globalAlpha = 0.4;

  // Character rim glow — makes fighters pop against dark backgrounds
  const glowColor = color;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 12 * z;

  // Flip for facing
  ctx.scale(p.facing, 1);

  const drawFn = DJ_DRAW[p.fighterKey];
  if (drawFn) drawFn(ctx, p, w, h, z, color, outline, bodyColor);

  // Active hitbox glow (attack frames)
  if (p.state === 'attack' && p.attackData) {
    const atk = p.attackData, frame = p.attackFrame;
    if (frame >= atk.startup && frame < atk.startup + atk.active) {
      const hb = atk.hitbox;
      ctx.fillStyle = 'rgba(255, 100, 0, 0.25)';
      ctx.fillRect(hb.ox * z - hb.w * z / 2, hb.oy * z - hb.h * z / 2, hb.w * z, hb.h * z);
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.globalAlpha = 1;

  // Hitbox overlay (training mode or option)
  if (options.showHitboxes || state.matchType === 'training') {
    renderHitboxOverlay(p);
  }

  // Name tag with bg
  const label = p.controlType === 'cpu' ? `CPU${p.cpuLevel}` : `P${p.idx + 1}`;
  const tagW = ctx.measureText(label).width || 30;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(pos.x - tagW / 2 - 6, pos.y - h - 18, tagW + 12, 16);
  ctx.fillStyle = color; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
  ctx.fillText(label, pos.x, pos.y - h - 6);

  // Damage % with text shadow
  const dmgColor = p.damage < 50 ? '#fff' : p.damage < 100 ? '#ffcc00' : '#ff4400';
  ctx.fillStyle = '#000'; ctx.font = 'bold 18px monospace';
  ctx.fillText(`${Math.floor(p.damage)}%`, pos.x + 1, pos.y - h - 23);
  ctx.fillStyle = dmgColor;
  ctx.fillText(`${Math.floor(p.damage)}%`, pos.x, pos.y - h - 24);
}

function renderHitboxOverlay(p) {
  const z = state.camera.zoom;
  // Hurtbox (green)
  const hpos = worldToScreen(p.x - p.w / 2, p.y - p.h);
  ctx.strokeStyle = 'rgba(0,255,0,0.4)'; ctx.lineWidth = 1;
  ctx.strokeRect(hpos.x, hpos.y, p.w * z, p.h * z);

  // Active hitbox (red)
  if (p.state === 'attack' && p.attackData) {
    const atk = p.attackData, frame = p.attackFrame;
    if (frame >= atk.startup && frame < atk.startup + atk.active) {
      const hb = atk.hitbox;
      const hx = p.x + hb.ox * p.facing, hy = p.y - p.h / 2 + hb.oy;
      const spos = worldToScreen(hx - hb.w / 2, hy - hb.h / 2);
      ctx.strokeStyle = 'rgba(255,0,0,0.6)'; ctx.lineWidth = 2;
      ctx.strokeRect(spos.x, spos.y, hb.w * z, hb.h * z);
    }
  }
}

function renderHUD() {
  const hudY = BASE_H - 50;

  // Timer (time match)
  if (state.matchType === 'time') {
    const mins = Math.floor(state.timeRemaining / 60);
    const secs = Math.floor(state.timeRemaining % 60);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, BASE_W / 2, 35);
  }

  for (let i = 0; i < state.players.length; i++) {
    const p = state.players[i];
    const hx = i === 0 ? 120 : BASE_W - 120;
    const color = p.useAltColor ? p.def.altColor : p.def.color;

    // HUD panel with gradient bg
    const panelW = 180, panelH = 52;
    const grd = ctx.createLinearGradient(hx - panelW / 2, hudY - 20, hx - panelW / 2, hudY + panelH - 20);
    grd.addColorStop(0, 'rgba(0,0,0,0.75)');
    grd.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = grd;
    ctx.fillRect(hx - panelW / 2, hudY - 20, panelW, panelH);
    // Color accent bar at top
    ctx.fillStyle = color;
    ctx.fillRect(hx - panelW / 2, hudY - 20, panelW, 3);
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    ctx.strokeRect(hx - panelW / 2, hudY - 20, panelW, panelH);

    // Name
    ctx.fillStyle = color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.def.name.toUpperCase(), hx, hudY - 2);

    // Damage %
    const dmgColor = p.damage < 50 ? '#fff' : p.damage < 100 ? '#ffcc00' : '#ff4400';
    ctx.fillStyle = '#000'; ctx.font = 'bold 22px monospace';
    ctx.fillText(`${Math.floor(p.damage)}%`, hx + 1, hudY + 23);
    ctx.fillStyle = dmgColor;
    ctx.fillText(`${Math.floor(p.damage)}%`, hx, hudY + 22);

    // Stocks or score
    if (state.matchType === 'time') {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace';
      ctx.fillText(`Score: ${p.score}`, hx, hudY - 32);
    } else {
      for (let s = 0; s < p.stocks; s++) {
        ctx.fillStyle = color; ctx.beginPath();
        ctx.arc(hx - 30 + s * 18, hudY - 30, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
      }
    }
  }

  if (state.tourState.active) renderTourHUD();

  // Training mode HUD
  if (state.matchType === 'training') renderTrainingHUD();
}

function renderTourHUD() {
  const run = getTourRun(state.tourState.runId);
  const leg = getActiveTourLeg();
  if (!run || !leg) return;
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(BASE_W / 2 - 175, 6, 350, 46);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(BASE_W / 2 - 175, 6, 350, 46);
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${run.name.toUpperCase()}  LEG ${state.tourState.currentLegIndex + 1}/${run.legs.length}`, BASE_W / 2, 22);
  ctx.fillStyle = '#ddd';
  ctx.font = '11px monospace';
  const twist = leg.ruleTwist ? `  |  ${leg.ruleTwist}` : '';
  ctx.fillText(`VS ${FIGHTER_DEFS[leg.opponent].name.toUpperCase()}  |  CPU ${leg.cpuLevel}${twist}`, BASE_W / 2, 38);
}

function renderTrainingHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(BASE_W - 200, 5, 195, 100);
  ctx.fillStyle = '#aaa'; ctx.font = '11px monospace'; ctx.textAlign = 'left';
  ctx.fillText('TRAINING MODE', BASE_W - 190, 20);
  ctx.fillText('H: Toggle hitboxes', BASE_W - 190, 35);
  ctx.fillText('R: Reset damage', BASE_W - 190, 50);
  ctx.fillText(`Hitboxes: ${options.showHitboxes ? 'ON' : 'OFF'}`, BASE_W - 190, 65);

  // Show frame data for attacking player
  for (const p of state.players) {
    if (p.state === 'attack' && p.attackData) {
      const atk = p.attackData;
      ctx.fillText(`S:${atk.startup} A:${atk.active} E:${atk.endlag} F:${p.attackFrame}`, BASE_W - 190, 80);
      ctx.fillText(`DMG:${atk.damage} KB:${atk.kbBase}+${atk.kbScale}`, BASE_W - 190, 95);
      break;
    }
  }
}

// --- Menu Screens ---
function renderTitle() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Title gradient text
  const grad = ctx.createLinearGradient(BASE_W/2 - 200, 0, BASE_W/2 + 200, 0);
  grad.addColorStop(0, '#FF2D6B'); grad.addColorStop(0.5, '#B429F9'); grad.addColorStop(1, '#00F0FF');
  ctx.fillStyle = grad; ctx.font = 'bold 72px monospace'; ctx.textAlign = 'center';
  ctx.fillText('MIXMASH', BASE_W / 2, BASE_H / 3);
  ctx.fillStyle = '#888'; ctx.font = '18px monospace';
  ctx.fillText('Drop the Beat. Throw the Punch.', BASE_W / 2, BASE_H / 3 + 40);

  ctx.fillStyle = '#aaa'; ctx.font = '16px monospace';
  const y0 = BASE_H / 2 + 20;
  ctx.fillText('Press ENTER to start', BASE_W / 2, y0);
  ctx.fillStyle = '#666'; ctx.font = '14px monospace';
  ctx.fillText('O = Options  |  F = Fullscreen', BASE_W / 2, y0 + 40);
}

function drawStatBar(x, y, w, label, value, maxVal, color) {
  const pct = Math.min(1, value / maxVal);
  ctx.fillStyle = '#222'; ctx.fillRect(x, y, w, 10);
  ctx.fillStyle = color; ctx.fillRect(x, y, w * pct, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(x, y, w * pct, 4);
  ctx.fillStyle = '#aaa'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText(label, x, y - 3);
}

function drawSpeedLines(x, y, w, h, color, frame) {
  ctx.save(); ctx.globalAlpha = 0.06;
  ctx.fillStyle = color;
  for (let i = 0; i < 12; i++) {
    const ly = y + ((i * 47 + frame * 2) % (h + 20)) - 10;
    const lw = 40 + (i * 17) % 60;
    ctx.fillRect(x + (i % 2) * 30, ly, lw, 2);
  }
  ctx.restore();
}

function renderCharSelect() {
  const t = state.frameCount;
  // Dark background
  ctx.fillStyle = '#08081a'; ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Split screen — P1 side blue tint, P2 side red tint
  const halfW = BASE_W / 2;
  // P1 territory
  const grd1 = ctx.createLinearGradient(0, 0, halfW, 0);
  grd1.addColorStop(0, 'rgba(30,50,100,0.15)');
  grd1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd1; ctx.fillRect(0, 0, halfW, BASE_H);
  // P2 territory
  const grd2 = ctx.createLinearGradient(halfW, 0, BASE_W, 0);
  grd2.addColorStop(0, 'rgba(0,0,0,0)');
  grd2.addColorStop(1, 'rgba(100,30,30,0.15)');
  ctx.fillStyle = grd2; ctx.fillRect(halfW, 0, halfW, BASE_H);

  // Speed lines behind each side
  drawSpeedLines(0, 0, halfW, BASE_H, '#4488ff', t);
  drawSpeedLines(halfW, 0, halfW, BASE_H, '#ff4444', t);

  // Center divider — VS spark
  ctx.fillStyle = '#ff6600';
  ctx.save();
  ctx.translate(halfW, BASE_H / 2 - 30);
  ctx.rotate(Math.PI / 4);
  const vsSize = 20 + Math.sin(t * 0.08) * 3;
  ctx.fillRect(-vsSize, -vsSize, vsSize * 2, vsSize * 2);
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
  ctx.fillText('VS', halfW, BASE_H / 2 - 25);
  // Divider line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(halfW, 0); ctx.lineTo(halfW, BASE_H); ctx.stroke();

  // Title
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT FIGHTER', BASE_W / 2, 35);

  // Draw each player's side
  for (let ci = 0; ci < 2; ci++) {
    const cur = state.charSelectCursors[ci];
    const fighterKey = FIGHTER_KEYS[cur.pos];
    const def = FIGHTER_DEFS[fighterKey];
    const sideX = ci === 0 ? 0 : halfW;
    const centerX = sideX + halfW / 2;
    const curColor = ci === 0 ? '#4488ff' : '#ff4444';

    // Character preview — large scale
    const scale = 2.2;
    ctx.save();
    ctx.translate(centerX, BASE_H / 2 + 20);
    ctx.scale(ci === 0 ? 1 : -1, 1);
    const previewP = { facing: ci === 0 ? 1 : -1, state: 'idle', fighterKey, attackData: null, attackFrame: 0, squish: { sx: 1, sy: 1 }, shieldHP: 100, w: def.w, h: def.h, useAltColor: false, def: def };
    const drawFn = DJ_DRAW[fighterKey];
    if (drawFn) drawFn(ctx, previewP, def.w * scale, def.h * scale, scale, def.color, def.outlineColor, def.color);
    ctx.restore();

    // Confirmed flash
    if (cur.confirmed) {
      ctx.fillStyle = `rgba(68,255,68,${0.05 + Math.sin(t * 0.1) * 0.03})`;
      ctx.fillRect(sideX, 0, halfW, BASE_H);
    }

    // Name banner (angled trapezoid)
    const bannerY = BASE_H - 160;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.moveTo(sideX + 20, bannerY);
    ctx.lineTo(sideX + halfW - 20, bannerY - 8);
    ctx.lineTo(sideX + halfW - 20, bannerY + 55);
    ctx.lineTo(sideX + 20, bannerY + 55);
    ctx.fill();
    // Banner accent line
    ctx.fillStyle = curColor;
    ctx.fillRect(sideX + 20, bannerY + (ci === 0 ? 0 : -8), halfW - 40, 3);

    // Fighter name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
    ctx.fillText(def.name.toUpperCase(), centerX, bannerY + 28);
    // Description
    ctx.fillStyle = '#999'; ctx.font = '11px monospace';
    ctx.fillText(def.desc || '', centerX, bannerY + 45);

    // Stat bars
    const barX = sideX + 40, barW = halfW - 80;
    const barY = BASE_H - 90;
    drawStatBar(barX, barY, barW, 'WEIGHT', def.weight, 1.5, '#6688cc');
    drawStatBar(barX, barY + 22, barW, 'SPEED', def.walkSpeed, 600, '#66cc66');
    drawStatBar(barX, barY + 44, barW, 'POWER', def.attacks.forward.damage, 20, '#cc6644');

    // Player label / CPU badge
    const labelY = 60;
    if (cur.cpu) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(centerX - 50, labelY - 12, 100, 24);
      ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
      const stars = cur.cpuLevel === 1 ? '\u2605' : cur.cpuLevel === 3 ? '\u2605\u2605\u2605' : '\u2605\u2605\u2605\u2605\u2605';
      ctx.fillText(`CPU ${stars}`, centerX, labelY + 5);
    } else {
      ctx.fillStyle = curColor; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`PLAYER ${ci + 1}`, centerX, labelY + 5);
    }

    // Pulsing cursor border around the whole side
    if (!cur.confirmed) {
      const pulse = Math.sin(t * 0.06) * 0.3 + 0.7;
      ctx.strokeStyle = curColor; ctx.globalAlpha = pulse; ctx.lineWidth = 3;
      ctx.strokeRect(sideX + 5, 50, halfW - 10, BASE_H - 60);
      ctx.globalAlpha = 1;
    }

    // Fighter selection arrows
    if (!cur.confirmed && FIGHTER_KEYS.length > 1) {
      ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(t * 0.08) * 0.15})`;
      ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
      ctx.fillText('\u25C4', sideX + 30, BASE_H / 2 - 20);
      ctx.fillText('\u25BA', sideX + halfW - 30, BASE_H / 2 - 20);
    }
  }

  // Controls
  ctx.fillStyle = '#555'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('P1: A/D select, J/Space confirm, W/S CPU  |  P2: Arrows, . or Num1 confirm, Up/Down CPU  |  ESC Back', BASE_W / 2, BASE_H - 8);
}

function renderStageSelect() {
  // Selected stage as full background
  const selStage = STAGES[STAGE_KEYS[state.stageCursor]];
  ctx.fillStyle = selStage.bg; ctx.fillRect(0, 0, BASE_W, BASE_H);
  // Render parallax for selected stage (fake camera at 0,0)
  const savedCam = { ...state.camera };
  state.camera = { x: 0, y: 100, zoom: 1 };
  renderParallaxBG(selStage);
  state.camera = savedCam;
  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, BASE_W, BASE_H);

  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT STAGE', BASE_W / 2, 50);

  const cellW = 160, cellH = 90, gapX = 18, gapY = 42;
  const cols = 3;
  const rows = Math.ceil(STAGE_KEYS.length / cols);
  const totalW = cols * cellW + (cols - 1) * gapX;
  const totalH = rows * cellH + (rows - 1) * gapY;
  const startX = (BASE_W - totalW) / 2;
  const startY = 75;

  for (let i = 0; i < STAGE_KEYS.length; i++) {
    const stg = STAGES[STAGE_KEYS[i]];
    const row = Math.floor(i / cols);
    const col = i % cols;
    const x = startX + col * (cellW + gapX);
    const y = startY + row * (cellH + gapY);
    const selected = state.stageCursor === i;

    // Card background with stage color
    ctx.fillStyle = stg.bg; ctx.fillRect(x, y, cellW, cellH);

    // Mini parallax preview
    ctx.save();
    ctx.beginPath(); ctx.rect(x, y, cellW, cellH); ctx.clip();
    const fakeCamera = state.camera;
    state.camera = { x: 0, y: 80, zoom: 0.5 };
    // Draw just stars for thumbnail
    for (const layer of (stg.bgLayers || [])) {
      if (layer.shapes === 'stars') {
        const seed = (layer.parallax || 0.1) * 1000;
        ctx.fillStyle = '#fff';
        for (let s = 0; s < 15; s++) {
          ctx.globalAlpha = 0.3;
          ctx.fillRect(x + (seed + s * 73) % cellW, y + (seed + s * 47) % cellH, 1, 1);
        }
        ctx.globalAlpha = 1;
      } else if (layer.shapes === 'sunset') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#1a0a2e'); grd.addColorStop(0.5, '#cc5533'); grd.addColorStop(1, '#ffaa44');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'torchglow') {
        const grd = ctx.createLinearGradient(x, y + cellH, x, y + cellH * 0.5);
        grd.addColorStop(0, 'rgba(180,80,20,0.2)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'nebula') {
        const grd = ctx.createRadialGradient(x + cellW * 0.4, y + cellH * 0.4, 10, x + cellW * 0.4, y + cellH * 0.4, 80);
        grd.addColorStop(0, 'rgba(100,40,150,0.2)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'ledwall') {
        ctx.fillStyle = 'rgba(18,24,44,0.92)';
        ctx.fillRect(x + 18, y + 24, cellW - 36, cellH - 42);
        for (let b = 0; b < 9; b++) {
          const barX = x + 28 + b * 18;
          const barH = 14 + (b % 3) * 18;
          ctx.fillStyle = b % 2 === 0 ? 'rgba(255,86,176,0.28)' : 'rgba(82,226,255,0.26)';
          ctx.fillRect(barX, y + cellH - 24 - barH, 10, barH);
        }
      } else if (layer.shapes === 'lasergrid') {
        ctx.strokeStyle = 'rgba(82,226,255,0.24)';
        ctx.lineWidth = 2;
        for (let l = 0; l < 4; l++) {
          ctx.beginPath();
          ctx.moveTo(x + 24 + l * 48, y + cellH);
          ctx.lineTo(x + 58 + l * 48, y + 16);
          ctx.stroke();
        }
      } else if (layer.shapes === 'crowd') {
        ctx.fillStyle = 'rgba(18,26,42,0.88)';
        ctx.fillRect(x, y + cellH - 24, cellW, 24);
        for (let c = 0; c < 8; c++) {
          ctx.fillStyle = c % 2 === 0 ? 'rgba(255,86,176,0.16)' : 'rgba(82,226,255,0.16)';
          ctx.beginPath();
          ctx.arc(x + 18 + c * 24, y + cellH - 20, 7, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (layer.shapes === 'fairycastle') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, 'rgba(100,60,140,0.3)'); grd.addColorStop(1, 'rgba(150,100,80,0.4)');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(200,160,100,0.3)';
        ctx.fillRect(x + 30, y + 40, 50, 45);
        ctx.beginPath();
        ctx.moveTo(x + 55, y + 40);
        ctx.lineTo(x + 65, y + 25);
        ctx.lineTo(x + 75, y + 40);
        ctx.fill();
      } else if (layer.shapes === 'fireworks') {
        ctx.fillStyle = 'rgba(50,30,80,0.5)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(255,220,100,0.6)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH * 0.3, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,100,200,0.6)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.7, y + cellH * 0.4, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(100,200,255,0.6)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.5, y + cellH * 0.2, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (layer.shapes === 'oceansky') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#0a3a6a'); grd.addColorStop(1, '#2a9aba');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(100,200,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y + cellH * 0.6);
        ctx.lineTo(x + cellW, y + cellH * 0.6);
        ctx.stroke();
      } else if (layer.shapes === 'palmtrees') {
        ctx.fillStyle = 'rgba(10,60,80,0.5)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(x + 10, y + cellH - 20, 4, 20);
        ctx.fillRect(x + cellW - 14, y + cellH - 20, 4, 20);
        ctx.fillStyle = '#3a5a2a';
        for (let j = 0; j < 3; j++) {
          const angle = (j / 3) * Math.PI;
          ctx.beginPath();
          ctx.arc(x + 12, y + cellH - 18, 8 - j * 2, angle, angle + Math.PI / 3);
          ctx.fill();
        }
      } else if (layer.shapes === 'spiderstage') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#050a2a'); grd.addColorStop(1, '#0a1a3a');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(60,120,180,0.4)';
        ctx.fillRect(x + cellW * 0.2, y + cellH * 0.35, cellW * 0.6, cellH * 0.2);
        ctx.strokeStyle = 'rgba(100,180,255,0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 2; i++) {
          ctx.beginPath();
          ctx.moveTo(x + cellW * (0.15 + i * 0.5), y + cellH * 0.55);
          ctx.lineTo(x + cellW * (i * 0.5), y + cellH - 10);
          ctx.stroke();
        }
      } else if (layer.shapes === 'ultralasers') {
        ctx.fillStyle = 'rgba(10,20,40,0.6)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(255,80,100,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + cellW * 0.5, y + cellH);
        ctx.lineTo(x + cellW * 0.3, y);
        ctx.stroke();
      } else if (layer.shapes === 'desertsky') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#5a3a2a'); grd.addColorStop(1, '#ba8a5a');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'theman') {
        ctx.fillStyle = 'rgba(50,30,10,0.6)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(100,50,20,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + cellW * 0.5, y + 10);
        ctx.lineTo(x + cellW * 0.4, y + cellH - 15);
        ctx.lineTo(x + cellW * 0.6, y + cellH - 15);
        ctx.closePath();
        ctx.stroke();
      } else if (layer.shapes === 'dustparticles') {
        ctx.fillStyle = 'rgba(70,50,40,0.7)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(150,100,60,0.4)';
        for (let i = 0; i < 8; i++) {
          ctx.beginPath();
          ctx.arc(x + (i % 4) * cellW * 0.25 + 8, y + (Math.floor(i / 4)) * cellH * 0.5 + 20, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (layer.shapes === 'campfires') {
        ctx.fillStyle = 'rgba(40,20,10,0.7)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(255,120,40,0.4)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH - 10, 5, 0, Math.PI * 2);
        ctx.arc(x + cellW * 0.7, y + cellH - 10, 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (layer.shapes === 'coachellasky') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#4a2a5a'); grd.addColorStop(0.6, '#aa6a9a'); grd.addColorStop(1, '#e8b8a8');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'ferriswheel') {
        ctx.fillStyle = 'rgba(30,60,100,0.6)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(100,150,200,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH * 0.5, 20, 0, Math.PI * 2);
        ctx.stroke();
      } else if (layer.shapes === 'coachellapalms') {
        ctx.fillStyle = 'rgba(50,40,30,0.6)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(x + cellW * 0.2, y + cellH - 20, 3, 20);
        ctx.fillRect(x + cellW * 0.8, y + cellH - 20, 3, 20);
      } else if (layer.shapes === 'artinstalls') {
        ctx.fillStyle = 'rgba(40,50,60,0.6)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(100,150,255,0.3)';
        ctx.beginPath();
        ctx.moveTo(x + cellW * 0.3, y + 10);
        ctx.lineTo(x + cellW * 0.2, y + cellH - 10);
        ctx.lineTo(x + cellW * 0.4, y + cellH - 10);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,100,200,0.3)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.7, y + cellH * 0.5, 12, 0, Math.PI * 2);
        ctx.fill();
      } else if (layer.shapes === 'owlstage') {
        ctx.fillStyle = 'rgba(10,5,20,0.7)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle = 'rgba(40,20,50,0.5)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH * 0.4, 12, 0, Math.PI * 2);
        ctx.arc(x + cellW * 0.7, y + cellH * 0.4, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,200,100,0.4)';
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH * 0.4, 4, 0, Math.PI * 2);
        ctx.arc(x + cellW * 0.7, y + cellH * 0.4, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (layer.shapes === 'neonrides') {
        ctx.fillStyle = 'rgba(5,5,15,0.8)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(100,255,200,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x + cellW * 0.3, y + cellH * 0.5, 15, 0, Math.PI * 2);
        ctx.stroke();
      } else if (layer.shapes === 'rainbowlasers') {
        ctx.fillStyle = 'rgba(5,2,10,0.8)';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.strokeStyle = 'rgba(150,100,255,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + cellW * 0.5, y + cellH * 0.5);
        ctx.lineTo(x + cellW, y + cellH * 0.5);
        ctx.stroke();
      }
    }
    state.camera = fakeCamera;

    // Mini platforms
    for (const plat of stg.platforms) {
      const scale = 0.3;
      const px = x + cellW / 2 + plat.x * scale;
      const py = y + cellH / 2 + (plat.y - 100) * scale;
      if (stg.theme === 'cosmic') ctx.fillStyle = plat.type === 'solid' ? '#4cc6de' : '#2e4f76';
      else if (stg.theme === 'sky') ctx.fillStyle = plat.type === 'solid' ? '#8d5d34' : '#73788e';
      else if (stg.theme === 'festival') ctx.fillStyle = plat.type === 'solid' ? '#3dcfff' : '#ff59b0';
      else if (stg.theme === 'tomorrowland') ctx.fillStyle = plat.type === 'solid' ? '#c8a860' : '#9a7d5a';
      else if (stg.theme === 'ultra') ctx.fillStyle = plat.type === 'solid' ? '#00d4ff' : '#1a3a5a';
      else if (stg.theme === 'desert') ctx.fillStyle = plat.type === 'solid' ? '#c8884a' : '#a85830';
      else if (stg.theme === 'coachella') ctx.fillStyle = plat.type === 'solid' ? '#e8c8a8' : '#c8a878';
      else if (stg.theme === 'edc') ctx.fillStyle = plat.type === 'solid' ? '#ff80c0' : '#6040a0';
      else ctx.fillStyle = plat.type === 'solid' ? '#777' : '#666';
      ctx.fillRect(px, py, plat.w * scale, Math.max(2, plat.h * scale));
    }
    ctx.restore();

    // Selection border
    if (selected) {
      const pulse = Math.sin(state.frameCount * 0.06) * 0.3 + 0.7;
      ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.globalAlpha = pulse;
      ctx.strokeRect(x - 4, y - 4, cellW + 8, cellH + 8);
      ctx.globalAlpha = 1;
      // Glow
      ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 15;
      ctx.strokeRect(x - 4, y - 4, cellW + 8, cellH + 8);
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellW, cellH);
    }

    // Stage name
    ctx.fillStyle = selected ? '#fff' : '#aaa';
    ctx.font = `bold ${selected ? 13 : 11}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(stg.name, x + cellW / 2, y + cellH + 16);
  }

  // Navigation arrows
  const midY = startY + totalH / 2;
  ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(state.frameCount * 0.08) * 0.15})`;
  ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
  ctx.fillText('\u25C4', startX - 28, midY);
  ctx.fillText('\u25BA', startX + totalW + 28, midY);

  ctx.fillStyle = '#555'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('W/S or Up/Down to navigate, A/D or Arrows to move, J or Enter to confirm  |  ESC Back', BASE_W / 2, BASE_H - 20);
}

function renderModeSelect() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT MODE', BASE_W / 2, 80);

  for (let i = 0; i < MODE_OPTIONS.length; i++) {
    const y = 150 + i * 74;
    const selected = state.modeCursor === i;
    ctx.fillStyle = selected ? '#2a2a4e' : '#1a1a2e';
    ctx.fillRect(BASE_W / 2 - 200, y, 400, 60);
    if (selected) { ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2; ctx.strokeRect(BASE_W / 2 - 200, y, 400, 60); }
    ctx.fillStyle = selected ? '#fff' : '#888'; ctx.font = 'bold 18px monospace';
    ctx.fillText(MODE_OPTIONS[i].name, BASE_W / 2, y + 25);
    ctx.fillStyle = '#666'; ctx.font = '12px monospace';
    ctx.fillText(MODE_OPTIONS[i].desc, BASE_W / 2, y + 45);
  }

  const selectedMode = MODE_OPTIONS[state.modeCursor];
  if (selectedMode && selectedMode.key === 'tour') {
    const run = getTourRun(selectedMode.runId);
    const saved = tourStorage.activeRun && tourStorage.activeRun.runId === run.id ? tourStorage.activeRun : null;
    const best = tourStorage.bestClears[run.id];
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(BASE_W / 2 - 230, 470, 460, 92);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.strokeRect(BASE_W / 2 - 230, 470, 460, 92);
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(run.name.toUpperCase(), BASE_W / 2, 492);
    ctx.fillStyle = '#bbb';
    ctx.font = '12px monospace';
    ctx.fillText(run.desc, BASE_W / 2, 510);
    if (saved) {
      const savedLeg = getTourLeg(saved.runId, saved.currentLegIndex);
      ctx.fillStyle = '#7dff9d';
      ctx.fillText(`Resume: Leg ${saved.currentLegIndex + 1}/${run.legs.length} vs ${FIGHTER_DEFS[savedLeg.opponent].name}  |  Losses ${saved.losses}`, BASE_W / 2, 530);
    } else {
      ctx.fillStyle = '#7dff9d';
      ctx.fillText(`Fresh run reward: ${run.completionReward}`, BASE_W / 2, 530);
    }
    if (best) {
      ctx.fillStyle = '#aaa';
      ctx.fillText(`Best clear: ${best.medal.toUpperCase()} with ${best.fighter}  |  ${best.losses} losses`, BASE_W / 2, 548);
    } else {
      ctx.fillStyle = '#777';
      ctx.fillText('No clear recorded yet', BASE_W / 2, 548);
    }
  }

  ctx.fillStyle = '#666'; ctx.font = '13px monospace';
  ctx.fillText('W/S or Up/Down to select, J or Enter to confirm  |  ESC = Back', BASE_W / 2, BASE_H - 40);
}

function renderOptions() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('OPTIONS', BASE_W / 2, 60);

  const items = [
    { label: 'Volume', value: `${Math.round(options.volume * 100)}%` },
    { label: 'Show Hitboxes', value: options.showHitboxes ? 'ON' : 'OFF' },
    { label: 'Stage Hazards', value: options.hazardsOn ? 'ON' : 'OFF' },
    { label: 'Music', value: options.musicOn ? 'ON' : 'OFF' },
  ];

  for (let i = 0; i < items.length; i++) {
    const y = 140 + i * 60;
    const selected = state.optionsCursor === i;
    ctx.fillStyle = selected ? '#2a2a4e' : '#1a1a2e';
    ctx.fillRect(BASE_W / 2 - 200, y, 400, 45);
    if (selected) { ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2; ctx.strokeRect(BASE_W / 2 - 200, y, 400, 45); }
    ctx.fillStyle = '#ccc'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
    ctx.fillText(items[i].label, BASE_W / 2 - 180, y + 28);
    ctx.fillStyle = '#ff6600'; ctx.textAlign = 'right';
    ctx.fillText(items[i].value, BASE_W / 2 + 180, y + 28);
  }

  ctx.fillStyle = '#666'; ctx.font = '13px monospace'; ctx.textAlign = 'center';
  ctx.fillText('W/S to navigate, A/D to change, ESC to save & return', BASE_W / 2, BASE_H - 40);
}

function renderResults() {
  if (state.tourState.active) {
    renderTourResults();
    return;
  }
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
  if (state.winner >= 0) {
    const w = state.players[state.winner];
    const color = w.useAltColor ? w.def.altColor : w.def.color;
    ctx.fillStyle = color;
    ctx.fillText(`${w.def.name} WINS!`, BASE_W / 2, BASE_H / 2 - 20);
  } else {
    ctx.fillStyle = '#ff8800';
    ctx.fillText('DRAW!', BASE_W / 2, BASE_H / 2 - 20);
  }
  ctx.fillStyle = '#aaa'; ctx.font = '18px monospace';
  ctx.fillText('ENTER = Rematch  |  ESC = Title', BASE_W / 2, BASE_H / 2 + 40);

  // Confetti
  if (!state.confettiSpawned) { spawnConfetti(); state.confettiSpawned = true; }
}

function renderTourResults() {
  const run = getTourRun(state.tourState.runId);
  const leg = getTourLeg(state.tourState.runId, state.tourState.currentLegIndex);
  const lossState = state.tourState.lastOutcome === 'fail';
  const completeState = state.tourState.lastOutcome === 'complete';

  ctx.fillStyle = 'rgba(0,0,0,0.76)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.textAlign = 'center';

  if (!lossState && !state.confettiSpawned) { spawnConfetti(); state.confettiSpawned = true; }

  if (lossState) {
    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 44px monospace';
    ctx.fillText('TOUR SETBACK', BASE_W / 2, BASE_H / 2 - 92);
  } else if (completeState) {
    ctx.fillStyle = '#ffe36a';
    ctx.font = 'bold 42px monospace';
    ctx.fillText('HEADLINER CLEAR', BASE_W / 2, BASE_H / 2 - 92);
  } else {
    ctx.fillStyle = '#7dff9d';
    ctx.font = 'bold 42px monospace';
    ctx.fillText('LEG CLEARED', BASE_W / 2, BASE_H / 2 - 92);
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px monospace';
  if (lossState) ctx.fillText(`Lost to ${FIGHTER_DEFS[leg.opponent].name.toUpperCase()} on ${STAGES[leg.stage].name.toUpperCase()}`, BASE_W / 2, BASE_H / 2 - 48);
  else if (completeState) ctx.fillText(`${state.p1Fighter.toUpperCase()} conquered ${run.name.toUpperCase()}`, BASE_W / 2, BASE_H / 2 - 48);
  else ctx.fillText(`Beat ${FIGHTER_DEFS[leg.opponent].name.toUpperCase()} at ${STAGES[leg.stage].name.toUpperCase()}`, BASE_W / 2, BASE_H / 2 - 48);

  ctx.fillStyle = '#bbb';
  ctx.font = '15px monospace';
  ctx.fillText(`Leg ${Math.min(state.tourState.completedLegs, run.legs.length)}/${run.legs.length}  |  Losses ${state.tourState.losses}`, BASE_W / 2, BASE_H / 2 - 16);
  if (leg.ruleTwist) ctx.fillText(`Twist: ${leg.ruleTwist}`, BASE_W / 2, BASE_H / 2 + 12);
  if (state.tourState.rewardState) {
    ctx.fillStyle = completeState ? '#ffe36a' : '#7dff9d';
    ctx.fillText(`Reward: ${state.tourState.rewardState}`, BASE_W / 2, BASE_H / 2 + 40);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '18px monospace';
  if (lossState) ctx.fillText('ENTER = Retry Leg  |  ESC = Save & Exit', BASE_W / 2, BASE_H / 2 + 92);
  else if (completeState) ctx.fillText('ENTER = New Run  |  ESC = Title', BASE_W / 2, BASE_H / 2 + 92);
  else ctx.fillText('ENTER = Next Leg  |  ESC = Save & Exit', BASE_W / 2, BASE_H / 2 + 92);

  const best = tourStorage.bestClears[state.tourState.runId];
  if (best) {
    ctx.fillStyle = '#777';
    ctx.font = '12px monospace';
    ctx.fillText(`Best clear: ${best.medal.toUpperCase()} with ${best.fighter} (${best.losses} losses)`, BASE_W / 2, BASE_H / 2 + 122);
  }
}

function renderPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PAUSED', BASE_W / 2, BASE_H / 2);
  ctx.font = '16px monospace';
  ctx.fillText('P to resume  |  ESC for title', BASE_W / 2, BASE_H / 2 + 30);
}

function render() {
  syncMusicState(false);
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  switch (state.mode) {
    case 'title': renderTitle(); return;
    case 'charselect': renderCharSelect(); return;
    case 'stageselect': renderStageSelect(); return;
    case 'modeselect': renderModeSelect(); return;
    case 'options': renderOptions(); return;
    case 'results':
      renderStage(); renderPlatforms();
      for (const p of state.players) renderPlayer(p);
      renderParticles(); renderDamageNumbers(); renderHUD();
      renderResults(); return;
  }

  // Playing / paused / training
  renderStage(); renderPlatforms();
  for (const p of state.players) renderPlayer(p);
  renderParticles(); renderDamageNumbers(); renderHUD();
  if (state.mode === 'paused') renderPaused();
}

// --- Match Start ---
function startMatch(config) {
  const matchConfig = config || {};
  state.matchType = matchConfig.matchType || state.matchType;
  state.selectedStage = matchConfig.stageKey || state.selectedStage || 'battlefield';
  const stageKey = state.selectedStage || 'battlefield';
  currentStage = STAGES[stageKey];
  // Reset moving platform state
  for (const plat of currentStage.platforms) {
    if (plat.moving) { plat._baseX = plat.x; plat._baseY = plat.y; plat._moveTimer = 0; plat._deltaX = 0; }
  }

  const p1Key = (matchConfig.p1Fighter && FIGHTER_DEFS[matchConfig.p1Fighter]) ? matchConfig.p1Fighter : (state.p1Fighter && FIGHTER_DEFS[state.p1Fighter]) ? state.p1Fighter : FIGHTER_KEYS[0];
  const p2Key = (matchConfig.p2Fighter && FIGHTER_DEFS[matchConfig.p2Fighter]) ? matchConfig.p2Fighter : (state.p2Fighter && FIGHTER_DEFS[state.p2Fighter]) ? state.p2Fighter : FIGHTER_KEYS[1] || FIGHTER_KEYS[0];
  const c1 = state.charSelectCursors[0];
  const c2 = state.charSelectCursors[1];
  const mirror = p1Key === p2Key;
  const p1Cpu = matchConfig.p1Cpu !== undefined ? matchConfig.p1Cpu : c1.cpu;
  const p2Cpu = matchConfig.p2Cpu !== undefined ? matchConfig.p2Cpu : c2.cpu;
  const p1CpuLevel = matchConfig.p1CpuLevel || c1.cpuLevel;
  const p2CpuLevel = matchConfig.p2CpuLevel || c2.cpuLevel;
  state.p1Fighter = p1Key;
  state.p2Fighter = p2Key;

  state.players = [
    createPlayer(0, p1Key, currentStage.spawns[0], p1Cpu ? 'cpu' : 'human', p1CpuLevel, false),
    createPlayer(1, p2Key, currentStage.spawns[1], p2Cpu ? 'cpu' : 'human', p2CpuLevel, mirror),
  ];

  // Auto-assign gamepads
  let pads = [];
  try { pads = navigator.getGamepads ? navigator.getGamepads() : []; } catch(e) {}
  let padIdx = 0;
  for (const p of state.players) {
    if (p.controlType === 'human' && pads[padIdx]) { p.gamepadIndex = padIdx; padIdx++; }
  }

  state.hitstopFrames = 0;
  state.screenShake = { x: 0, y: 0, intensity: 0 };
  state.camera = { x: 0, y: 100, zoom: 1 };
  state.winner = -1; state.frameCount = 0;
  state.damageNumbers = [];
  state.slowMo = 1; state.slowMoTimer = 0; state.slowMoTarget = null;
  state.confettiSpawned = false;
  state.hazardsOn = matchConfig.hazardsOn !== undefined ? matchConfig.hazardsOn : options.hazardsOn;
  state.timeRemaining = 180;
  particlePool.forEach(p => p.active = false);
  initAudio();

  state.mode = state.matchType === 'training' ? 'training' : 'playing';
}

// --- Menu Navigation ---
function handleCharSelectInput() {
  const p1b = getP1Binds(), p2b = getP2Binds();
  const c1 = state.charSelectCursors[0], c2 = state.charSelectCursors[1];

  // P1 navigation
  if (!c1.confirmed) {
    if (wasBindJustPressed(p1b.right)) { c1.pos = (c1.pos + 1) % FIGHTER_KEYS.length; playSound('select'); }
    if (wasBindJustPressed(p1b.left)) { c1.pos = (c1.pos - 1 + FIGHTER_KEYS.length) % FIGHTER_KEYS.length; playSound('select'); }
    if (wasBindJustPressed(p1b.up)) { c1.cpu = !c1.cpu; playSound('select'); }
    if (wasBindJustPressed(p1b.down)) { if (c1.cpu) { c1.cpuLevel = c1.cpuLevel === 1 ? 3 : c1.cpuLevel === 3 ? 5 : 1; playSound('select'); } }
    if (wasBindJustPressed(p1b.attack) || wasBindJustPressed(p1b.attack2)) { c1.confirmed = true; playSound('select'); }
  }

  // P2 navigation
  if (!c2.confirmed) {
    if (wasBindJustPressed(p2b.right)) { c2.pos = (c2.pos + 1) % FIGHTER_KEYS.length; playSound('select'); }
    if (wasBindJustPressed(p2b.left)) { c2.pos = (c2.pos - 1 + FIGHTER_KEYS.length) % FIGHTER_KEYS.length; playSound('select'); }
    if (wasBindJustPressed(p2b.up)) { c2.cpu = !c2.cpu; playSound('select'); }
    if (wasBindJustPressed(p2b.down)) { if (c2.cpu) { c2.cpuLevel = c2.cpuLevel === 1 ? 3 : c2.cpuLevel === 3 ? 5 : 1; playSound('select'); } }
    if (wasBindJustPressed(p2b.attack) || wasBindJustPressed(p2b.attack2)) { c2.confirmed = true; playSound('select'); }
  }

  // Enter confirms both
  if (justPressed['Enter']) {
    if (!c1.confirmed) c1.confirmed = true;
    if (!c2.confirmed) c2.confirmed = true;
    playSound('select');
  }

  if (c1.confirmed && c2.confirmed) {
    state.p1Fighter = FIGHTER_KEYS[c1.pos];
    state.p2Fighter = FIGHTER_KEYS[c2.pos];
    state.mode = 'stageselect';
    c1.confirmed = false; c2.confirmed = false;
  }
}

function handleStageSelectInput() {
  const cols = 3;
  if (justPressed['KeyA'] || justPressed['ArrowLeft']) {
    state.stageCursor = (state.stageCursor - 1 + STAGE_KEYS.length) % STAGE_KEYS.length;
    playSound('select');
  }
  if (justPressed['KeyD'] || justPressed['ArrowRight']) {
    state.stageCursor = (state.stageCursor + 1) % STAGE_KEYS.length;
    playSound('select');
  }
  if (justPressed['KeyW'] || justPressed['ArrowUp']) {
    const newCursor = state.stageCursor - cols;
    state.stageCursor = newCursor >= 0 ? newCursor : (STAGE_KEYS.length + newCursor);
    playSound('select');
  }
  if (justPressed['KeyS'] || justPressed['ArrowDown']) {
    const newCursor = state.stageCursor + cols;
    state.stageCursor = newCursor < STAGE_KEYS.length ? newCursor : newCursor % STAGE_KEYS.length;
    playSound('select');
  }
  if (menuConfirmPressed()) {
    state.selectedStage = STAGE_KEYS[state.stageCursor];
    state.mode = 'modeselect';
    playSound('select');
  }
}

function handleModeSelectInput() {
  if (justPressed['KeyW'] || justPressed['ArrowUp']) { state.modeCursor = (state.modeCursor - 1 + MODE_OPTIONS.length) % MODE_OPTIONS.length; playSound('select'); }
  if (justPressed['KeyS'] || justPressed['ArrowDown']) { state.modeCursor = (state.modeCursor + 1) % MODE_OPTIONS.length; playSound('select'); }
  if (menuConfirmPressed()) {
    const selectedMode = MODE_OPTIONS[state.modeCursor];
    if (selectedMode.key === 'tour') startOrResumeTourRun(selectedMode.runId);
    else {
      suspendTourRun();
      state.matchType = selectedMode.key;
      startMatch();
    }
    playSound('select');
  }
}

function handleOptionsInput() {
  if (justPressed['KeyW'] || justPressed['ArrowUp']) { state.optionsCursor = Math.max(0, state.optionsCursor - 1); playSound('select'); }
  if (justPressed['KeyS'] || justPressed['ArrowDown']) { state.optionsCursor = Math.min(3, state.optionsCursor + 1); playSound('select'); }
  const left = justPressed['KeyA'] || justPressed['ArrowLeft'];
  const right = justPressed['KeyD'] || justPressed['ArrowRight'];
  if (left || right) {
    const d = right ? 1 : -1;
    if (state.optionsCursor === 0) options.volume = Math.max(0, Math.min(1, options.volume + d * 0.1));
    if (state.optionsCursor === 1) options.showHitboxes = !options.showHitboxes;
    if (state.optionsCursor === 2) options.hazardsOn = !options.hazardsOn;
    if (state.optionsCursor === 3) options.musicOn = !options.musicOn;
    playSound('select');
  }
}

// --- Global Key Handlers ---
document.addEventListener('keydown', e => {
  if (e.code !== 'Escape' && e.code !== 'KeyF') initAudio();
  if (state.mode === 'title') {
    if (e.code === 'Enter' || e.code === 'Space') {
      state.mode = 'charselect';
      delete justPressed[e.code];
    }
    if (e.code === 'KeyO') { state.mode = 'options'; }
  } else if (state.mode === 'results') {
    if (e.code === 'Enter' || e.code === 'Space') handleResultsConfirm();
    if (e.code === 'Escape') handleResultsEscape();
  } else if (state.mode === 'playing' || state.mode === 'training') {
    if (e.code === 'KeyP') state.mode = state.mode === 'playing' ? 'paused' : state.mode;
    if (e.code === 'Escape') { suspendTourRun(); state.mode = 'title'; }
    // Training mode keys
    if (state.matchType === 'training') {
      if (e.code === 'KeyH') options.showHitboxes = !options.showHitboxes;
      if (e.code === 'KeyR') { for (const p of state.players) p.damage = 0; }
    }
  } else if (state.mode === 'paused') {
    if (e.code === 'KeyP') state.mode = 'playing';
    if (e.code === 'Escape') { suspendTourRun(); state.mode = 'title'; }
  } else if (state.mode === 'charselect' || state.mode === 'stageselect' || state.mode === 'modeselect') {
    if (e.code === 'Escape') {
      if (state.mode === 'modeselect') state.mode = 'stageselect';
      else if (state.mode === 'stageselect') state.mode = 'charselect';
      else state.mode = 'title';
    }
  } else if (state.mode === 'options') {
    if (e.code === 'Escape') { saveOptions(); state.mode = 'title'; }
  }

  if (e.code === 'KeyF') {
    if (!document.fullscreenElement) canvas.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  }
});

document.addEventListener('fullscreenchange', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

// --- Game Loop ---
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  accumulator += dt;

  // Process menu inputs (uses justPressed)
  if (state.mode === 'charselect') handleCharSelectInput();
  else if (state.mode === 'stageselect') handleStageSelectInput();
  else if (state.mode === 'modeselect') handleModeSelectInput();
  else if (state.mode === 'options') handleOptionsInput();

  // Clear justPressed after processing
  for (const k in justPressed) delete justPressed[k];

  while (accumulator >= FIXED_STEP) {
    update(FIXED_STEP);
    accumulator -= FIXED_STEP;
  }

  // Update particles even on results (for confetti)
  if (state.mode === 'results') updateParticles(dt);

  render();
  requestAnimationFrame(gameLoop);
}

// --- Playwright APIs ---
window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (let i = 0; i < steps; i++) update(FIXED_STEP);
  render();
};

window.render_game_to_text = function () {
  return JSON.stringify({
    mode: state.mode,
    frame: state.frameCount,
    matchType: state.matchType,
    stage: state.selectedStage,
    musicOn: options.musicOn,
    musicCue: musicState.currentCue,
    musicStep: musicState.step,
    audioState: audioCtx ? audioCtx.state : 'off',
    timeRemaining: state.matchType === 'time' ? Math.round(state.timeRemaining) : undefined,
    tour: {
      runId: state.tourState.runId,
      active: state.tourState.active,
      completed: state.tourState.completed,
      currentLegIndex: state.tourState.currentLegIndex,
      completedLegs: state.tourState.completedLegs,
      losses: state.tourState.losses,
      rewardState: state.tourState.rewardState,
      lastOutcome: state.tourState.lastOutcome,
      savedBestClear: tourStorage.bestClears[state.tourState.runId] || null,
    },
    players: state.players.map(p => ({
      idx: p.idx, fighter: p.fighterKey,
      x: Math.round(p.x), y: Math.round(p.y),
      vx: Math.round(p.vx), vy: Math.round(p.vy),
      state: p.state, damage: Math.round(p.damage),
      stocks: p.stocks, score: p.score,
      facing: p.facing, grounded: p.grounded,
      shieldHP: Math.round(p.shieldHP), invincible: p.invincible,
      controlType: p.controlType, cpuLevel: p.cpuLevel,
      grabTarget: p.grabTarget,
    })),
    hitstop: state.hitstopFrames,
    camera: { x: Math.round(state.camera.x), y: Math.round(state.camera.y), zoom: +state.camera.zoom.toFixed(2) },
    winner: state.winner,
    slowMo: state.slowMo !== 1 ? state.slowMo : undefined,
    activeParticles: particlePool.filter(p => p.active).length,
    damageNumbers: state.damageNumbers.length,
    coordSystem: '+x right, +y down, origin at stage center',
  });
};

// --- Init ---
resizeCanvas();
requestAnimationFrame(gameLoop);
</script>
</body>
