        const seed = i * 19.7 + 100;
        const dx = wrapValue(seeded01(seed) * BASE_W + ox * 0.15, BASE_W);
        const dy = seededRange(seed + 1, 60, BASE_H - 80) + Math.sin(t * 0.015 + i * 1.3) * 30;
        const drift = Math.sin(t * 0.018 + i * 2.1) * 20;
        const sparkle = (Math.sin(t * 0.05 + i * 1.8) * 0.5 + 0.5) * 0.8 + 0.2;
        ctx.globalAlpha = sparkle;
        ctx.fillStyle = i % 2 === 0 ? '#ffffdd' : '#ddffff';
        ctx.beginPath();
        ctx.arc(dx + drift, dy, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (layer.shapes === 'oceansky') {
      const grd = ctx.createLinearGradient(0, 0, 0, BASE_H);
      grd.addColorStop(0, '#010820');
      grd.addColorStop(0.4, '#0a3a5a');
      grd.addColorStop(0.6, '#1a6a8a');
      grd.addColorStop(0.9, '#2a9aba');
      grd.addColorStop(1, '#3abacc');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      ctx.strokeStyle = 'rgba(100,220,255,0.12)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, BASE_H * 0.58);
      ctx.lineTo(BASE_W, BASE_H * 0.58);
      ctx.stroke();
    } else if (layer.shapes === 'palmtrees') {
      for (let i = 0; i < 2; i++) {
        const px = i === 0 ? 60 + ox * 0.15 : BASE_W - 80 + ox * 0.15;
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(px - 6, BASE_H - 220, 12, 220);
        ctx.fillStyle = '#4a6a3a';
        for (let j = 0; j < 8; j++) {
          const angle = (j / 8) * Math.PI * 2;
          const len = 50 + j * 8;
          const ex = px + Math.cos(angle) * len;
          const ey = BASE_H - 220 + Math.sin(angle) * len * 0.6;
          ctx.beginPath();
          ctx.moveTo(px, BASE_H - 220);
          ctx.lineTo(ex, ey);
          ctx.lineWidth = 3 - j * 0.3;
          ctx.stroke();
        }
      }
    } else if (layer.shapes === 'spiderstage') {
      const cx = BASE_W * 0.5 + ox * 0.1;
      const cy = BASE_H * 0.45;
      ctx.fillStyle = 'rgba(40,60,100,0.5)';
      ctx.fillRect(cx - 120, cy - 30, 240, 80);
      ctx.strokeStyle = 'rgba(80,180,255,0.3)';
      ctx.lineWidth = 3;
      const legs = [-160, -80, 80, 160];
      for (const legX of legs) {
        ctx.beginPath();
        ctx.moveTo(cx + legX * 0.4, cy + 40);
        ctx.lineTo(cx + legX, cy + 140);
        ctx.stroke();
      }
    } else if (layer.shapes === 'ultralasers') {
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 6; i++) {
        const lx = BASE_W * 0.5 + (i - 2.5) * 70 + ox * 0.12;
        const sweep = Math.sin(t * 0.025 + i * 0.8) * 80;
        const colors = ['rgba(255,80,100,', 'rgba(255,200,100,', 'rgba(100,200,255,', 'rgba(100,255,200,'];
        ctx.strokeStyle = colors[i % 4] + '0.25)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(lx, BASE_H);
        ctx.lineTo(lx + sweep, BASE_H * 0.1);
        ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';
    } else if (layer.shapes === 'desertsky') {
      const grd = ctx.createLinearGradient(0, 0, 0, BASE_H);
      grd.addColorStop(0, '#3a2010');
      grd.addColorStop(0.4, '#7a4a20');
      grd.addColorStop(0.7, '#ba7030');
      grd.addColorStop(1, '#e5a550');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    } else if (layer.shapes === 'theman') {
      const mx = BASE_W * 0.5 + ox * 0.1;
      const my = BASE_H - 280;
      ctx.fillStyle = 'rgba(200,100,30,0.3)';
      ctx.fillRect(mx - 80, my + 150, 160, 120);
      ctx.strokeStyle = 'rgba(100,40,20,0.6)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(mx - 30, my);
      ctx.lineTo(mx - 30, my + 150);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx + 30, my);
      ctx.lineTo(mx + 30, my + 150);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx - 60, my + 140);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx + 60, my + 140);
      ctx.stroke();
      const glow = ctx.createRadialGradient(mx, my + 60, 20, mx, my + 60, 100);
      glow.addColorStop(0, 'rgba(255,150,80,0.35)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(mx - 100, my - 50, 200, 200);
    } else if (layer.shapes === 'dustparticles') {
      for (let i = 0; i < 32; i++) {
        const seed = i * 17.3 + 80;
        const dx = wrapValue(seeded01(seed) * BASE_W + t * (0.4 + seeded01(seed + 1) * 0.35) + ox * 0.2, BASE_W);
        const dy = seededRange(seed + 2, BASE_H * 0.2, BASE_H * 0.8) + Math.sin(t * 0.022 + i * 1.6) * 15;
        const alpha = 0.3 + (Math.sin(t * 0.03 + i * 2.1) * 0.5 + 0.5) * 0.3;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = i % 3 === 0 ? '#c8844a' : i % 3 === 1 ? '#b87040' : '#a85830';
        ctx.beginPath();
        ctx.arc(dx, dy, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (layer.shapes === 'campfires') {
      const fires = [100, 380, 660, 840];
      for (const fx of fires) {
        const flicker = Math.sin(t * 0.1 + fx * 0.01) * 0.2 + 0.4;
        const halo = ctx.createRadialGradient(fx, BASE_H - 40, 10, fx, BASE_H - 40, 60);
        halo.addColorStop(0, `rgba(255,140,60,${0.3 * flicker})`);
        halo.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(fx - 60, BASE_H - 100, 120, 120);
        ctx.fillStyle = `rgba(255,100,30,${0.6 * flicker})`;
        ctx.beginPath();
        ctx.arc(fx, BASE_H - 30, 12 + Math.sin(t * 0.12 + fx * 0.005) * 5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (layer.shapes === 'coachellasky') {
      const grd = ctx.createLinearGradient(0, 0, 0, BASE_H);
      grd.addColorStop(0, '#2a1a40');
      grd.addColorStop(0.35, '#8a4a7a');
      grd.addColorStop(0.65, '#ca8a9a');
      grd.addColorStop(0.85, '#e8b8aa');
      grd.addColorStop(1, '#f0d0a8');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
    } else if (layer.shapes === 'ferriswheel') {
      const fx = BASE_W * (Math.sin(ox * 0.002) < 0 ? 0.2 : 0.8);
      const fy = BASE_H * 0.4;
      const rotation = t * 0.015;
      ctx.save();
      ctx.translate(fx, fy);
      ctx.rotate(rotation);
      ctx.strokeStyle = 'rgba(80,120,180,0.4)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, 80, 0, Math.PI * 2);
      ctx.stroke();
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(angle) * 80, Math.sin(angle) * 80);
        ctx.stroke();
        ctx.fillStyle = 'rgba(150,100,200,0.35)';
        ctx.fillRect(Math.cos(angle) * 88 - 6, Math.sin(angle) * 88 - 6, 12, 12);
      }
      ctx.restore();
    } else if (layer.shapes === 'coachellapalms') {
      for (let i = 0; i < 3; i++) {
        const px = i === 0 ? 80 : i === 1 ? BASE_W / 2 : BASE_W - 100;
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(px - 8, BASE_H - 260, 16, 260);
        ctx.fillStyle = '#5a7a4a';
        for (let j = 0; j < 10; j++) {
          const angle = (j / 10) * Math.PI * 2 - Math.PI / 2;
          const len = 60 + j * 5;
          const ex = px + Math.cos(angle) * len;
          const ey = BASE_H - 260 + Math.sin(angle) * len * 0.5;
          ctx.beginPath();
          ctx.moveTo(px, BASE_H - 260);
          ctx.lineTo(ex, ey);
          ctx.lineWidth = 2.5 - j * 0.2;
          ctx.stroke();
        }
      }
    } else if (layer.shapes === 'artinstalls') {
      for (let i = 0; i < 6; i++) {
        const ax = 120 + i * 140 + ox * 0.08;
        const ay = BASE_H - 180 - (i % 2) * 40;
        ctx.fillStyle = i % 3 === 0 ? 'rgba(100,150,255,0.2)' : i % 3 === 1 ? 'rgba(255,100,200,0.2)' : 'rgba(100,255,200,0.2)';
        if (i % 2 === 0) {
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax - 30, ay + 40);
          ctx.lineTo(ax + 30, ay + 40);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(ax, ay, 30, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (layer.shapes === 'owlstage') {
      const ox_pos = BASE_W * 0.5;
      const oy_pos = BASE_H * 0.35;
      ctx.fillStyle = 'rgba(20,10,40,0.6)';
      ctx.beginPath();
      ctx.arc(ox_pos - 40, oy_pos - 20, 35, 0, Math.PI * 2);
      ctx.arc(ox_pos + 40, oy_pos - 20, 35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,200,100,0.5)';
      ctx.beginPath();
      ctx.arc(ox_pos - 32, oy_pos - 20, 12, 0, Math.PI * 2);
      ctx.arc(ox_pos + 48, oy_pos - 20, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(20,10,40,0.8)';
      ctx.beginPath();
      ctx.arc(ox_pos - 32, oy_pos - 20, 6, 0, Math.PI * 2);
      ctx.arc(ox_pos + 48, oy_pos - 20, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(40,20,60,0.5)';
      ctx.beginPath();
      ctx.moveTo(ox_pos - 80, oy_pos);
      ctx.lineTo(ox_pos - 60, oy_pos - 40);
      ctx.lineTo(ox_pos - 40, oy_pos);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ox_pos + 80, oy_pos);
      ctx.lineTo(ox_pos + 60, oy_pos - 40);
      ctx.lineTo(ox_pos + 40, oy_pos);
      ctx.closePath();
      ctx.fill();
    } else if (layer.shapes === 'neonrides') {
      const ferris_x = BASE_W * 0.3 + ox * 0.1;
      const ferris_y = BASE_H * 0.5;
      ctx.strokeStyle = 'rgba(100,255,200,0.35)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ferris_x, ferris_y, 70, 0, Math.PI * 2);
      ctx.stroke();
      const coaster_x = BASE_W * 0.7 + ox * 0.1;
      ctx.strokeStyle = 'rgba(255,100,200,0.35)';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(coaster_x - 80 + i * 50, ferris_y - 60 + (i % 2) * 40, 30, 0, Math.PI);
        ctx.stroke();
      }
    } else if (layer.shapes === 'rainbowlasers') {
      ctx.globalCompositeOperation = 'screen';
      const colors = ['rgba(255,80,100,', 'rgba(255,160,80,', 'rgba(255,240,80,', 'rgba(100,255,100,', 'rgba(100,200,255,', 'rgba(150,100,255,'];
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const len = 300;
        const ex = BASE_W * 0.5 + Math.cos(angle) * len;
        const ey = BASE_H * 0.5 + Math.sin(angle) * len;
        ctx.strokeStyle = colors[i] + '0.35)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(BASE_W * 0.5, BASE_H * 0.5);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';

    }
    ctx.restore();
  }
}

function renderStage() {
  ctx.fillStyle = currentStage.bg;
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  renderParallaxBG(currentStage);
}

function renderPlatforms() {
  const theme = currentStage.theme || 'arena';
  const t = state.frameCount;
  for (const plat of currentStage.platforms) {
    const tl = worldToScreen(plat.x, plat.y);
    const z = state.camera.zoom;
    const pw = plat.w * z, ph = plat.h * z;
    const topLip = Math.max(2, 4 * z);
    ctx.save();
    if (theme === 'cosmic') {
      if (plat.type === 'solid') {
        const pulse = Math.sin(t * 0.04) * 0.15 + 0.85;
        const bodyGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        bodyGrad.addColorStop(0, 'rgba(26,38,70,0.94)');
        bodyGrad.addColorStop(0.5, 'rgba(10,20,44,0.98)');
        bodyGrad.addColorStop(1, 'rgba(6,10,28,0.98)');
        ctx.fillStyle = bodyGrad;
        ctx.beginPath();
        ctx.moveTo(tl.x + 12 * z, tl.y);
        ctx.lineTo(tl.x + pw - 12 * z, tl.y);
        ctx.lineTo(tl.x + pw - 3 * z, tl.y + ph * 0.45);
        ctx.lineTo(tl.x + pw - 20 * z, tl.y + ph);
        ctx.lineTo(tl.x + 20 * z, tl.y + ph);
        ctx.lineTo(tl.x + 3 * z, tl.y + ph * 0.45);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = `rgba(110,250,255,${0.35 * pulse})`;
        ctx.fillRect(tl.x + 8 * z, tl.y, pw - 16 * z, topLip);
        ctx.fillStyle = `rgba(140,255,255,${0.12 * pulse})`;
        ctx.fillRect(tl.x + 2 * z, tl.y + ph - 4 * z, pw - 4 * z, 3 * z);
        ctx.strokeStyle = `rgba(104,230,255,${0.26 * pulse})`;
        ctx.lineWidth = Math.max(1, z);
        for (let i = 0; i < 5; i++) {
          const vx = tl.x + (i + 1) * pw / 6;
          ctx.beginPath();
          ctx.moveTo(vx - 8 * z, tl.y + 6 * z);
          ctx.lineTo(vx + 4 * z, tl.y + ph - 5 * z);
          ctx.lineTo(vx + 12 * z, tl.y + ph - 12 * z);
          ctx.stroke();
          ctx.fillStyle = `rgba(125,255,255,${0.2 * pulse})`;
          ctx.beginPath();
          ctx.moveTo(vx, tl.y + 2 * z);
          ctx.lineTo(vx + 5 * z, tl.y + 8 * z);
          ctx.lineTo(vx, tl.y + 14 * z);
          ctx.lineTo(vx - 5 * z, tl.y + 8 * z);
          ctx.closePath();
          ctx.fill();
        }
        for (let i = 0; i < 4; i++) {
          const shardX = tl.x + pw * (0.18 + i * 0.2);
          const bob = Math.sin(t * 0.05 + i * 1.6 + plat.x * 0.02) * 3 * z;
          ctx.fillStyle = `rgba(110,220,255,${0.14 * pulse})`;
          ctx.beginPath();
          ctx.moveTo(shardX, tl.y + ph + 4 * z + bob);
          ctx.lineTo(shardX + 5 * z, tl.y + ph + 18 * z + bob);
          ctx.lineTo(shardX - 4 * z, tl.y + ph + 16 * z + bob);
          ctx.closePath();
          ctx.fill();
        }
      } else {
        const pulse = Math.sin(t * 0.05 + plat.x * 0.01) * 0.2 + 0.5;
        ctx.fillStyle = 'rgba(26,44,66,0.82)';
        ctx.beginPath();
        ctx.moveTo(tl.x + 10 * z, tl.y);
        ctx.lineTo(tl.x + pw - 10 * z, tl.y);
        ctx.lineTo(tl.x + pw, tl.y + ph * 0.5);
        ctx.lineTo(tl.x + pw - 10 * z, tl.y + ph);
        ctx.lineTo(tl.x + 10 * z, tl.y + ph);
        ctx.lineTo(tl.x, tl.y + ph * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = `rgba(110,240,255,${0.65 * pulse})`;
        ctx.fillRect(tl.x + 8 * z, tl.y + 1, pw - 16 * z, Math.max(2, 2 * z));
        ctx.strokeStyle = `rgba(102,210,255,${0.25 + pulse * 0.2})`;
        ctx.lineWidth = Math.max(1, 0.8 * z);
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.2, tl.y + ph - 2 * z);
        ctx.lineTo(tl.x + pw * 0.48, tl.y + 2 * z);
        ctx.lineTo(tl.x + pw * 0.8, tl.y + ph - 2 * z);
        ctx.stroke();
      }
    } else if (theme === 'sky') {
      if (plat.type === 'solid') {
        ctx.fillStyle = '#3c2416';
        ctx.fillRect(tl.x, tl.y + ph * 0.3, pw, ph * 0.7);
        const plankW = Math.max(18 * z, pw / 8);
        for (let i = 0; i < pw; i += plankW) {
          const shade = i / plankW % 2 === 0 ? '#6f4527' : '#80512f';
          ctx.fillStyle = shade;
          ctx.fillRect(tl.x + i, tl.y, Math.min(plankW - 1, pw - i), ph * 0.7);
          ctx.fillStyle = 'rgba(255,223,170,0.08)';
          ctx.fillRect(tl.x + i + 2 * z, tl.y + 2 * z, Math.max(0, Math.min(plankW - 6 * z, pw - i - 4 * z)), 2 * z);
          ctx.fillStyle = '#2b160d';
          ctx.fillRect(tl.x + i, tl.y + ph * 0.62, Math.min(plankW - 1, pw - i), 1.5 * z);
          ctx.fillStyle = '#d7b177';
          ctx.fillRect(tl.x + i + plankW * 0.22, tl.y + ph * 0.28, 2, 2);
          ctx.fillRect(tl.x + i + plankW * 0.7, tl.y + ph * 0.28, 2, 2);
        }
        ctx.fillStyle = '#9c6b3b';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.fillStyle = '#2c160c';
        ctx.fillRect(tl.x, tl.y + ph - 3 * z, pw, 3 * z);
        ctx.fillStyle = '#4d301c';
        ctx.fillRect(tl.x + 8 * z, tl.y + ph, pw - 16 * z, 6 * z);
        const ropeXs = [0.18, 0.5, 0.82];
        for (const rope of ropeXs) {
          const rx = tl.x + pw * rope;
          ctx.fillStyle = '#c4a46a';
          ctx.fillRect(rx - 2 * z, tl.y - 1, 4 * z, ph + 2 * z);
          ctx.strokeStyle = 'rgba(95,64,35,0.8)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(rx - 5 * z, tl.y + ph * 0.15);
          ctx.lineTo(rx + 5 * z, tl.y + ph * 0.38);
          ctx.moveTo(rx + 5 * z, tl.y + ph * 0.55);
          ctx.lineTo(rx - 5 * z, tl.y + ph * 0.82);
          ctx.stroke();
        }
        ctx.fillStyle = '#4a2a15';
        ctx.fillRect(tl.x + 5 * z, tl.y + ph, 6 * z, 18 * z);
        ctx.fillRect(tl.x + pw - 11 * z, tl.y + ph, 6 * z, 18 * z);
        ctx.strokeStyle = '#5a3a20';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tl.x + 8 * z, tl.y + ph + 6 * z);
        ctx.lineTo(tl.x + pw * 0.32, tl.y + ph + 20 * z);
        ctx.moveTo(tl.x + pw - 8 * z, tl.y + ph + 6 * z);
        ctx.lineTo(tl.x + pw * 0.68, tl.y + ph + 20 * z);
        ctx.stroke();
      } else if (plat.moving) {
        ctx.fillStyle = '#74768b';
        ctx.beginPath();
        ctx.moveTo(tl.x + 8 * z, tl.y);
        ctx.lineTo(tl.x + pw - 8 * z, tl.y);
        ctx.lineTo(tl.x + pw - 2 * z, tl.y + ph * 0.45);
        ctx.lineTo(tl.x + pw * 0.72, tl.y + ph);
        ctx.lineTo(tl.x + pw * 0.25, tl.y + ph);
        ctx.lineTo(tl.x + 2 * z, tl.y + ph * 0.45);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#88a072';
        ctx.fillRect(tl.x + 8 * z, tl.y, pw - 16 * z, 3 * z);
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(tl.x + 14 * z, tl.y + 2 * z, pw * 0.24, 2 * z);
        ctx.strokeStyle = 'rgba(55,55,72,0.55)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.26, tl.y + 2 * z);
        ctx.lineTo(tl.x + pw * 0.34, tl.y + ph * 0.72);
        ctx.moveTo(tl.x + pw * 0.62, tl.y + 3 * z);
        ctx.lineTo(tl.x + pw * 0.54, tl.y + ph * 0.66);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(96,120,72,0.45)';
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.2, tl.y + ph * 0.62);
        ctx.lineTo(tl.x + pw * 0.18, tl.y + ph + 12 * z);
        ctx.moveTo(tl.x + pw * 0.68, tl.y + ph * 0.58);
        ctx.lineTo(tl.x + pw * 0.7, tl.y + ph + 10 * z);
        ctx.stroke();
      } else {
        ctx.fillStyle = '#6a4328';
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = '#9d6a40';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.fillStyle = '#3f2414';
        ctx.fillRect(tl.x, tl.y + ph - 2 * z, pw, 2 * z);
      }
    } else if (theme === 'festival') {
      if (plat.type === 'solid') {
        const deckGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        deckGrad.addColorStop(0, '#1a2236');
        deckGrad.addColorStop(1, '#0b0f1c');
        ctx.fillStyle = deckGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(95,235,255,0.20)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.fillStyle = 'rgba(255,84,176,0.12)';
        ctx.fillRect(tl.x + 10 * z, tl.y + ph * 0.38, pw - 20 * z, ph * 0.2);
        ctx.strokeStyle = 'rgba(130,210,255,0.18)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
          const px = tl.x + (i + 1) * pw / 7;
          ctx.beginPath();
          ctx.moveTo(px, tl.y + 4 * z);
          ctx.lineTo(px, tl.y + ph - 4 * z);
          ctx.stroke();
        }
        ctx.fillStyle = '#3b4356';
        ctx.fillRect(tl.x + 6 * z, tl.y + ph, pw - 12 * z, 8 * z);
        ctx.strokeStyle = 'rgba(180,190,210,0.22)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tl.x + 20 * z, tl.y + ph + 2 * z);
        ctx.lineTo(tl.x + pw * 0.28, tl.y + ph + 18 * z);
        ctx.lineTo(tl.x + pw * 0.72, tl.y + ph + 18 * z);
        ctx.lineTo(tl.x + pw - 20 * z, tl.y + ph + 2 * z);
        ctx.stroke();
    } else if (theme === 'tomorrowland') {
      if (plat.type === 'solid') {
        const ornateGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        ornateGrad.addColorStop(0, '#9a7d5a');
        ornateGrad.addColorStop(0.5, '#8a6f4a');
        ornateGrad.addColorStop(1, '#6a4f2a');
        ctx.fillStyle = ornateGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(255,200,100,0.25)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.fillStyle = 'rgba(200,160,80,0.15)';
        for (let i = 0; i < 8; i++) {
          const px = tl.x + (i + 0.5) * pw / 8;
          const py = tl.y + ph * 0.25;
          ctx.beginPath();
          ctx.arc(px, py, 3 * z, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        ctx.fillStyle = 'rgba(180,140,80,0.5)';
        ctx.beginPath();
        ctx.moveTo(tl.x + 8 * z, tl.y);
        ctx.lineTo(tl.x + pw - 8 * z, tl.y);
        ctx.lineTo(tl.x + pw - 2 * z, tl.y + ph * 0.6);
        ctx.lineTo(tl.x + pw * 0.5, tl.y + ph);
        ctx.lineTo(tl.x + 2 * z, tl.y + ph * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,220,150,0.35)';
        ctx.fillRect(tl.x + 6 * z, tl.y, pw - 12 * z, 2 * z);
      }
    } else if (theme === 'ultra') {
      if (plat.type === 'solid') {
        const metalGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        metalGrad.addColorStop(0, '#1a2a3a');
        metalGrad.addColorStop(0.5, '#0a1a2a');
        metalGrad.addColorStop(1, '#050f1a');
        ctx.fillStyle = metalGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(0,200,255,0.3)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.strokeStyle = 'rgba(0,180,255,0.4)';
        ctx.lineWidth = 2 * z;
        ctx.strokeRect(tl.x + 4 * z, tl.y + 4 * z, pw - 8 * z, ph - 8 * z);
      } else {
        ctx.fillStyle = 'rgba(10,30,50,0.8)';
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.strokeStyle = 'rgba(0,200,255,0.5)';
        ctx.lineWidth = 2 * z;
        ctx.strokeRect(tl.x + 2 * z, tl.y + 2 * z, pw - 4 * z, ph - 4 * z);
      }
    } else if (theme === 'desert') {
      if (plat.type === 'solid') {
        const sandGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        sandGrad.addColorStop(0, '#c8984a');
        sandGrad.addColorStop(0.5, '#b8804a');
        sandGrad.addColorStop(1, '#985030');
        ctx.fillStyle = sandGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(200,150,100,0.2)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        for (let i = 0; i < pw; i += 20 * z) {
          ctx.fillStyle = `rgba(139,90,43,${0.1 + (i / pw) * 0.15})`;
          ctx.fillRect(tl.x + i, tl.y + ph * 0.5, 20 * z, ph * 0.5);
        }
      } else {
        ctx.fillStyle = 'rgba(180,130,80,0.6)';
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(150,100,50,0.3)';
        ctx.fillRect(tl.x + 4 * z, tl.y + 4 * z, pw - 8 * z, ph - 8 * z);
      }
    } else if (theme === 'coachella') {
      if (plat.type === 'solid') {
        const tentGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        tentGrad.addColorStop(0, '#f0e8d8');
        tentGrad.addColorStop(1, '#d8cdb8');
        ctx.fillStyle = tentGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(230,200,100,0.3)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
        ctx.strokeStyle = 'rgba(200,160,100,0.4)';
        ctx.lineWidth = 1;
        for (let i = 0; i < pw; i += 30 * z) {
          ctx.beginPath();
          ctx.moveTo(tl.x + i, tl.y + ph * 0.3);
          ctx.lineTo(tl.x + i, tl.y + ph);
          ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(200,170,130,0.3)';
        ctx.lineWidth = 2 * z;
        for (let i = 0; i < 4; i++) {
          const sx = tl.x + (i + 0.5) * pw / 4;
          ctx.beginPath();
          ctx.moveTo(sx, tl.y + ph * 0.15);
          ctx.lineTo(sx + 3 * z, tl.y + ph * 0.4);
          ctx.lineTo(sx - 3 * z, tl.y + ph * 0.4);
          ctx.closePath();
          ctx.stroke();
        }
      } else {
        ctx.fillStyle = 'rgba(220,200,150,0.6)';
        ctx.beginPath();
        ctx.moveTo(tl.x + 6 * z, tl.y);
        ctx.lineTo(tl.x + pw - 6 * z, tl.y);
        ctx.lineTo(tl.x + pw - 2 * z, tl.y + ph * 0.5);
        ctx.lineTo(tl.x + pw * 0.5, tl.y + ph);
        ctx.lineTo(tl.x + 2 * z, tl.y + ph * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(200,160,100,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    } else if (theme === 'edc') {
      if (plat.type === 'solid') {
        const neonGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        neonGrad.addColorStop(0, '#1a0f2a');
        neonGrad.addColorStop(1, '#0a050a');
        ctx.fillStyle = neonGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        const rainbowCycle = (state.frameCount * 0.02) % 6;
        const edgeColors = ['rgba(255,80,100,', 'rgba(255,160,80,', 'rgba(255,240,80,', 'rgba(100,255,100,', 'rgba(100,200,255,', 'rgba(150,100,255,'];
        ctx.strokeStyle = edgeColors[Math.floor(rainbowCycle)] + '0.5)';
        ctx.lineWidth = 3 * z;
        ctx.strokeRect(tl.x + 2 * z, tl.y + 2 * z, pw - 4 * z, ph - 4 * z);
        ctx.fillStyle = 'rgba(255,150,200,0.15)';
        ctx.fillRect(tl.x, tl.y, pw, topLip);
      } else {
        ctx.fillStyle = 'rgba(20,5,30,0.8)';
        ctx.fillRect(tl.x, tl.y, pw, ph);
        const cycle = (state.frameCount * 0.02) % 6;
        const colors = ['rgba(255,80,100,', 'rgba(255,160,80,', 'rgba(255,240,80,', 'rgba(100,255,100,', 'rgba(100,200,255,', 'rgba(150,100,255,'];
        ctx.strokeStyle = colors[Math.floor(cycle)] + '0.6)';
        ctx.lineWidth = 2 * z;
        ctx.strokeRect(tl.x + 1 * z, tl.y + 1 * z, pw - 2 * z, ph - 2 * z);
      }

      } else {
        ctx.fillStyle = 'rgba(26,32,52,0.92)';
        ctx.beginPath();
        ctx.moveTo(tl.x + 12 * z, tl.y);
        ctx.lineTo(tl.x + pw - 12 * z, tl.y);
        ctx.lineTo(tl.x + pw, tl.y + ph * 0.45);
        ctx.lineTo(tl.x + pw - 10 * z, tl.y + ph);
        ctx.lineTo(tl.x + 10 * z, tl.y + ph);
        ctx.lineTo(tl.x, tl.y + ph * 0.45);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(80,225,255,0.42)';
        ctx.fillRect(tl.x + 8 * z, tl.y, pw - 16 * z, 2 * z);
        ctx.strokeStyle = 'rgba(255,90,180,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.18, tl.y + ph - 2 * z);
        ctx.lineTo(tl.x + pw * 0.42, tl.y + 2 * z);
        ctx.lineTo(tl.x + pw * 0.78, tl.y + ph - 2 * z);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(180,190,210,0.25)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tl.x + 14 * z, tl.y + ph);
        ctx.lineTo(tl.x + 4 * z, tl.y + ph + 12 * z);
        ctx.moveTo(tl.x + pw - 14 * z, tl.y + ph);
        ctx.lineTo(tl.x + pw - 4 * z, tl.y + ph + 12 * z);
        ctx.stroke();
      }
    } else {
      if (plat.type === 'solid') {
        const stoneGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        stoneGrad.addColorStop(0, '#626579');
        stoneGrad.addColorStop(0.5, '#4a4d60');
        stoneGrad.addColorStop(1, '#2f3240');
        ctx.fillStyle = stoneGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(tl.x, tl.y, pw, topLip + 1);
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(tl.x, tl.y + ph - 4 * z, pw, 4 * z);
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        ctx.fillRect(tl.x, tl.y, 4 * z, ph);
        ctx.fillRect(tl.x + pw - 4 * z, tl.y, 4 * z, ph);
        const blockW = Math.max(42 * z, pw / 8);
        ctx.strokeStyle = 'rgba(20,20,32,0.18)';
        ctx.lineWidth = 1;
        for (let i = blockW; i < pw; i += blockW) {
          ctx.beginPath();
          ctx.moveTo(tl.x + i, tl.y + 4 * z);
          ctx.lineTo(tl.x + i, tl.y + ph - 4 * z);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.moveTo(tl.x + 6 * z, tl.y + ph * 0.55);
        ctx.lineTo(tl.x + pw - 6 * z, tl.y + ph * 0.55);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(16,18,28,0.35)';
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.26, tl.y + 5 * z);
        ctx.lineTo(tl.x + pw * 0.31, tl.y + ph * 0.78);
        ctx.lineTo(tl.x + pw * 0.28, tl.y + ph - 3 * z);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.72, tl.y + 5 * z);
        ctx.lineTo(tl.x + pw * 0.64, tl.y + ph * 0.48);
        ctx.lineTo(tl.x + pw * 0.68, tl.y + ph - 5 * z);
        ctx.stroke();
        ctx.fillStyle = 'rgba(58,94,45,0.22)';
        ctx.fillRect(tl.x + 12 * z, tl.y + 1, 26 * z, 3 * z);
        ctx.fillRect(tl.x + pw - 42 * z, tl.y + 2 * z, 20 * z, 2 * z);
        ctx.fillStyle = 'rgba(15,15,22,0.16)';
        for (let i = 0; i < 3; i++) {
          const archX = tl.x + pw * (0.18 + i * 0.28);
          ctx.fillRect(archX, tl.y + ph * 0.66, 18 * z, ph * 0.18);
        }
      } else {
        const slabGrad = ctx.createLinearGradient(tl.x, tl.y, tl.x, tl.y + ph);
        slabGrad.addColorStop(0, '#6a6d7b');
        slabGrad.addColorStop(1, '#414453');
        ctx.fillStyle = slabGrad;
        ctx.fillRect(tl.x, tl.y, pw, ph);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(tl.x, tl.y, pw, 2 * z);
        ctx.fillStyle = 'rgba(0,0,0,0.20)';
        ctx.fillRect(tl.x, tl.y + ph - 2 * z, pw, 2 * z);
        ctx.strokeStyle = 'rgba(32,35,45,0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tl.x + pw * 0.22, tl.y + 2 * z);
        ctx.lineTo(tl.x + pw * 0.28, tl.y + ph - 2 * z);
        ctx.moveTo(tl.x + pw * 0.64, tl.y + 2 * z);
        ctx.lineTo(tl.x + pw * 0.58, tl.y + ph - 2 * z);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// --- Character Drawing Helpers ---
function drawDJPerformer(ctx, p, w, h, z, color, outline, bodyColor, style) {
  const t = state.frameCount;
  const lineW = Math.max(1, z * 0.9);
  const bulk = style.bulk || 0;
  const outfit = p.state === 'hitstun' ? '#ffffff' : p.state === 'grabbed' ? '#ffb3b3' : bodyColor;
  const accent = style.accent || color;
  const accent2 = style.accent2 || outline;
  const dark = style.dark || '#151924';
  const pants = style.pants || '#1f2633';
  const shoes = style.shoes || '#eef2f7';
  const skin = p.state === 'hitstun' ? '#ffffff' : p.state === 'grabbed' ? '#ffd0c2' : (style.skin || '#edbc98');
  const torsoW = w * (0.58 + bulk);
  const torsoH = h * (0.34 + bulk * 0.08);
  const legW = w * (0.17 + bulk * 0.05);
  const thighH = h * (0.18 + bulk * 0.02);
  const shinH = h * (0.18 + bulk * 0.02);
  const legSpread = w * 0.14;
  const attackActive = p.state === 'attack' && p.attackData && p.attackFrame >= p.attackData.startup && p.attackFrame < p.attackData.startup + p.attackData.active;
  let leftLegAngle = 0, rightLegAngle = 0;
  if (p.state === 'walk') {
    const cycle = t * (0.16 + (style.legSpeed || 0));
    leftLegAngle = Math.sin(cycle) * (0.42 + bulk * 0.08);
    rightLegAngle = Math.sin(cycle + Math.PI) * (0.42 + bulk * 0.08);
  } else if (p.state === 'jump' || p.state === 'fall') {
    leftLegAngle = 0.32;
    rightLegAngle = -0.24;
  }

  if (style.outerwear === 'coat' || style.outerwear === 'hoodie') {
    const sweep = Math.sin(t * 0.08 + (p.state === 'walk' ? 1 : 0)) * 4 * z;
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.moveTo(-torsoW * 0.3, -h * 0.16);
    ctx.lineTo(-w * 0.24, -h * 0.08);
    ctx.lineTo(-w * 0.36 - sweep, h * 0.24);
    ctx.lineTo(-w * 0.1, h * 0.18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(-w * 0.22, -h * 0.12);
    ctx.lineTo(-w * 0.32 - sweep * 0.5, h * 0.08);
    ctx.lineTo(-w * 0.16, h * 0.05);
    ctx.closePath();
    ctx.fill();
  }

  const drawLeg = (offset, angle, kneeTilt) => {
    ctx.save();
    ctx.translate(offset, h * 0.15);
    ctx.rotate(angle);
    ctx.fillStyle = pants;
    ctx.fillRect(-legW / 2, 0, legW, thighH);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(-legW / 2 + 1, 2 * z, legW - 2, 2 * z);
    ctx.strokeStyle = outline;
    ctx.lineWidth = lineW;
    ctx.strokeRect(-legW / 2, 0, legW, thighH);
    ctx.save();
    ctx.translate(0, thighH);
    ctx.rotate(kneeTilt);
    ctx.fillStyle = pants;
    ctx.fillRect(-legW * 0.45, 0, legW * 0.9, shinH);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(-legW * 0.38, 2 * z, legW * 0.2, shinH - 4 * z);
    ctx.strokeStyle = outline;
    ctx.strokeRect(-legW * 0.45, 0, legW * 0.9, shinH);
    ctx.fillStyle = shoes;
    ctx.fillRect(-legW * 0.62, shinH - 5 * z, legW * 1.24, 5 * z);
    ctx.fillStyle = dark;
    ctx.fillRect(-legW * 0.62, shinH - 1.5 * z, legW * 1.24 + 4 * z, 4 * z);
    ctx.restore();
    ctx.restore();
  };
  drawLeg(-legSpread, leftLegAngle, -0.12);
  drawLeg(legSpread, rightLegAngle, 0.08);

  ctx.fillStyle = outfit;
  ctx.beginPath();
  ctx.moveTo(-torsoW / 2, -h * 0.2);
  ctx.lineTo(torsoW / 2, -h * 0.2);
  ctx.lineTo(torsoW * 0.42, h * 0.11);
  ctx.lineTo(-torsoW * 0.42, h * 0.11);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(-torsoW / 2 + 2 * z, -h * 0.18);
  ctx.lineTo(torsoW / 2 - 2 * z, -h * 0.18);
  ctx.lineTo(torsoW * 0.3, -h * 0.02);
  ctx.lineTo(-torsoW * 0.3, -h * 0.02);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = outline;
  ctx.lineWidth = lineW;
  ctx.stroke();

  ctx.fillStyle = style.shirt || dark;
  ctx.beginPath();
  ctx.moveTo(-torsoW * 0.16, -h * 0.18);
  ctx.lineTo(0, -h * 0.04);
  ctx.lineTo(torsoW * 0.16, -h * 0.18);
  ctx.lineTo(torsoW * 0.08, h * 0.04);
  ctx.lineTo(-torsoW * 0.08, h * 0.04);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = accent;
  ctx.fillRect(-torsoW / 2, h * 0.09, torsoW, 5 * z);
  ctx.fillStyle = accent2;
  ctx.fillRect(-torsoW * 0.24, -h * 0.03, torsoW * 0.48, 3 * z);
  if (style.outerwear === 'hoodie') {
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-4 * z, -h * 0.06);
    ctx.lineTo(-6 * z, h * 0.07);
    ctx.moveTo(4 * z, -h * 0.06);
    ctx.lineTo(6 * z, h * 0.07);
    ctx.stroke();
    ctx.strokeStyle = outline;
    ctx.strokeRect(-torsoW * 0.18, h * 0.01, torsoW * 0.36, torsoH * 0.2);
  } else if (style.outerwear === 'bomber') {
    ctx.fillStyle = dark;
    ctx.fillRect(-torsoW * 0.26, -h * 0.2, torsoW * 0.52, 5 * z);
    ctx.fillRect(-torsoW * 0.22, h * 0.07, torsoW * 0.44, 4 * z);
  } else if (style.outerwear === 'leather') {
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.18);
    ctx.lineTo(0, h * 0.1);
    ctx.moveTo(-torsoW * 0.18, -h * 0.16);
    ctx.lineTo(0, -h * 0.06);
    ctx.lineTo(torsoW * 0.18, -h * 0.16);
    ctx.stroke();
  } else if (style.outerwear === 'vest') {
    ctx.fillStyle = dark;
    ctx.fillRect(-torsoW * 0.32, -h * 0.18, torsoW * 0.12, torsoH * 0.68);
    ctx.fillRect(torsoW * 0.2, -h * 0.18, torsoW * 0.12, torsoH * 0.68);
  } else if (style.outerwear === 'coat') {
    ctx.fillStyle = accent2;
    ctx.fillRect(-torsoW * 0.38, -h * 0.18, 4 * z, torsoH * 0.92);
    ctx.fillRect(torsoW * 0.38 - 4 * z, -h * 0.18, 4 * z, torsoH * 0.92);
  }
  if (style.chest === 'equalizer') {
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = i % 2 === 0 ? accent2 : 'rgba(255,255,255,0.75)';
      ctx.fillRect(-torsoW * 0.18 + i * 7 * z, -h * 0.02 - (i % 3) * 3 * z, 4 * z, 10 * z + (i % 2) * 4 * z);
    }
  } else if (style.chest === 'diamond') {
    ctx.fillStyle = accent2;
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.06);
    ctx.lineTo(8 * z, h * 0.01);
    ctx.lineTo(0, h * 0.08);
    ctx.lineTo(-8 * z, h * 0.01);
    ctx.closePath();
    ctx.fill();
  } else if (style.chest === 'wave') {
    ctx.strokeStyle = accent2;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-torsoW * 0.18, h * 0.01);
    ctx.bezierCurveTo(-torsoW * 0.08, -h * 0.04, torsoW * 0.04, h * 0.05, torsoW * 0.18, -h * 0.01);
    ctx.stroke();
  } else if (style.chest === 'triangle') {
    // Avicii golden triangle
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.08);
    ctx.lineTo(6 * z, h * 0.04);
    ctx.lineTo(-6 * z, h * 0.04);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.2 * z;
    ctx.stroke();
  } else if (style.chest === 'circuit') {
    // Excision circuit board pattern
    ctx.strokeStyle = accent2;
    ctx.lineWidth = 1.2;
    // Horizontal lines
    ctx.beginPath();
    ctx.moveTo(-torsoW * 0.2, -h * 0.04);
    ctx.lineTo(torsoW * 0.2, -h * 0.04);
    ctx.moveTo(-torsoW * 0.2, h * 0.02);
    ctx.lineTo(torsoW * 0.2, h * 0.02);
    ctx.stroke();
    // Vertical lines
    ctx.beginPath();
    ctx.moveTo(-torsoW * 0.1, -h * 0.08);
    ctx.lineTo(-torsoW * 0.1, h * 0.06);
    ctx.moveTo(torsoW * 0.1, -h * 0.08);
    ctx.lineTo(torsoW * 0.1, h * 0.06);
    ctx.stroke();
    // Connection dots
    ctx.fillStyle = accent2;
    const dotPositions = [[-torsoW * 0.1, -h * 0.04], [torsoW * 0.1, -h * 0.04], [-torsoW * 0.1, h * 0.02], [torsoW * 0.1, h * 0.02]];
    for (const [dx, dy] of dotPositions) {
      ctx.beginPath();
      ctx.arc(dx, dy, 1.5 * z, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (style.chest === 'geometric') {
    // Zedd geometric shapes
    const geoRotation = t * 0.05;
    ctx.save();
    ctx.translate(0, -h * 0.02);
    ctx.rotate(geoRotation);
    ctx.fillStyle = accent2;
    // Small rotating triangles
    for (let i = 0; i < 3; i++) {
      const angle = (i / 3) * Math.PI * 2;
      ctx.save();
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, -3 * z);
      ctx.lineTo(3 * z, 3 * z);
      ctx.lineTo(-3 * z, 3 * z);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  const armW = w * (0.12 + bulk * 0.03);
  const armH = h * 0.27;
  let frontArmAngle = 0.18;
  let backArmAngle = -0.12;
  let bodyTilt = 0;

  if (p.state === 'attack' && p.attackData) {
    const frame = p.attackFrame;
    const atkType = p.attackKey || 'neutral';

    // Progress through attack phases
    const startupProg = Math.min(frame / p.attackData.startup, 1);
    const isActive = frame >= p.attackData.startup && frame < p.attackData.startup + p.attackData.active;
    const activeProg = isActive ? (frame - p.attackData.startup) / Math.max(1, p.attackData.active) : 0;

    if (atkType === 'neutral') {
      // Quick jab — front arm punches forward, back arm guards chest
      if (frame < p.attackData.startup) {
        frontArmAngle = -0.4;
        backArmAngle = -0.25;
        leftLegAngle = 0.08;
        rightLegAngle = -0.06;
      } else if (isActive) {
        frontArmAngle = 0.85;
        backArmAngle = 0.3;
        leftLegAngle = 0.12;
        rightLegAngle = -0.08;
        bodyTilt = 0.08;
      } else {
        frontArmAngle = 0.35;
        backArmAngle = 0.1;
        leftLegAngle = 0.06;
        rightLegAngle = -0.04;
      }
    } else if (atkType === 'forward') {
      // Big horizontal swing — both arms swing, torso rotation, legs spread
      if (frame < p.attackData.startup) {
        frontArmAngle = -0.6;
        backArmAngle = -0.5;
        bodyTilt = -0.15;
        leftLegAngle = 0.18;
        rightLegAngle = -0.12;
      } else if (isActive) {
        frontArmAngle = 1.2;
        backArmAngle = 0.8;
        bodyTilt = 0.25;
        leftLegAngle = 0.22;
        rightLegAngle = -0.18;
      } else {
        frontArmAngle = 0.4;
        backArmAngle = 0.15;
        bodyTilt = 0.05;
        leftLegAngle = 0.12;
        rightLegAngle = -0.08;
      }
    } else if (atkType === 'up') {
      // Uppercut — front arm swings upward, body leans back, legs compress then extend
      if (frame < p.attackData.startup) {
        frontArmAngle = -0.35;
        backArmAngle = -0.4;
        bodyTilt = -0.1;
        leftLegAngle = -0.15;
        rightLegAngle = 0.1;
      } else if (isActive) {
        frontArmAngle = 1.6;
        backArmAngle = -0.2;
        bodyTilt = -0.18;
        leftLegAngle = 0.02;
        rightLegAngle = 0.02;
      } else {
        frontArmAngle = 0.5;
        backArmAngle = -0.1;
        bodyTilt = -0.05;
        leftLegAngle = 0.05;
        rightLegAngle = 0.05;
      }
    } else if (atkType === 'down') {
      // Stomp/slam — arms swing downward, body crouches, legs spread wide
      if (frame < p.attackData.startup) {
        frontArmAngle = 0.2;
        backArmAngle = 0.15;
        bodyTilt = 0;
        leftLegAngle = -0.25;
        rightLegAngle = 0.2;
      } else if (isActive) {
        frontArmAngle = -0.8;
        backArmAngle = -0.7;
        bodyTilt = 0.2;
        leftLegAngle = -0.35;
        rightLegAngle = 0.3;
      } else {
        frontArmAngle = 0.1;
        backArmAngle = 0;
        bodyTilt = 0.05;
        leftLegAngle = -0.15;
        rightLegAngle = 0.12;
      }
    } else if (atkType === 'aerial') {
      // Spin kick — body rotates, legs extend, arms tuck
      if (frame < p.attackData.startup) {
        frontArmAngle = -0.5;
        backArmAngle = 0.3;
        bodyTilt = 0.3;
        leftLegAngle = 0.4;
        rightLegAngle = -0.3;
      } else if (isActive) {
        frontArmAngle = -0.2;
        backArmAngle = 0.5;
        bodyTilt = 0.6;
        leftLegAngle = 0.6;
        rightLegAngle = -0.5;
      } else {
        frontArmAngle = 0;
        backArmAngle = 0.2;
        bodyTilt = 0.2;
        leftLegAngle = 0.3;
        rightLegAngle = -0.2;
      }
    }
  } else if (p.state === 'grab' || p.state === 'grabbing') {
    frontArmAngle = 0.6;
    backArmAngle = 0.2;
  } else if (p.state === 'idle') {
    frontArmAngle += Math.sin(t * 0.04) * 0.05;
    backArmAngle += Math.cos(t * 0.04 + 1) * 0.05;
  }

  const drawProp = () => {
    if (!style.prop) return;
    if (style.prop === 'record') {
      ctx.fillStyle = '#12161f';
      ctx.beginPath();
      ctx.arc(0, armH * 0.42 + 2 * z, 8 * z, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = accent;
      ctx.beginPath();
      ctx.arc(0, armH * 0.42 + 2 * z, 2.5 * z, 0, Math.PI * 2);
      ctx.fill();
    } else if (style.prop === 'beam') {
      ctx.fillStyle = accent;
      ctx.fillRect(-2 * z, armH * 0.18, 4 * z, 14 * z);
      ctx.fillStyle = 'rgba(120,245,255,0.45)';
      ctx.fillRect(-1 * z, armH * 0.32, 2 * z, 18 * z);
    } else if (style.prop === 'mic') {
      ctx.fillStyle = '#bcc6d4';
      ctx.fillRect(-1.5 * z, armH * 0.1, 3 * z, 15 * z);
      ctx.beginPath();
      ctx.arc(0, armH * 0.08, 4 * z, 0, Math.PI * 2);
      ctx.fill();
    } else if (style.prop === 'wobble') {
      ctx.strokeStyle = style.glow || 'rgba(160,255,90,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-10 * z, armH * 0.32);
      ctx.bezierCurveTo(-4 * z, armH * 0.02, 4 * z, armH * 0.62, 10 * z, armH * 0.18);
      ctx.stroke();
    } else if (style.prop === 'slash') {
      ctx.strokeStyle = style.glow || 'rgba(146,104,255,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-10 * z, armH * 0.18);
      ctx.lineTo(8 * z, armH * 0.5);
      ctx.stroke();
    } else if (style.prop === 'pad') {
      ctx.fillStyle = '#f8fbff';
      ctx.fillRect(-6 * z, armH * 0.18, 12 * z, 10 * z);
      ctx.fillStyle = accent2;
      ctx.fillRect(-3 * z, armH * 0.22, 6 * z, 2 * z);
    } else if (style.prop === 'triangle') {
      // Avicii glowing triangle
      const triSize = 10 * z;
      ctx.fillStyle = accent;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(0, armH * 0.2 - triSize);
      ctx.lineTo(triSize, armH * 0.2 + triSize);
      ctx.lineTo(-triSize, armH * 0.2 + triSize);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1.0;
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5 * z;
      ctx.stroke();
      // Inner glow
      const triGlow = ctx.createRadialGradient(0, armH * 0.2, triSize * 0.3, 0, armH * 0.2, triSize * 1.2);
      triGlow.addColorStop(0, `rgba(245, 200, 66, 0.3)`);
      triGlow.addColorStop(1, 'rgba(245, 200, 66, 0)');
      ctx.fillStyle = triGlow;
      ctx.fillRect(-triSize * 1.4, armH * 0.2 - triSize * 1.4, triSize * 2.8, triSize * 2.8);
    } else if (style.prop === 'cannon') {
      // Excision bass cannon
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(-4 * z, armH * 0.15, 8 * z, 16 * z);
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(-3 * z, armH * 0.12, 6 * z, 3 * z);
      // Red energy glow at barrel
      const cannonGlow = ctx.createRadialGradient(0, armH * 0.12, 2 * z, 0, armH * 0.12, 10 * z);
      cannonGlow.addColorStop(0, 'rgba(255, 51, 51, 0.45)');
      cannonGlow.addColorStop(1, 'rgba(255, 51, 51, 0)');
      ctx.fillStyle = cannonGlow;
      ctx.fillRect(-10 * z, armH * 0.02, 20 * z, 20 * z);
    } else if (style.prop === 'cube') {
      // Zedd rotating geometric cube
      const cubeSize = 6 * z;
      const cubeRotation = t * 0.04;
      ctx.save();
      ctx.translate(0, armH * 0.3);
      ctx.rotate(cubeRotation);
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5 * z;
      // Wireframe cube
      ctx.beginPath();
      ctx.moveTo(-cubeSize, -cubeSize);
      ctx.lineTo(cubeSize, -cubeSize);
      ctx.lineTo(cubeSize, cubeSize);
      ctx.lineTo(-cubeSize, cubeSize);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-cubeSize * 0.6, -cubeSize * 0.6);
      ctx.lineTo(cubeSize * 0.6, -cubeSize * 0.6);
      ctx.lineTo(cubeSize * 0.6, cubeSize * 0.6);
      ctx.lineTo(-cubeSize * 0.6, cubeSize * 0.6);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-cubeSize, -cubeSize);
      ctx.lineTo(-cubeSize * 0.6, -cubeSize * 0.6);
      ctx.moveTo(cubeSize, -cubeSize);
      ctx.lineTo(cubeSize * 0.6, -cubeSize * 0.6);
      ctx.moveTo(cubeSize, cubeSize);
      ctx.lineTo(cubeSize * 0.6, cubeSize * 0.6);
      ctx.moveTo(-cubeSize, cubeSize);
      ctx.lineTo(-cubeSize * 0.6, cubeSize * 0.6);
      ctx.stroke();
      ctx.restore();
    } else if (style.prop === 'glitch') {
      // Aphex Twin glitchy static effect
      if (Math.random() < 0.15) {
        for (let i = 0; i < 4; i++) {
          const rx = (Math.random() - 0.5) * 12 * z;
          const ry = (Math.random() - 0.5) * 8 * z + armH * 0.3;
          const rw = Math.random() * 4 + 1;
          const rh = Math.random() * 3 + 1;
          ctx.fillStyle = ['#ff0000', '#00ff00', '#0000ff', '#ffff00'][Math.floor(Math.random() * 4)];
          ctx.globalAlpha = 0.7;
          ctx.fillRect(rx - rw / 2, ry - rh / 2, rw, rh);
          ctx.globalAlpha = 1.0;
        }
      }
    } else if (style.prop === 'controller') {
      // Calvin Harris DJ controller
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-8 * z, armH * 0.18, 16 * z, 12 * z);
      // Buttons/knobs
      ctx.fillStyle = accent;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(-6 * z + i * 5 * z, armH * 0.26, 2 * z, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = accent2;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(-6 * z + i * 5 * z, armH * 0.36, 1.5 * z, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (style.prop === 'tendrils') {
      // Rezz dark swirling tendrils
      ctx.strokeStyle = accent;
      ctx.lineWidth = 2 * z;
      ctx.globalAlpha = 0.7;
      for (let t2 = 0; t2 < 2; t2++) {
        ctx.beginPath();
        for (let x = -12 * z; x <= 12 * z; x += 3 * z) {
          const y = armH * 0.3 + Math.sin((x / (8 * z) + state.frameCount * 0.08 + t2) * 2) * 4 * z;
          if (x === -12 * z) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1.0;
    }
  };

  const drawArm = (xOffset, rotation, front) => {
    ctx.save();
    ctx.translate(xOffset, -h * 0.12);
    ctx.rotate(rotation);
    ctx.fillStyle = style.sleeveless ? skin : outfit;
    ctx.fillRect(-armW / 2, 0, armW, armH * 0.35);
    if (!style.sleeveless) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(-armW / 2 + 1, 2 * z, armW - 2, 2 * z);
    }
    ctx.strokeStyle = outline;
    ctx.lineWidth = lineW;
    ctx.strokeRect(-armW / 2, 0, armW, armH * 0.35);
    ctx.translate(0, armH * 0.34);
    ctx.rotate(front ? 0.18 : -0.12);
    ctx.fillStyle = style.gloves ? accent2 : skin;
    ctx.fillRect(-armW * 0.45, 0, armW * 0.9, armH * 0.48);
    ctx.fillStyle = front ? outfit : (style.sleeveless ? skin : outfit);
    ctx.fillRect(-armW * 0.45, 0, armW * 0.9, armH * 0.34);
    ctx.strokeStyle = outline;
    ctx.strokeRect(-armW * 0.45, 0, armW * 0.9, armH * 0.48);
    ctx.fillStyle = style.gloves ? accent : '#f0e2d8';
    ctx.fillRect(-armW * 0.52, armH * 0.48 - 5 * z, armW * 1.04, 6 * z);
    if (front && attackActive) {
      const burst = ctx.createRadialGradient(0, armH * 0.42, 0, 0, armH * 0.42, 16 * z);
      burst.addColorStop(0, style.glow || 'rgba(255,180,96,0.52)');
      burst.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = burst;
      ctx.fillRect(-16 * z, armH * 0.18, 32 * z, 32 * z);
    }
    if (front) drawProp();
    ctx.restore();
  };
  if (bodyTilt !== 0) { ctx.save(); ctx.rotate(bodyTilt); }

  drawArm(-torsoW * 0.36, -backArmAngle, false);
  drawArm(torsoW * 0.38, frontArmAngle, true);

  // Character-specific attack VFX during active frames
  if (p.state === 'attack' && p.attackData && p.attackFrame >= p.attackData.startup && p.attackFrame < p.attackData.startup + p.attackData.active) {
    const vfxProgress = (p.attackFrame - p.attackData.startup) / Math.max(1, p.attackData.active);
    const hb = p.attackData.hitbox;
    const vfxX = hb.ox;
    const vfxY = hb.oy - h * 0.08;
    const baseAlpha = ctx.globalAlpha;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    if (style.prop === 'record') {
      // deadmau5: Red/pink bass wave rings
      const ringCount = 4;
      for (let i = 0; i < ringCount; i++) {
        const ringRadius = (hb.w * 0.5 + i * hb.w * 0.3) * (0.5 + vfxProgress);
        const ringAlpha = Math.max(0, 0.4 - vfxProgress * 0.4);
        ctx.strokeStyle = `rgba(255, 93, 176, ${ringAlpha})`;
        ctx.lineWidth = 2 * z;
        ctx.beginPath();
        ctx.arc(vfxX, vfxY, ringRadius, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else if (style.prop === 'slash') {
      // skrillex: Purple electric slash trails
      ctx.strokeStyle = `rgba(146, 104, 255, ${Math.max(0, 0.6 - vfxProgress * 0.6)})`;
      ctx.lineWidth = 3 * z;
      for (let i = 0; i < 3; i++) {
        const offset = (i - 1) * hb.h * 0.2;
        ctx.beginPath();
        ctx.moveTo(vfxX - hb.w * 0.4, vfxY + offset - hb.h * 0.3);
        ctx.lineTo(vfxX + hb.w * 0.4, vfxY + offset + hb.h * 0.3);
        ctx.stroke();
      }
    } else if (style.prop === 'pad') {
      // marshmello: Orange/yellow bouncy hit pads
      const padSize = hb.w * (0.6 + vfxProgress * 0.4);
      const padAlpha = Math.max(0, 0.5 - vfxProgress * 0.5);
      ctx.fillStyle = `rgba(255, 179, 71, ${padAlpha})`;
      ctx.fillRect(vfxX - padSize / 2, vfxY - padSize / 2, padSize, padSize);
      ctx.fillStyle = `rgba(255, 200, 100, ${padAlpha * 0.6})`;
      ctx.fillRect(vfxX - padSize * 0.3, vfxY - padSize * 0.3, padSize * 0.6, padSize * 0.6);
    } else if (style.prop === 'beam') {
      // daftpunk: Cyan/gold laser beam lines
      ctx.strokeStyle = `rgba(120, 241, 255, ${Math.max(0, 0.7 - vfxProgress * 0.7)})`;
      ctx.lineWidth = 2 * z;
      ctx.beginPath();
      ctx.moveTo(vfxX, vfxY - hb.h * 0.4);
      ctx.lineTo(vfxX, vfxY + hb.h * 0.4);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255, 210, 130, ${Math.max(0, 0.5 - vfxProgress * 0.5)})`;
      ctx.lineWidth = 1 * z;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(vfxX + i * hb.w * 0.15, vfxY - hb.h * 0.3);
        ctx.lineTo(vfxX + i * hb.w * 0.15, vfxY + hb.h * 0.3);
        ctx.stroke();
      }
    } else if (style.prop === 'mic') {
      // tiesto: Blue trance energy waves
      ctx.strokeStyle = `rgba(100, 170, 255, ${Math.max(0, 0.6 - vfxProgress * 0.6)})`;
      ctx.lineWidth = 2 * z;
      for (let i = 0; i < 3; i++) {
        const waveOffset = i * hb.h * 0.25;
        ctx.beginPath();
        ctx.moveTo(vfxX - hb.w * 0.3, vfxY - hb.h * 0.3 + waveOffset);
        ctx.bezierCurveTo(vfxX - hb.w * 0.1, vfxY - hb.h * 0.4 + waveOffset, vfxX + hb.w * 0.1, vfxY - hb.h * 0.2 + waveOffset, vfxX + hb.w * 0.3, vfxY - hb.h * 0.3 + waveOffset);
        ctx.stroke();
      }
    } else if (style.prop === 'wobble') {
      // subtronics: Green wobble distortion
      ctx.strokeStyle = `rgba(160, 255, 90, ${Math.max(0, 0.6 - vfxProgress * 0.6)})`;
      ctx.lineWidth = 2 * z;
      for (let i = 0; i < 2; i++) {
        ctx.beginPath();
        for (let x = vfxX - hb.w * 0.4; x <= vfxX + hb.w * 0.4; x += hb.w * 0.1) {
          const y = vfxY + Math.sin((x / hb.w + state.frameCount * 0.1 + i) * 2) * hb.h * 0.2;
          if (x === vfxX - hb.w * 0.4) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    } else if (style.prop === 'triangle') {
      // Avicii: Golden triangle burst
      const triAlpha = Math.max(0, 0.5 - vfxProgress * 0.5);
      ctx.fillStyle = `rgba(245, 200, 66, ${triAlpha})`;
      for (let i = 0; i < 3; i++) {
        const triDist = hb.w * (0.4 + vfxProgress * 0.5);
        const triAngle = (Math.PI * 2 / 3) * i;
        const tx = vfxX + Math.cos(triAngle) * triDist;
        const ty = vfxY + Math.sin(triAngle) * triDist;
        const triSize = hb.w * (0.2 + vfxProgress * 0.1);
        ctx.beginPath();
        ctx.moveTo(tx, ty - triSize);
        ctx.lineTo(tx + triSize, ty + triSize);
        ctx.lineTo(tx - triSize, ty + triSize);
        ctx.closePath();
        ctx.fill();
      }
    } else if (style.prop === 'cannon') {
      // Excision: Red energy cannon burst
      const cannonAlpha = Math.max(0, 0.6 - vfxProgress * 0.6);
      ctx.fillStyle = `rgba(255, 51, 51, ${cannonAlpha})`;
      const ringCount = 3;
      for (let i = 0; i < ringCount; i++) {
        const ringRadius = (hb.w * 0.3 + i * hb.w * 0.25) * (0.5 + vfxProgress * 0.8);
        ctx.beginPath();
        ctx.arc(vfxX, vfxY, ringRadius, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (style.prop === 'cube') {
      // Zedd: Geometric cube fragments
      const cubeAlpha = Math.max(0, 0.5 - vfxProgress * 0.5);
      ctx.strokeStyle = `rgba(68, 136, 255, ${cubeAlpha})`;
      ctx.lineWidth = 2 * z;
      for (let i = 0; i < 4; i++) {
        const cubeAngle = (Math.PI / 2) * i;
        const cubeDist = hb.w * (0.3 + vfxProgress * 0.4);
        const cx = vfxX + Math.cos(cubeAngle) * cubeDist;
        const cy = vfxY + Math.sin(cubeAngle) * cubeDist;
        const cubeSize = hb.w * 0.15;
        ctx.beginPath();
        ctx.moveTo(cx - cubeSize, cy - cubeSize);
        ctx.lineTo(cx + cubeSize, cy - cubeSize);
        ctx.lineTo(cx + cubeSize, cy + cubeSize);
        ctx.lineTo(cx - cubeSize, cy + cubeSize);
        ctx.closePath();
        ctx.stroke();
      }
    } else if (style.prop === 'glitch') {
      // Aphex Twin: Chaotic glitch rectangles
      if (Math.random() < 0.2) {
        const glitchAlpha = Math.max(0, 0.4 - vfxProgress * 0.4);
        for (let i = 0; i < 5; i++) {
          const gx = vfxX + (Math.random() - 0.5) * hb.w;
          const gy = vfxY + (Math.random() - 0.5) * hb.h;
          const gw = (Math.random() + 0.5) * hb.w * 0.2;
          const gh = (Math.random() + 0.3) * hb.h * 0.15;
          ctx.fillStyle = ['rgba(255, 0, 0, ' + glitchAlpha + ')', 'rgba(0, 255, 0, ' + glitchAlpha + ')', 'rgba(0, 0, 255, ' + glitchAlpha + ')'][Math.floor(Math.random() * 3)];
          ctx.fillRect(gx - gw / 2, gy - gh / 2, gw, gh);
        }
      }
    } else if (style.prop === 'controller') {
      // Calvin Harris: Orange and blue button burst
      const ctrlAlpha = Math.max(0, 0.5 - vfxProgress * 0.5);
      const buttonCount = 6;
      for (let i = 0; i < buttonCount; i++) {
        const btnAngle = (Math.PI * 2 / buttonCount) * i;
        const btnDist = hb.w * (0.3 + vfxProgress * 0.5);
        const bx = vfxX + Math.cos(btnAngle) * btnDist;
        const by = vfxY + Math.sin(btnAngle) * btnDist;

    ctx.fillStyle = '#1a1520';
    ctx.beginPath();
    ctx.moveTo(-headR * 0.78, headY - headR * 0.32);
    ctx.bezierCurveTo(-headR * 1.0, headY - headR * 0.88, -headR * 0.72, headY + headR * 0.7, -headR * 0.42, headY + headR * 0.88);
    ctx.lineTo(-headR * 0.32, headY + headR * 0.68);
    ctx.bezierCurveTo(-headR * 0.56, headY + 0.4, -headR * 0.52, headY - headR * 0.48, -headR * 0.62, headY - headR * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headR * 0.78, headY - headR * 0.32);
    ctx.bezierCurveTo(headR * 1.0, headY - headR * 0.88, headR * 0.72, headY + headR * 0.7, headR * 0.42, headY + headR * 0.88);
    ctx.lineTo(headR * 0.32, headY + headR * 0.68);
    ctx.bezierCurveTo(headR * 0.56, headY + 0.4, headR * 0.52, headY - headR * 0.48, headR * 0.62, headY - headR * 0.1);
    ctx.closePath();
    ctx.fill();

    // Large round goggle frames with animated spiral
    const goggleR = headR * 0.26;
    const lGoggleX = -headR * 0.32;
    const rGoggleX = headR * 0.32;
    const goggleY = headY - headR * 0.12;

    // Purple glow halo around goggles
    const goggleGlow = ctx.createRadialGradient(lGoggleX, goggleY, goggleR * 0.6, lGoggleX, goggleY, goggleR * 1.3);
    goggleGlow.addColorStop(0, 'rgba(153, 51, 255, 0.2)');
    goggleGlow.addColorStop(1, 'rgba(153, 51, 255, 0)');
    ctx.fillStyle = goggleGlow;
    ctx.fillRect(lGoggleX - goggleR * 1.5, goggleY - goggleR * 1.5, goggleR * 3, goggleR * 3);
    const goggleGlow2 = ctx.createRadialGradient(rGoggleX, goggleY, goggleR * 0.6, rGoggleX, goggleY, goggleR * 1.3);
    goggleGlow2.addColorStop(0, 'rgba(153, 51, 255, 0.2)');
    goggleGlow2.addColorStop(1, 'rgba(153, 51, 255, 0)');
    ctx.fillStyle = goggleGlow2;
    ctx.fillRect(rGoggleX - goggleR * 1.5, goggleY - goggleR * 1.5, goggleR * 3, goggleR * 3);

    // Goggle frames (thick circles)
    ctx.strokeStyle = accent;
    ctx.lineWidth = Math.max(2, 2.4 * z);
    ctx.beginPath();
    ctx.arc(lGoggleX, goggleY, goggleR, 0, Math.PI * 2);
    ctx.arc(rGoggleX, goggleY, goggleR, 0, Math.PI * 2);
    ctx.stroke();

    // Spiral animation inside each goggle
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    const spiralPhase = t * 0.12;
    for (let g = 0; g < 2; g++) {
      const cx = g === 0 ? lGoggleX : rGoggleX;
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const r = goggleR * (0.2 + i * 0.25);
        const a1 = spiralPhase + i * Math.PI * 0.4;
        const a2 = a1 + Math.PI * 0.6;
        ctx.arc(cx, goggleY, r, a1, a2, false);
      }
      ctx.stroke();
    }

    // Dark lipstick arc on mouth
    ctx.fillStyle = '#cc3366';
    const mouthY = headY + headR * 0.42;
    ctx.beginPath();
    ctx.arc(0, mouthY, headR * 0.15, 0.1, Math.PI - 0.1);
    ctx.fill();

    // Head outline
    ctx.strokeStyle = outline;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    ctx.ellipse(0, headY, headR * 0.92, headR * 0.98, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // --- Human heads (Skrillex, Tiesto, Subtronics) ---
    // Head shape — slightly oval, with jaw
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.ellipse(0, headY, headR * 0.96, headR, 0, 0, Math.PI * 2);
    ctx.fill();

    // Subtle skin shading (nose/cheek area)
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.beginPath();
    ctx.ellipse(headR * 0.12, headY + headR * 0.18, headR * 0.42, headR * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();

    // Jaw definition
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, headY + headR * 0.08, headR * 0.82, 0.35, Math.PI - 0.35);
    ctx.stroke();

    // Ear bumps
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.ellipse(-headR * 0.92, headY + headR * 0.05, headR * 0.12, headR * 0.22, 0, 0, Math.PI * 2);
    ctx.ellipse(headR * 0.92, headY + headR * 0.05, headR * 0.12, headR * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Headphones (Tiesto)
    if (style.headphones) {
      // Headband
      ctx.strokeStyle = dark;
      ctx.lineWidth = Math.max(2.5, 3 * z);
      ctx.beginPath();
      ctx.arc(0, headY - 3 * z, headR * 0.92, Math.PI * 1.08, Math.PI * 1.92);
      ctx.stroke();
      // Headband highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = Math.max(1, 1 * z);
      ctx.beginPath();
      ctx.arc(0, headY - 3 * z, headR * 0.88, Math.PI * 1.2, Math.PI * 1.8);
      ctx.stroke();
      // Ear cups
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.88, headY + 2 * z, 7 * z, 9 * z, 0, 0, Math.PI * 2);
      ctx.ellipse(headR * 0.88, headY + 2 * z, 7 * z, 9 * z, 0, 0, Math.PI * 2);
      ctx.fill();
      // Cup accent ring
      ctx.fillStyle = accent2;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.88, headY + 2 * z, 4 * z, 5.5 * z, 0, 0, Math.PI * 2);
      ctx.ellipse(headR * 0.88, headY + 2 * z, 4 * z, 5.5 * z, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.88, headY + 2 * z, 2 * z, 3 * z, 0, 0, Math.PI * 2);
      ctx.ellipse(headR * 0.88, headY + 2 * z, 2 * z, 3 * z, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Hair styles
    if (style.hair === 'sidecut') {
      // Skrillex — long hair swept to one side, shaved on the other
      // Shaved side (right) — subtle stubble
      ctx.fillStyle = 'rgba(20,18,30,0.25)';
      ctx.beginPath();
      ctx.arc(0, headY, headR * 0.96, -Math.PI * 0.42, Math.PI * 0.08);
      ctx.lineTo(headR * 0.4, headY - headR * 0.1);
      ctx.closePath();
      ctx.fill();

      // Long hair side (left) — flowing strands
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.88, headY + headR * 0.22);
      ctx.bezierCurveTo(-headR * 1.02, headY - headR * 0.2, -headR * 0.62, headY - headR * 1.04, headR * 0.08, headY - headR * 1.02);
      ctx.lineTo(headR * 0.28, headY - headR * 0.82);
      ctx.bezierCurveTo(-headR * 0.12, headY - headR * 0.72, -headR * 0.68, headY - headR * 0.56, -headR * 0.72, headY + headR * 0.06);
      ctx.closePath();
      ctx.fill();

      // Hair strand highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.bezierCurveTo(-headR * 0.86, headY - headR * 0.1, -headR * 0.52, headY - headR * 0.78, headR * 0.02, headY - headR * 0.88);
      ctx.stroke();

      // Accent streak
      ctx.fillStyle = accent2;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.42, headY - headR * 0.62);
      ctx.lineTo(-headR * 0.28, headY - headR * 0.72);
      ctx.lineTo(-headR * 0.36, headY - headR * 0.36);
      ctx.closePath();
      ctx.fill();

    } else if (style.hair === 'short') {
      // Tiesto — neat short styled hair
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.78, headY - headR * 0.28);
      ctx.bezierCurveTo(-headR * 0.72, headY - headR * 0.88, headR * 0.36, headY - headR * 1.02, headR * 0.82, headY - headR * 0.24);
      ctx.lineTo(headR * 0.76, headY - headR * 0.08);
      ctx.bezierCurveTo(headR * 0.38, headY - headR * 0.68, -headR * 0.42, headY - headR * 0.58, -headR * 0.72, headY - headR * 0.1);
      ctx.closePath();
      ctx.fill();
      // Subtle part line
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.18, headY - headR * 0.92);
      ctx.lineTo(-headR * 0.08, headY - headR * 0.42);
      ctx.stroke();

    } else if (style.hair === 'quiff') {
      // Calvin Harris — styled quiff swept up
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.72, headY - headR * 0.24);
      ctx.bezierCurveTo(-headR * 0.82, headY - headR * 1.02, headR * 0.28, headY - headR * 1.18, headR * 0.76, headY - headR * 0.32);
      ctx.lineTo(headR * 0.68, headY - headR * 0.06);
      ctx.bezierCurveTo(headR * 0.32, headY - headR * 0.62, -headR * 0.38, headY - headR * 0.52, -headR * 0.62, headY - headR * 0.08);
      ctx.closePath();
      ctx.fill();
      // Stubble on jaw
      ctx.fillStyle = 'rgba(20, 18, 30, 0.3)';
      ctx.beginPath();
      ctx.arc(0, headY + headR * 0.32, headR * 0.52, 0.3, Math.PI - 0.3);
      ctx.lineTo(headR * 0.4, headY + headR * 0.32);
      ctx.lineTo(-headR * 0.4, headY + headR * 0.32);
      ctx.closePath();
      ctx.fill();

    } else if (style.hair === 'capgoggles') {
      // Subtronics — backwards cap with goggles pushed up
      // Cap brim (backwards)
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(headR * 0.42, headY - headR * 0.62);
      ctx.lineTo(headR * 1.22, headY - headR * 0.38);
      ctx.lineTo(headR * 1.18, headY - headR * 0.22);
      ctx.lineTo(headR * 0.46, headY - headR * 0.42);
      ctx.closePath();
      ctx.fill();
      // Cap body
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.arc(0, headY - headR * 0.12, headR * 0.98, Math.PI * 1.0, Math.PI * 2.0);
      ctx.closePath();
      ctx.fill();
      // Cap panel line
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, headY - headR * 1.08);
      ctx.lineTo(0, headY - headR * 0.14);
      ctx.stroke();
      // Accent stripe on cap
      ctx.fillStyle = accent2;
      ctx.beginPath();
      ctx.arc(0, headY - headR * 0.12, headR * 0.96, Math.PI * 1.22, Math.PI * 1.38);
      ctx.arc(0, headY - headR * 0.12, headR * 0.82, Math.PI * 1.38, Math.PI * 1.22, true);
      ctx.closePath();
      ctx.fill();

      // Goggles pushed up on forehead
      ctx.strokeStyle = accent2;
      ctx.lineWidth = Math.max(2, 2.2 * z);
      // Goggle strap
      ctx.beginPath();
      ctx.arc(0, headY - headR * 0.18, headR * 0.72, Math.PI * 1.12, Math.PI * 1.88);
      ctx.stroke();
      // Goggle lenses
      ctx.fillStyle = 'rgba(40,50,60,0.85)';
      ctx.strokeStyle = accent2;
      ctx.lineWidth = Math.max(1.5, 1.8 * z);
      ctx.beginPath();
      ctx.arc(-headR * 0.28, headY - headR * 0.58, headR * 0.18, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.arc(headR * 0.28, headY - headR * 0.58, headR * 0.18, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Lens glint
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.beginPath();
      ctx.arc(-headR * 0.24, headY - headR * 0.62, headR * 0.06, 0, Math.PI * 2);
      ctx.arc(headR * 0.32, headY - headR * 0.62, headR * 0.06, 0, Math.PI * 2);
      ctx.fill();

      // Some messy hair peeking out
      ctx.fillStyle = '#3a2820';
      ctx.beginPath();
      ctx.moveTo(-headR * 0.72, headY - headR * 0.22);
      ctx.lineTo(-headR * 0.88, headY + headR * 0.08);
      ctx.lineTo(-headR * 0.62, headY + headR * 0.02);
      ctx.closePath();
      ctx.fill();
    }

    // Eyes — expressive with whites, irises, and pupils
    const eyeW = headR * 0.2;
    const eyeH = headR * 0.14;
    const lEyeX = -headR * 0.3;
    const rEyeX = headR * 0.3;
    const eyeBaseY = headY + headR * 0.0;
    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(lEyeX, eyeBaseY, eyeW, eyeH, 0, 0, Math.PI * 2);
    ctx.ellipse(rEyeX, eyeBaseY, eyeW, eyeH, 0, 0, Math.PI * 2);
    ctx.fill();
    // Irises
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(lEyeX + 1 * z, eyeBaseY, eyeH * 0.72, 0, Math.PI * 2);
    ctx.arc(rEyeX + 1 * z, eyeBaseY, eyeH * 0.72, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(lEyeX + 1.5 * z, eyeBaseY, eyeH * 0.36, 0, Math.PI * 2);
    ctx.arc(rEyeX + 1.5 * z, eyeBaseY, eyeH * 0.36, 0, Math.PI * 2);
    ctx.fill();
    // Eye glint
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(lEyeX - 1 * z, eyeBaseY - eyeH * 0.25, eyeH * 0.2, 0, Math.PI * 2);
    ctx.arc(rEyeX - 1 * z, eyeBaseY - eyeH * 0.25, eyeH * 0.2, 0, Math.PI * 2);
    ctx.fill();
    // Eyebrows
    ctx.strokeStyle = dark;
    ctx.lineWidth = Math.max(1.5, 1.8 * z);
    ctx.beginPath();
    ctx.moveTo(lEyeX - eyeW * 0.8, eyeBaseY - eyeH * 1.6);
    ctx.lineTo(lEyeX + eyeW * 0.6, eyeBaseY - eyeH * 1.8);
    ctx.moveTo(rEyeX - eyeW * 0.6, eyeBaseY - eyeH * 1.8);
    ctx.lineTo(rEyeX + eyeW * 0.8, eyeBaseY - eyeH * 1.6);
    ctx.stroke();

    // Glasses (Zedd — round frames)
    if (style.glasses) {
      const glassR = eyeW * 1.1;
      const glassBridge = 4 * z;
      ctx.strokeStyle = dark;
      ctx.lineWidth = Math.max(2, 2.2 * z);
      // Left lens frame
      ctx.beginPath();
      ctx.arc(lEyeX, eyeBaseY, glassR, 0, Math.PI * 2);
      ctx.stroke();
      // Right lens frame
      ctx.beginPath();
      ctx.arc(rEyeX, eyeBaseY, glassR, 0, Math.PI * 2);
      ctx.stroke();
      // Bridge
      ctx.beginPath();
      ctx.moveTo(lEyeX + glassR - glassBridge, eyeBaseY);
      ctx.lineTo(rEyeX - glassR + glassBridge, eyeBaseY);
      ctx.stroke();
      // Lens glint
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(lEyeX - glassR * 0.35, eyeBaseY - glassR * 0.35, glassR * 0.28, 0, Math.PI * 2);
      ctx.arc(rEyeX - glassR * 0.35, eyeBaseY - glassR * 0.35, glassR * 0.28, 0, Math.PI * 2);
      ctx.fill();
    }

    // Shades (Calvin Harris — rectangular dark sunglasses)
    if (style.shades) {
      const shadeW = eyeW * 1.3;
      const shadeH = eyeH * 1.0;
      const shadeBridge = 5 * z;
      ctx.fillStyle = '#1a1a1a';
      // Left lens
      ctx.fillRect(lEyeX - shadeW / 2, eyeBaseY - shadeH / 2, shadeW, shadeH);
      // Right lens
      ctx.fillRect(rEyeX - shadeW / 2, eyeBaseY - shadeH / 2, shadeW, shadeH);
      // Frames
      ctx.strokeStyle = dark;
      ctx.lineWidth = Math.max(1, 1.5 * z);
      ctx.strokeRect(lEyeX - shadeW / 2, eyeBaseY - shadeH / 2, shadeW, shadeH);
      ctx.strokeRect(rEyeX - shadeW / 2, eyeBaseY - shadeH / 2, shadeW, shadeH);
      // Bridge
      ctx.beginPath();
      ctx.moveTo(lEyeX + shadeW / 2, eyeBaseY);
      ctx.lineTo(rEyeX - shadeW / 2, eyeBaseY);
      ctx.stroke();
      // Glint
      ctx.fillStyle = 'rgba(200, 200, 200, 0.25)';
      ctx.fillRect(lEyeX - shadeW / 3, eyeBaseY - shadeH / 3, shadeW * 0.4, shadeH * 0.35);
      ctx.fillRect(rEyeX - shadeW / 3, eyeBaseY - shadeH / 3, shadeW * 0.4, shadeH * 0.35);
    }

    // Nose
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, eyeBaseY + headR * 0.04);
    ctx.lineTo(-headR * 0.06, eyeBaseY + headR * 0.2);
    ctx.lineTo(headR * 0.04, eyeBaseY + headR * 0.2);
    ctx.stroke();

    // Mouth — slight confident smirk
    ctx.strokeStyle = dark;
    ctx.lineWidth = Math.max(1.2, 1.4 * z);
    ctx.beginPath();
    ctx.moveTo(-headR * 0.2, headY + headR * 0.42);
    ctx.bezierCurveTo(-headR * 0.08, headY + headR * 0.52, headR * 0.12, headY + headR * 0.5, headR * 0.2, headY + headR * 0.4);
    ctx.stroke();

    // Head outline
    ctx.strokeStyle = outline;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    ctx.ellipse(0, headY, headR * 0.96, headR, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (bodyTilt !== 0) ctx.restore();

  if (p.state === 'shield') {
    const shieldR = (p.shieldHP / 100) * 28 * z;
    const shieldHealthRatio = p.shieldHP / 100;
    const shieldCenterY = -h * 0.04;

    // Draw hexagonal shield
    const hexPoints = 6;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Pulsing glow intensity — stronger as shield HP drops
    const glowIntensity = Math.max(0.3, 1 - shieldHealthRatio);
    const glowBase = style.shieldStroke || 'rgba(120,220,255,0.55)';
    const glowColor = glowBase.replace('0.55', (0.55 + glowIntensity * 0.45).toFixed(2));

    // Draw outer hexagon
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 3 * z;
    ctx.beginPath();
    for (let i = 0; i < hexPoints; i++) {
      const angle = (i / hexPoints) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(angle) * shieldR;
      const y = Math.sin(angle) * shieldR + shieldCenterY;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();

    // Honeycomb pattern inside
    const honeycombIntensity = Math.sin(t * 0.08) * 0.1 + 0.2;
    ctx.strokeStyle = `rgba(120, 220, 255, ${honeycombIntensity})`;
    ctx.lineWidth = 1 * z;
    const cellSize = shieldR * 0.4;
    for (let i = 0; i < 2; i++) {
      ctx.beginPath();
      ctx.arc(0, shieldCenterY, shieldR * (0.3 + i * 0.35), 0, Math.PI * 2);
      ctx.stroke();
    }
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const x1 = Math.cos(angle) * shieldR * 0.3;
      const y1 = Math.sin(angle) * shieldR * 0.3 + shieldCenterY;
      const x2 = Math.cos(angle) * shieldR * 0.65;
      const y2 = Math.sin(angle) * shieldR * 0.65 + shieldCenterY;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // Semi-transparent fill
    const fillColor = style.shieldFill || 'rgba(120,180,255,0.28)';
    const fillAlpha = Math.min(1, shieldHealthRatio + 0.2);
    const fillColorAdjusted = fillColor.replace(/0\.28/, fillAlpha.toFixed(2));
    ctx.fillStyle = fillColorAdjusted;
    ctx.beginPath();
    for (let i = 0; i < hexPoints; i++) {
      const angle = (i / hexPoints) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(angle) * shieldR;
      const y = Math.sin(angle) * shieldR + shieldCenterY;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}
