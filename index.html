function createTourState() {
  return {
    runId: DEFAULT_TOUR_RUN_ID,
    currentLegIndex: 0,
    completedLegs: 0,
    losses: 0,
    rewardState: '',
    active: false,
    completed: false,
    playerFighter: null,
    lastOutcome: null,
  };
}

function normalizeTourStorage(raw) {
  const bestClears = raw && typeof raw.bestClears === 'object' ? raw.bestClears : {};
  const activeRun = raw && raw.activeRun && TOUR_RUNS[raw.activeRun.runId] ? raw.activeRun : null;
  return { activeRun, bestClears };
}

let tourStorage = { activeRun: null, bestClears: {} };
function loadTourStorage() {
  try {
    const s = localStorage.getItem(TOUR_STORAGE_KEY);
    if (s) tourStorage = normalizeTourStorage(JSON.parse(s));
  } catch {}
}
function saveTourStorage() {
  try { localStorage.setItem(TOUR_STORAGE_KEY, JSON.stringify(tourStorage)); } catch {}
}
loadTourStorage();

function getTourRun(runId) {
  return TOUR_RUNS[runId] || TOUR_RUNS[DEFAULT_TOUR_RUN_ID];
}

function getTourLeg(runId, legIndex) {
  const run = getTourRun(runId);
  return run.legs[legIndex] || null;
}

function getActiveTourLeg() {
  return getTourLeg(state.tourState.runId, state.tourState.currentLegIndex);
}

function getTourProgressForSave() {
  const legAdvance = state.tourState.lastOutcome === 'advance' ? 1 : 0;
  const run = getTourRun(state.tourState.runId);
  return {
    runId: state.tourState.runId,
    currentLegIndex: Math.min(state.tourState.currentLegIndex + legAdvance, run.legs.length - 1),
    completedLegs: Math.max(state.tourState.completedLegs, state.tourState.currentLegIndex + legAdvance),
    losses: state.tourState.losses,
    rewardState: state.tourState.rewardState,
    active: true,
    completed: false,
    playerFighter: state.tourState.playerFighter || state.p1Fighter || FIGHTER_KEYS[0],
  };
}

function persistActiveTourProgress() {
  if (state.tourState.active && !state.tourState.completed) {
    tourStorage.activeRun = getTourProgressForSave();
    saveTourStorage();
  }
}

function clearSavedTourProgress() {
  tourStorage.activeRun = null;
  saveTourStorage();
}

function getTourMedal(losses) {
  if (losses <= 0) return { key: 'gold', label: 'Gold Headliner' };
  if (losses === 1) return { key: 'silver', label: 'Silver Headliner' };
  return { key: 'bronze', label: 'Bronze Headliner' };
}

function updateBestTourClear() {
  const run = getTourRun(state.tourState.runId);
  const medal = getTourMedal(state.tourState.losses);
  const candidate = {
    fighter: state.tourState.playerFighter || state.p1Fighter,
    losses: state.tourState.losses,
    medal: medal.key,
    rewardState: state.tourState.rewardState || run.completionReward,
    clearedAt: new Date().toISOString().slice(0, 10),
  };
  const existing = tourStorage.bestClears[state.tourState.runId];
  if (!existing || candidate.losses < existing.losses) {
    tourStorage.bestClears[state.tourState.runId] = candidate;
    saveTourStorage();
  }
}

// --- Input Manager ---
const keys = {};
const justPressed = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

const DEFAULT_P1_BINDS = { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', attack: 'KeyJ', attack2: 'Space', special: 'KeyK', shield: 'KeyL' };
const DEFAULT_P2_BINDS = {
  left: 'ArrowLeft',
  right: 'ArrowRight',
  up: 'ArrowUp',
  down: 'ArrowDown',
  attack: ['Period', 'Numpad1'],
  special: ['Slash', 'Numpad2'],
  shield: ['Semicolon', 'Numpad3'],
};
function getP1Binds() { return options.p1Binds || DEFAULT_P1_BINDS; }
function getP2Binds() { return options.p2Binds || DEFAULT_P2_BINDS; }

function bindCodes(bind) {
  if (!bind) return [];
  return Array.isArray(bind) ? bind : [bind];
}

function isBindActive(bind) {
  return bindCodes(bind).some(code => !!keys[code]);
}

function wasBindJustPressed(bind) {
  return bindCodes(bind).some(code => !!justPressed[code]);
}

function menuConfirmPressed() {
  const p1b = getP1Binds();
  const p2b = getP2Binds();
  return (
    justPressed['Enter'] ||
    wasBindJustPressed(p1b.attack) ||
    wasBindJustPressed(p1b.attack2) ||
    wasBindJustPressed(p2b.attack) ||
    wasBindJustPressed(p2b.attack2)
  );
}

function getInput(binds) {
  return {
    left: isBindActive(binds.left),
    right: isBindActive(binds.right),
    up: isBindActive(binds.up),
    down: isBindActive(binds.down),
    attack: isBindActive(binds.attack) || isBindActive(binds.attack2),
    special: isBindActive(binds.special),
    shield: isBindActive(binds.shield),
  };
}

// --- Gamepad ---
function getGamepadInput(padIndex) {
  let pads = [];
  try { pads = navigator.getGamepads ? navigator.getGamepads() : []; } catch(e) {}
  const gp = pads[padIndex];
  if (!gp) return null;
  const deadzone = 0.3;
  const lx = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0;
  const ly = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
  return {
    left: lx < -deadzone || (gp.buttons[14] && gp.buttons[14].pressed),
    right: lx > deadzone || (gp.buttons[15] && gp.buttons[15].pressed),
    up: ly < -deadzone || (gp.buttons[12] && gp.buttons[12].pressed),
    down: ly > deadzone || (gp.buttons[13] && gp.buttons[13].pressed),
    attack: (gp.buttons[2] && gp.buttons[2].pressed),  // X
    special: (gp.buttons[3] && gp.buttons[3].pressed),  // Y
    shield: (gp.buttons[5] && gp.buttons[5].pressed) || (gp.buttons[7] && gp.buttons[7].pressed), // R1/R2
    jump: (gp.buttons[0] && gp.buttons[0].pressed), // A
  };
}

function triggerRumble(padIndex, intensity, duration) {
  try {
    let pads = [];
    try { pads = navigator.getGamepads ? navigator.getGamepads() : []; } catch(e) { return; }
    const gp = pads[padIndex];
    if (gp && gp.vibrationActuator) {
      gp.vibrationActuator.playEffect('dual-rumble', {
        duration, strongMagnitude: intensity, weakMagnitude: intensity * 0.5
      });
    }
  } catch {}
}

function mergeInput(a, b) {
  if (!b) return a;
  return {
    left: a.left || b.left, right: a.right || b.right,
    up: a.up || b.up || !!b.jump, down: a.down || b.down,
    attack: a.attack || b.attack, special: a.special || b.special,
    shield: a.shield || b.shield,
  };
}

// --- CPU AI ---
function getCPUInput(p) {
  const other = state.players[1 - p.idx];
  if (!other || other.state === 'dead') return { left: false, right: false, up: false, down: false, attack: false, special: false, shield: false };

  const cpu = p.cpuState;
  cpu.actionTimer--;
  if (cpu.actionTimer > 0 && cpu.currentInput) return cpu.currentInput;

  const delay = p.cpuLevel === 1 ? 30 : p.cpuLevel === 3 ? 15 : 5;
  cpu.actionTimer = delay + Math.floor(Math.random() * 5);

  const dx = other.x - p.x;
  const dy = other.y - p.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const input = { left: false, right: false, up: false, down: false, attack: false, special: false, shield: false };

  // Recovery: if offstage, jump toward center
  const onStage = p.x > BLAST.left + 100 && p.x < BLAST.right - 100 && p.y < BLAST.bottom - 50;
  if (!onStage || p.y > 250) {
    input.up = p.jumpsLeft > 0;
    if (p.x < -50) input.right = true;
    else if (p.x > 50) input.left = true;
    cpu.currentInput = input;
    return input;
  }

  // Hitstun DI
  if (p.state === 'hitstun') {
    if (p.x < 0) input.right = true; else input.left = true;
    if (p.y < 0) input.down = true; else input.up = true;
    cpu.currentInput = input;
    return input;
  }

  // Defense
  if (other.state === 'attack' && dist < 120 && p.cpuLevel >= 3) {
    if (Math.random() < (p.cpuLevel >= 5 ? 0.6 : 0.3)) {
      input.shield = true;
      cpu.currentInput = input;
      return input;
    }
  }

  // Close range: attack
  if (dist < 80) {
    if (dx > 0) input.right = true; else input.left = true;
    const r = Math.random();
    if (r < 0.4) input.attack = true;
    else if (r < 0.55) { input.attack = true; input.up = true; }
    else if (r < 0.7) { input.attack = true; if (dx > 0) input.right = true; else input.left = true; }
    else if (r < 0.8 && p.cpuLevel >= 3) input.special = true; // grab attempt
    cpu.currentInput = input;
    return input;
  }

  // Mid range: approach
  if (dist < 200) {
    if (dx > 0) input.right = true; else input.left = true;
    if (Math.random() < 0.15) input.up = true; // jump approach
    cpu.currentInput = input;
    return input;
  }

  // Far range: walk toward, occasional jump
  if (dx > 0) input.right = true; else input.left = true;
  if (Math.random() < 0.08) input.up = true;
  cpu.currentInput = input;
  return input;
}

// --- Player Factory ---
function createPlayer(idx, fighterKey, spawn, controlType, cpuLevel, useAltColor) {
  const def = FIGHTER_DEFS[fighterKey];
  return {
    idx,
    fighterKey,
    def,
    x: spawn.x, y: spawn.y,
    vx: 0, vy: 0,
    w: def.w, h: def.h,
    facing: idx === 0 ? 1 : -1,
    grounded: false,
    jumpsLeft: def.maxJumps || MAX_JUMPS,
    damage: 0,
    stocks: STARTING_STOCKS,
    score: 0,
    state: 'idle',
    stateTimer: 0,
    attackData: null,
    attackFrame: 0,
    hitRegistered: false,
    shieldHP: 100,
    shieldActive: false,
    invincible: 0,
    dodgeCooldown: 0,
    prevAttack: false,
    prevJump: false,
    prevSpecial: false,
    prevShield: false,
    // Input buffer
    inputBuffer: { attack: 0, jump: 0 },
    // Run
    runTimer: 0,
    moveDir: 0, // -1, 0, 1
    // Grab
    grabTarget: -1,
    grabTimer: 0,
    // Dodge
    usedAirDodge: false,
    specialFall: false,
    // DI
    diActive: false,
    // Coyote time & jump squat
    coyoteTimer: 0, // frames since last grounded
    jumpSquatTimer: 0, // frames remaining in jump squat
    jumpSquatForce: 0, // stored jump force for after squat
    // Landing lag
    landingLag: 0, // frames of mechanical landing lag remaining
    aerialAttackActive: false, // was in active aerial frames when landing
    // Tumble & afterimages
    tumbling: false, // in tumble state (high KB)
    afterimages: [], // [{x, y, alpha, facing}]
    // Ledge
    onLedge: false,
    ledgeTimer: 0,
    ledgeSide: 0, // -1 left, 1 right
    // Pivot
    pivotTimer: 0,
    pivotDir: 0,
    // Hitstop tracking (for asymmetric hitlag)
    personalHitstop: 0,
    // Visual
    squish: { sx: 1, sy: 1, timer: 0 },
    useAltColor: useAltColor || false,
    // Control
    controlType: controlType || 'human', // 'human' or 'cpu'
    cpuLevel: cpuLevel || 3,
    cpuState: { actionTimer: 0, currentInput: null },
    gamepadIndex: null,
  };
}

function cloneAttackData(attack) {
  return {
    ...attack,
    hitbox: { ...attack.hitbox },
  };
}

// --- Centralized Physics ---
function applyPhysics(p, dt, opts) {
  const drift = (opts && opts.driftFactor !== undefined) ? opts.driftFactor : 1;
  const fric = (opts && opts.frictionOverride !== undefined) ? opts.frictionOverride : null;
  p.vy += GRAVITY * dt;
  if (p.vy > TERMINAL_VEL) p.vy = TERMINAL_VEL;
  p.x += p.vx * dt * drift;
  p.y += p.vy * dt;
  if (fric !== null) p.vx *= fric;
}

// --- Particle System ---
const PARTICLE_POOL_SIZE = 600;
const particlePool = [];
for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
  particlePool.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '#fff', size: 3, gravity: 0 });
}

function spawnParticle(x, y, vx, vy, life, color, size, gravity) {
  for (const p of particlePool) {
    if (!p.active) {
      p.active = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life; p.color = color; p.size = size || 3; p.gravity = gravity || 0;
      return p;
    }
  }
  return null;
}

function spawnHitSparks(x, y, count, color, dirBias) {
  // dirBias: -1 or 1 to bias spark direction (opposite attacker facing)
  const biasAngle = dirBias ? (dirBias < 0 ? Math.PI : 0) : null;
  for (let i = 0; i < count; i++) {
    let a;
    if (biasAngle !== null) {
      // Bias: 60% of sparks within ±60° of bias direction, rest random
      a = Math.random() < 0.6
        ? biasAngle + (Math.random() - 0.5) * Math.PI * 0.67
        : Math.random() * Math.PI * 2;
    } else {
      a = Math.random() * Math.PI * 2;
    }
    const s = 100 + Math.random() * 300;
    spawnParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, 0.3 + Math.random() * 0.2, color || '#ffff00', 2 + Math.random() * 4, 200);
  }
}

function spawnLandDust(x, y) {
  for (let i = 0; i < 5; i++) {
    spawnParticle(x + (Math.random() - 0.5) * 20, y, (Math.random() - 0.5) * 80, -20 - Math.random() * 40, 0.2 + Math.random() * 0.15, '#aaa', 2 + Math.random() * 2, 100);
  }
}

function spawnRunDust(x, y, dir) {
  spawnParticle(x, y, dir * (-40 - Math.random() * 30), -10 - Math.random() * 20, 0.15, '#888', 2, 80);
}

function spawnConfetti() {
  const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff', '#ff8800', '#ff00ff'];
  for (let i = 0; i < 120; i++) {
    spawnParticle(
      (Math.random() - 0.5) * BASE_W * 0.8,
      -BASE_H / 2 - Math.random() * 200,
      (Math.random() - 0.5) * 200,
      50 + Math.random() * 100,
      2 + Math.random() * 2,
      colors[Math.floor(Math.random() * colors.length)],
      3 + Math.random() * 4,
      80
    );
  }
}

function updateParticles(dt) {
  for (const p of particlePool) {
    if (!p.active) continue;
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.gravity * dt;
    p.life -= dt;
    if (p.life <= 0) p.active = false;
  }
}

function renderParticles() {
  for (const p of particlePool) {
    if (!p.active) continue;
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

const musicState = {
  masterGain: null,
  toneFilter: null,
  schedulerId: null,
  noiseBuffer: null,
  currentCue: null,
  step: 0,
  nextNoteTime: 0,
  targetGain: -1,
  targetFilter: -1,
};

function midiToFreq(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function ensureMusicGraph() {
  if (!audioCtx || musicState.masterGain) return;
  musicState.masterGain = audioCtx.createGain();
  musicState.masterGain.gain.value = 0.0001;
  musicState.toneFilter = audioCtx.createBiquadFilter();
  musicState.toneFilter.type = 'lowpass';
  musicState.toneFilter.frequency.value = 2800;
  musicState.toneFilter.Q.value = 0.6;
  musicState.toneFilter.connect(musicState.masterGain);
  musicState.masterGain.connect(audioCtx.destination);

  const len = Math.max(1, Math.floor(audioCtx.sampleRate * 0.25));
  const noise = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = noise.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  musicState.noiseBuffer = noise;
}

function getMusicCueKey() {
  if (!options.musicOn) return null;
  if (state.mode === 'results') return 'victory';
  if (state.mode === 'title' || state.mode === 'charselect' || state.mode === 'stageselect' || state.mode === 'modeselect' || state.mode === 'options') return 'menu';
  if (state.mode !== 'playing' && state.mode !== 'training' && state.mode !== 'paused') return null;
  const stage = currentStage || STAGES[state.selectedStage] || STAGES.battlefield;
  switch (stage.theme) {
    case 'festival':
    case 'ultra':
    case 'edc':
      return 'neon';
    case 'desert':
    case 'coachella':
      return 'sunset';
    case 'tomorrowland':
      return 'fantasy';
    case 'sky':
      return 'sky';
    case 'cosmic':
      return 'cosmic';
    default:
      return 'clash';
  }
}

function scheduleTone({ type, freq, time, duration, volume, attack, release, filterFreq, detune }) {
  if (!audioCtx || !musicState.toneFilter || !Number.isFinite(freq) || freq <= 0) return;
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, time);
  if (detune) osc.detune.setValueAtTime(detune, time);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(filterFreq || 2800, time);
  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.linearRampToValueAtTime(volume, time + (attack || 0.01));
  gain.gain.exponentialRampToValueAtTime(0.0001, time + duration + (release || 0.08));
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(musicState.toneFilter);
  osc.start(time);
  osc.stop(time + duration + (release || 0.08) + 0.03);
}

function scheduleKick(time, volume) {
  if (!audioCtx || !musicState.toneFilter) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(130, time);
  osc.frequency.exponentialRampToValueAtTime(42, time + 0.18);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(240, time);
  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.linearRampToValueAtTime(volume, time + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(musicState.toneFilter);
  osc.start(time);
  osc.stop(time + 0.24);
}

function scheduleNoiseHit(time, volume, duration, highpass) {
  if (!audioCtx || !musicState.noiseBuffer || !musicState.toneFilter) return;
  const src = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  src.buffer = musicState.noiseBuffer;
  filter.type = 'highpass';
  filter.frequency.setValueAtTime(highpass, time);
  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.linearRampToValueAtTime(volume, time + 0.004);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(musicState.toneFilter);
  src.start(time);
  src.stop(time + duration + 0.03);
}

function scheduleMusicStep(cue, step, time, stepDur) {
  const idx = step % 16;
  if (cue.kick && cue.kick.includes(idx)) scheduleKick(time, 0.07 * cue.level);
  if (cue.snare && cue.snare.includes(idx)) scheduleNoiseHit(time, 0.03 * cue.level, 0.12, 1600);
  if (cue.hat && cue.hat.includes(idx)) scheduleNoiseHit(time, 0.018 * cue.level, 0.05, 5200);
  if (cue.hatOpen && cue.hatOpen.includes(idx)) scheduleNoiseHit(time, 0.02 * cue.level, 0.11, 4600);

  const bassNote = cue.bass[idx];
  if (bassNote !== null && bassNote !== undefined) {
    scheduleTone({
      type: cue.bassWave,
      freq: midiToFreq(bassNote),
      time,
      duration: stepDur * 1.75,
      volume: 0.028 * cue.level,
      attack: 0.01,
      release: 0.12,
      filterFreq: cue.filter * 0.55,
    });
  }

  const leadNote = cue.lead[idx];
  if (leadNote !== null && leadNote !== undefined) {
    scheduleTone({
      type: cue.leadWave,
      freq: midiToFreq(leadNote),
      time: time + stepDur * 0.04,
      duration: stepDur * 0.85,
      volume: 0.018 * cue.level,
      attack: 0.008,
      release: 0.09,
      filterFreq: cue.filter * 1.2,
    });
  }

  if (cue.chords && idx % 4 === 0) {
    const chord = cue.chords[Math.floor(idx / 4) % cue.chords.length];
    chord.forEach((note, noteIdx) => {
      scheduleTone({
        type: cue.padWave,
        freq: midiToFreq(note),
        time,
        duration: stepDur * 3.5,
        volume: 0.009 * cue.level,
        attack: 0.03,
        release: 0.18,
        filterFreq: cue.filter * 0.8,
        detune: noteIdx === 0 ? -3 : noteIdx === chord.length - 1 ? 3 : 0,
      });
    });
  }
}

function scheduleMusic() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const cue = musicState.currentCue ? MUSIC_CUES[musicState.currentCue] : null;
  if (!cue) return;
  const stepDur = 60 / cue.bpm / 4;
  while (musicState.nextNoteTime < audioCtx.currentTime + 0.2) {
    scheduleMusicStep(cue, musicState.step, musicState.nextNoteTime, stepDur);
    musicState.step = (musicState.step + 1) % 16;
    musicState.nextNoteTime += stepDur;
  }
}

function syncMusicState(force) {
  if (!audioCtx) return;
  ensureMusicGraph();
  const cueKey = getMusicCueKey();
  const cue = cueKey ? MUSIC_CUES[cueKey] : null;
  const pausedDuck = state.mode === 'paused' ? 0.28 : 1;
  const targetGain = cue ? Math.max(0.0001, options.volume * pausedDuck * cue.level * 0.12) : 0.0001;
  const targetFilter = cue ? cue.filter * (state.mode === 'paused' ? 0.55 : 1) : 1800;

  if (force || musicState.currentCue !== cueKey) {
    musicState.currentCue = cueKey;
    musicState.step = 0;
    musicState.nextNoteTime = audioCtx.currentTime + 0.06;
  }
  if (force || Math.abs(musicState.targetGain - targetGain) > 0.001) {
    musicState.targetGain = targetGain;
    musicState.masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    musicState.masterGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.08);
  }
  if (force || Math.abs(musicState.targetFilter - targetFilter) > 2) {
    musicState.targetFilter = targetFilter;
    musicState.toneFilter.frequency.cancelScheduledValues(audioCtx.currentTime);
    musicState.toneFilter.frequency.setTargetAtTime(targetFilter, audioCtx.currentTime, 0.12);
  }
}

function startMusicScheduler() {
  if (musicState.schedulerId || !audioCtx) return;
  musicState.nextNoteTime = audioCtx.currentTime + 0.06;
  musicState.schedulerId = window.setInterval(scheduleMusic, 80);
}

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  ensureMusicGraph();
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  startMusicScheduler();
  syncMusicState(true);
}

function playSound(type) {
  if (!audioCtx) return;
  const vol = options.volume;
  if (vol <= 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;

  // Pitch variation: ±10% random detune for organic feel
  const pitchVar = 0.9 + Math.random() * 0.2; // 0.9 to 1.1

  switch (type) {
    case 'hit_light':
      osc.type = 'square'; osc.frequency.setValueAtTime(300 * pitchVar, t); osc.frequency.exponentialRampToValueAtTime(100 * pitchVar, t + 0.08);
      gain.gain.setValueAtTime(0.15 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1); break;
    case 'hit_heavy':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150 * pitchVar, t); osc.frequency.exponentialRampToValueAtTime(40 * pitchVar, t + 0.15);
      gain.gain.setValueAtTime(0.2 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2); break;
    case 'jump':
      osc.type = 'sine'; osc.frequency.setValueAtTime(250 * pitchVar, t); osc.frequency.exponentialRampToValueAtTime(500 * pitchVar, t + 0.08);
      gain.gain.setValueAtTime(0.08 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1); break;
    case 'shield':
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
      gain.gain.setValueAtTime(0.05 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.start(t); osc.stop(t + 0.05); break;
    case 'death':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.5);
      gain.gain.setValueAtTime(0.2 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5); break;
    case 'ko':
      osc.type = 'square'; osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(200, t + 0.3);
      gain.gain.setValueAtTime(0.25 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4); break;
    case 'shieldbreak':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1200, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.4);
      gain.gain.setValueAtTime(0.3 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5); break;
    case 'grab':
      osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(600, t + 0.06);
      gain.gain.setValueAtTime(0.1 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t); osc.stop(t + 0.08); break;
    case 'throw':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(500, t + 0.1);
      gain.gain.setValueAtTime(0.12 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.start(t); osc.stop(t + 0.12); break;
    case 'cheer':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(1200, t + 0.2);
      gain.gain.setValueAtTime(0.1 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4); break;
    case 'clang':
      osc.type = 'square'; osc.frequency.setValueAtTime(1000, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
      gain.gain.setValueAtTime(0.12 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.start(t); osc.stop(t + 0.12); break;
    case 'select':
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(700, t + 0.05);
      gain.gain.setValueAtTime(0.08 * vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      osc.start(t); osc.stop(t + 0.06); break;
  }
}

// --- Collision ---
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function resolvePlayerPlatform(p, plat) {
  const px = p.x - p.w / 2, py = p.y - p.h, pw = p.w, ph = p.h;
  if (!aabb({ x: px, y: py, w: pw, h: ph }, { x: plat.x, y: plat.y, w: plat.w, h: plat.h })) return false;

  if (plat.type === 'passthrough') {
    const prevBottom = p.y - p.vy * FIXED_STEP;
    if (p.vy >= 0 && prevBottom <= plat.y + 2) {
      const input = getPlayerInput(p);
      if (input.down) return false;
      p.y = plat.y; p.vy = 0; p.grounded = true; p.jumpsLeft = p.def.maxJumps || MAX_JUMPS;
      if (p.usedAirDodge) p.usedAirDodge = false;
      if (p.specialFall) p.specialFall = false;
      return true;
    }
    return false;
  }

  const oL = (px + pw) - plat.x, oR = (plat.x + plat.w) - px;
  const oT = (py + ph) - plat.y, oB = (plat.y + plat.h) - py;
  const min = Math.min(oL, oR, oT, oB);

  if (min === oT && p.vy >= 0) {
    p.y = plat.y; p.vy = 0; p.grounded = true; p.jumpsLeft = MAX_JUMPS;
    if (p.usedAirDodge) p.usedAirDodge = false;
    if (p.specialFall) p.specialFall = false;
    return true;
  } else if (min === oB && p.vy < 0) {
    p.y = plat.y + plat.h + p.h; p.vy = 0;
  } else if (min === oL) {
    p.x = plat.x - p.w / 2; p.vx = 0;
  } else if (min === oR) {
    p.x = plat.x + plat.w + p.w / 2; p.vx = 0;
  }
  return false;
}

// --- Knockback ---
function calcKnockback(atkData, targetDamage, targetWeight) {
  return (atkData.damage * 0.1 + 2) * atkData.kbScale * (1 + targetDamage / 100) / targetWeight + atkData.kbBase;
}

// --- Get Input for a player (human, cpu, or gamepad) ---
function getPlayerInput(p) {
  if (p.controlType === 'cpu') return getCPUInput(p);
  const binds = p.idx === 0 ? getP1Binds() : getP2Binds();
  let input = getInput(binds);
  if (p.gamepadIndex !== null) input = mergeInput(input, getGamepadInput(p.gamepadIndex));
  return input;
}

// --- Player Update ---
function updatePlayer(p, dt) {
  const input = getPlayerInput(p);
  const justPressedAttack = input.attack && !p.prevAttack;
  const justPressedJump = input.up && !p.prevJump;
  const justPressedSpecial = input.special && !p.prevSpecial;
  const justPressedShield = input.shield && !p.prevShield;
  p.prevAttack = input.attack;
  p.prevJump = input.up;
  p.prevSpecial = input.special;
  p.prevShield = input.shield;

  if (p.invincible > 0) p.invincible--;
  if (p.dodgeCooldown > 0) p.dodgeCooldown--;

  // Input buffer
  if (p.inputBuffer.attack > 0) p.inputBuffer.attack--;
  if (p.inputBuffer.jump > 0) p.inputBuffer.jump--;
  if (justPressedAttack) p.inputBuffer.attack = INPUT_BUFFER_WINDOW;
  if (justPressedJump) p.inputBuffer.jump = INPUT_BUFFER_WINDOW;

  // Squish decay
  if (p.squish.timer > 0) {
    p.squish.timer--;
    const t = p.squish.timer / 8;
    p.squish.sx = 1 + (p.squish.sx - 1) * t;
    p.squish.sy = 1 + (p.squish.sy - 1) * t;
  } else { p.squish.sx = 1; p.squish.sy = 1; }

  if (p.state === 'dead') return;

  if (p.state === 'respawning') {
    p.stateTimer--;
    if (p.stateTimer <= 0) { p.state = 'idle'; p.invincible = RESPAWN_INVINCIBILITY; }
    return;
  }

  // --- Grabbed state ---
  if (p.state === 'grabbed') {
    const grabber = state.players.find(pl => pl.grabTarget === p.idx);
    if (grabber) { p.x = grabber.x + grabber.facing * 30; p.y = grabber.y; }
    p.grabTimer--;
    if (p.grabTimer <= 0) {
      // Escape
      p.state = 'idle'; p.vx = p.facing * -150;
      if (grabber) { grabber.state = 'idle'; grabber.grabTarget = -1; }
    }
    return;
  }

  // --- Grabbing state ---
  if (p.state === 'grabbing') {
    const target = state.players[p.grabTarget];
    // Pummel
    if (justPressedAttack && target) {
      target.damage += p.def.grab.pummelDamage;
      spawnDamageNumber(target.x, target.y - target.h, p.def.grab.pummelDamage);
      state.hitstopFrames = 3;
    }
    // Throw
    const throwDir = input.up ? 'up' : input.down ? 'down' : input.left ? (p.facing === -1 ? 'forward' : 'back') : input.right ? (p.facing === 1 ? 'forward' : 'back') : null;
    if (throwDir && target) {
      executeThrow(p, target, throwDir);
      return;
    }
    p.grabTimer--;
    if (p.grabTimer <= 0) {
      // Auto escape
      p.state = 'idle'; p.grabTarget = -1;
      if (target) { target.state = 'idle'; target.vx = target.facing * -150; }
    }
    return;
  }

  // --- Grab startup ---
  if (p.state === 'grab') {
    p.attackFrame++;
    const g = p.def.grab;
    if (p.attackFrame >= g.startup && p.attackFrame < g.startup + g.active && !p.hitRegistered) {
      // Check grab range
      for (const target of state.players) {
        if (target === p || target.state === 'dead' || target.state === 'respawning' || target.state === 'grabbed' || target.invincible > 0) continue;
        const dx = Math.abs(target.x - p.x);
        const dy = Math.abs(target.y - p.y);
        if (dx < g.range && dy < 40 && ((target.x - p.x) * p.facing >= -10)) {
          // Can't grab shielding opponent... actually in Smash you CAN grab through shield
          p.hitRegistered = true;
          p.state = 'grabbing';
          p.grabTarget = target.idx;
          p.grabTimer = GRAB_ESCAPE_BASE - Math.floor(target.damage / 2);
          target.state = 'grabbed';
          target.grabTimer = p.grabTimer;
          target.vx = 0; target.vy = 0;
          playSound('grab');
          return;
        }
      }
    }
    if (p.attackFrame >= g.startup + g.active + g.endlag) {
      p.state = 'idle'; p.hitRegistered = false;
    }
    return;
  }

  // --- Shield ---
  if (p.state === 'shield') {
    p.shieldHP = Math.max(0, p.shieldHP - 0.5);
    if (p.shieldHP <= 0) {
      p.state = 'hitstun'; p.stateTimer = 240; // longer stun — shield break is a real punish
      playSound('shieldbreak');
      // Big burst: shield shatter effect
      spawnHitSparks(p.x, p.y - p.h / 2, 25, '#00ffff');
      spawnHitSparks(p.x, p.y - p.h / 2, 12, '#ffffff');
      state.screenShake.intensity = 12;
      // Launch upward slightly for dramatic effect
      p.vy = -200; p.grounded = false;
      return;
    }
    if (!input.shield) { p.state = 'idle'; return; }
    // Spot dodge
    if (input.down && p.dodgeCooldown <= 0) {
      p.state = 'spotdodge'; p.stateTimer = 20; p.invincible = 0;
      p.dodgeCooldown = 25; p.vx = 0;
      return;
    }
    // Roll dodge
    if ((input.left || input.right) && p.dodgeCooldown <= 0) {
      p.state = 'dodge'; p.stateTimer = 18; p.invincible = 15;
      p.dodgeCooldown = 30; p.vx = input.left ? -400 : 400;
      p.facing = input.left ? -1 : 1;
      return;
    }
    return;
  }

  // Shield regen
  if (!p.shieldActive && p.shieldHP < 100) p.shieldHP = Math.min(100, p.shieldHP + 0.15);

  // --- Spot dodge ---
  if (p.state === 'spotdodge') {
    p.stateTimer--;
    // i-frames 3-17
    if (p.stateTimer <= 17 && p.stateTimer >= 3) p.invincible = 2;
    if (p.stateTimer <= 0) p.state = 'idle';
    // Trail
    if (!p.dodgeTrail) p.dodgeTrail = [];
    p.dodgeTrail.unshift({ x: p.x, y: p.y, alpha: 0.25 });
    if (p.dodgeTrail.length > 3) p.dodgeTrail.pop();
    return;
  }

  // --- Dodge ---
  if (p.state === 'dodge') {
    p.stateTimer--;
    if (p.stateTimer <= 0) { p.state = 'idle'; p.vx *= 0.3; p.dodgeTrail = []; }
    // Trail
    if (!p.dodgeTrail) p.dodgeTrail = [];
    p.dodgeTrail.unshift({ x: p.x, y: p.y, alpha: 0.3 });
    if (p.dodgeTrail.length > 4) p.dodgeTrail.pop();
    applyPhysics(p, dt, { driftFactor: 1 });
    return;
  }

  // --- Air dodge ---
  if (p.state === 'airdodge') {
    p.stateTimer--;
    // i-frames 3-18
    if (p.stateTimer <= 21 && p.stateTimer >= 6) p.invincible = 2;
    if (p.stateTimer <= 0) { p.state = 'fall'; p.specialFall = true; p.dodgeTrail = []; }
    // Trail
    if (!p.dodgeTrail) p.dodgeTrail = [];
    p.dodgeTrail.unshift({ x: p.x, y: p.y, alpha: 0.3 });
    if (p.dodgeTrail.length > 5) p.dodgeTrail.pop();
    applyPhysics(p, dt, { driftFactor: 0.8 });
    return;
  }

  // --- Hitstun ---
  if (p.state === 'hitstun') {
    p.stateTimer--;
    // Tumble recovery: any button press after half the hitstun reduces remaining stun
    if (p.tumbling && p.stateTimer < p.stateTimer + 5) { // always true after initial frames
      if (justPressedAttack || justPressedJump || justPressedShield || justPressedSpecial) {
        p.stateTimer = Math.min(p.stateTimer, 4); // snap to near-end
        p.tumbling = false;
      }
    }
    if (p.stateTimer <= 0) {
      p.state = p.grounded ? 'idle' : 'fall';
      p.tumbling = false;
      p.afterimages = [];
    }
    applyPhysics(p, dt, { driftFactor: 1, frictionOverride: 0.98 });
    return;
  }

  // --- Attack ---
  if (p.state === 'attack') {
    // Charge handling for forward attacks
    if (p.charging && p.attackKey === 'forward' && p.attackFrame < p.attackData.startup && input.attack) {
      p.chargeFrames++;
      const maxCharge = 30;
      const chargeProgress = Math.min(p.chargeFrames, maxCharge) / maxCharge;
      // Extend startup based on charge, cap to 30 extra frames
      const extraStartup = Math.floor(chargeProgress * 30);
      const baseStartup = p.def.attacks.forward.startup;
      p.attackData.startup = baseStartup + extraStartup;
    } else if (p.charging && p.attackFrame >= p.attackData.startup) {
      p.charging = false;
    }

    p.attackFrame++;
    const atk = p.attackData;
    const chargeMult = p.chargeFrames ? Math.min(1.5, 1.0 + (p.chargeFrames / 30) * 0.5) : 1.0;

    // Apply charge multiplier to active hitbox
    if (p.hitRegistered === false && p.attackFrame >= atk.startup && p.attackFrame < atk.startup + atk.active) {
      const origDamage = p.def.attacks[p.attackKey].damage;
      p.attackData.hitbox = Object.assign({}, p.def.attacks[p.attackKey].hitbox);
      p.attackData.hitbox.damage = origDamage * chargeMult;
      p.attackData.damage = origDamage * chargeMult;
    }

    const totalFrames = atk.startup + atk.active + atk.endlag;
    const inEndlag = p.attackFrame >= atk.startup + atk.active;

    // Track if aerial attack is in active frames (for landing lag penalty)
    if (!p.grounded && p.attackFrame >= atk.startup && p.attackFrame < atk.startup + atk.active) {
      p.aerialAttackActive = true;
    }

    // Shield cancel out of endlag (available after startup + active + 4 frames)
    if (inEndlag && p.attackFrame >= atk.startup + atk.active + 4) {
      if (input.shield && p.grounded && p.shieldHP > 10) {
        p.state = 'shield'; p.shieldActive = true; p.vx = 0;
        p.attackData = null; p.hitRegistered = false;
        p.charging = false; p.chargeFrames = 0;
        playSound('shield'); return;
      }
    }

    if (p.attackFrame >= totalFrames) {
      // Check buffer
      if (p.inputBuffer.attack > 0) {
        p.inputBuffer.attack = 0;
        const bufInput = getPlayerInput(p);
        let atkKey = 'neutral';
        if (bufInput.up) atkKey = 'up';
        else if (bufInput.down) atkKey = 'down';
        else if (bufInput.left || bufInput.right) atkKey = 'forward';
        else if (!p.grounded) atkKey = 'aerial';
        p.attackData = cloneAttackData(p.def.attacks[atkKey]);
        p.attackFrame = 0; p.hitRegistered = false;
        p.attackKey = atkKey;
        p.chargeFrames = 0;
        p.charging = (atkKey === 'forward');
        return;
      }
      p.state = p.grounded ? 'idle' : 'fall';
      p.attackData = null; p.hitRegistered = false;
      p.charging = false;
      p.chargeFrames = 0;
    }
    if (!p.grounded) applyPhysics(p, dt, { driftFactor: 0.3 });
    else p.x += p.vx * dt * 0.3;
    return;
  }

  // --- Normal movement ---
  const other = state.players[1 - p.idx];
  if (other && other.state !== 'dead') {
    if (other.x > p.x + 10) p.facing = 1;
    else if (other.x < p.x - 10) p.facing = -1;
  }

  // Run detection
  const movingDir = input.left ? -1 : input.right ? 1 : 0;
  const wasRunning = p.runTimer > 6 && p.grounded;
  if (movingDir !== 0 && movingDir === p.moveDir) p.runTimer++;
  else {
    // Pivot skid: reversing direction at run speed
    if (wasRunning && movingDir !== 0 && movingDir !== p.moveDir && p.grounded) {
      p.pivotTimer = 3;
      p.pivotDir = movingDir;
    }
    p.runTimer = 0; p.moveDir = movingDir;
  }
  const isRunning = p.runTimer > 6 && p.grounded;
  const speed = isRunning ? p.def.runSpeed : p.def.walkSpeed;

  // Pivot skid: decelerate before reversing
  if (p.pivotTimer > 0) {
    p.pivotTimer--;
    p.vx *= 0.6; // rapid deceleration
    if (p.pivotTimer <= 0) {
      p.facing = p.pivotDir;
      p.vx = p.pivotDir * p.def.walkSpeed * 0.5; // start slow after pivot
    }
    spawnRunDust(p.x, p.y, -p.pivotDir); // skid dust opposite to new direction
  } else if (input.left) p.vx = -speed;
  else if (input.right) p.vx = speed;
  else {
    p.vx *= p.grounded ? GROUND_FRICTION : AIR_FRICTION;
    if (Math.abs(p.vx) < 5) p.vx = 0;
  }

  // Run dust
  if (isRunning && state.frameCount % 6 === 0) spawnRunDust(p.x, p.y, p.facing);

  // Landing lag freeze: skip actions while in landing lag
  if (p.landingLag > 0) {
    applyPhysics(p, dt);
    return;
  }

  // Jump squat processing
  if (p.jumpSquatTimer > 0) {
    p.jumpSquatTimer--;
    p.squish = { sx: 1.15, sy: 0.85, timer: p.jumpSquatTimer + 2 }; // visual crouch
    if (p.jumpSquatTimer <= 0) {
      // Launch!
      p.vy = p.jumpSquatForce; p.jumpsLeft--; p.grounded = false; p.state = 'jump';
      playSound('jump');
      p.squish = { sx: 0.8, sy: 1.25, timer: 6 }; // stretch on launch
    }
    applyPhysics(p, dt);
    return;
  }

  // Jump (with coyote time support)
  const canCoyoteJump = p.coyoteTimer > 0 && !p.grounded;
  if ((justPressedJump || p.inputBuffer.jump > 0) && (p.jumpsLeft > 0 || canCoyoteJump) && !p.specialFall) {
    p.inputBuffer.jump = 0;
    const maxJumps = p.def.maxJumps || MAX_JUMPS;
    const force = (p.jumpsLeft === maxJumps || canCoyoteJump) ? p.def.jumpForce : p.def.doubleJumpForce;
    if (canCoyoteJump) p.coyoteTimer = 0; // consume coyote time
    // Grounded jump: enter jump squat
    if (p.grounded || canCoyoteJump) {
      p.jumpSquatTimer = JUMP_SQUAT_FRAMES;
      p.jumpSquatForce = force;
      p.vx *= 0.5; // brief slowdown during squat
    } else {
      // Air jump: instant (no squat)
      p.vy = force; p.jumpsLeft--; p.grounded = false; p.state = 'jump';
      playSound('jump');
    }
  }

  // Air dodge
  if (justPressedShield && !p.grounded && !p.usedAirDodge && !p.specialFall) {
    p.state = 'airdodge'; p.stateTimer = 24; p.usedAirDodge = true;
    // Directional drift
    if (input.left) p.vx = -250;
    else if (input.right) p.vx = 250;
    if (input.up) p.vy = -200;
    else if (input.down) p.vy = 150;
    return;
  }

  // Shield (grounded)
  if (input.shield && p.grounded && p.shieldHP > 10) {
    p.state = 'shield'; p.shieldActive = true; p.vx = 0;
    playSound('shield'); return;
  }
  p.shieldActive = false;

  // Grab (special when grounded and near opponent)
  if (justPressedSpecial && p.grounded) {
    p.state = 'grab'; p.attackFrame = 0; p.hitRegistered = false;
    return;
  }

  // Attack
  if ((justPressedAttack || p.inputBuffer.attack > 0) && !p.specialFall) {
    p.inputBuffer.attack = 0;
    let atkKey = 'neutral';
    if (input.up) atkKey = 'up';
    else if (input.down) atkKey = 'down';
    else if (input.left || input.right) atkKey = 'forward';
    else if (!p.grounded) atkKey = 'aerial';
    p.attackData = cloneAttackData(p.def.attacks[atkKey]); p.attackFrame = 0; p.hitRegistered = false;
    p.attackKey = atkKey;
    p.chargeFrames = 0;
    p.charging = (atkKey === 'forward');
    p.state = 'attack'; return;
  }

  // Gravity + movement
  applyPhysics(p, dt);
}

// --- Throw ---
function executeThrow(grabber, target, dir) {
  const throwData = grabber.def.throws[dir];
  target.damage += throwData.damage;
  spawnDamageNumber(target.x, target.y - target.h, throwData.damage);
  const kb = calcKnockback(throwData, target.damage, target.def.weight);
  const angle = throwData.angle * Math.PI / 180;
  const dirX = dir === 'back' ? -grabber.facing : grabber.facing;
  target.vx = Math.cos(angle) * kb * dirX;
  target.vy = -Math.abs(Math.sin(angle) * kb);
  target.state = 'hitstun'; target.stateTimer = Math.floor(kb / 15);
  target.grounded = false;
  grabber.state = 'idle'; grabber.grabTarget = -1;
  playSound('throw');
  spawnHitSparks(target.x, target.y - target.h / 2, 6, '#ffaa00');
  state.screenShake.intensity = Math.min(throwData.damage * 0.5, 8);
}

// --- Hit Detection (with clang + DI) ---
function checkHits() {
  // Clang check first
  const attackers = state.players.filter(p => p.state === 'attack' && p.attackData && !p.hitRegistered);
  if (attackers.length === 2) {
    const a = attackers[0], b = attackers[1];
    const aAtk = a.attackData, bAtk = b.attackData;
    const aFrame = a.attackFrame, bFrame = b.attackFrame;
    if (aFrame >= aAtk.startup && aFrame < aAtk.startup + aAtk.active &&
        bFrame >= bAtk.startup && bFrame < bAtk.startup + bAtk.active) {
      const aHb = aAtk.hitbox, bHb = bAtk.hitbox;
      const ax = a.x + aHb.ox * a.facing, ay = a.y - a.h / 2 + aHb.oy;
      const bx = b.x + bHb.ox * b.facing, by = b.y - b.h / 2 + bHb.oy;
      const aRect = { x: ax - aHb.w / 2, y: ay - aHb.h / 2, w: aHb.w, h: aHb.h };
      const bRect = { x: bx - bHb.w / 2, y: by - bHb.h / 2, w: bHb.w, h: bHb.h };
      if (aabb(aRect, bRect)) {
        // Clang! Cancel both attacks
        a.hitRegistered = true; b.hitRegistered = true;
        a.vx = a.x < b.x ? -150 : 150;
        b.vx = b.x < a.x ? -150 : 150;
        const mx = (ax + bx) / 2, my = (ay + by) / 2;
        spawnHitSparks(mx, my, 12, '#ffffff');
        playSound('clang');
        state.hitstopFrames = 6;
        return;
      }
    }
  }

  for (const attacker of state.players) {
    if (attacker.state !== 'attack' || !attacker.attackData || attacker.hitRegistered) continue;
    const atk = attacker.attackData;
    const frame = attacker.attackFrame;
    if (frame < atk.startup || frame >= atk.startup + atk.active) continue;

    const hb = atk.hitbox;
    const hx = attacker.x + hb.ox * attacker.facing;
    const hy = attacker.y - attacker.h / 2 + hb.oy;

    for (const target of state.players) {
      if (target === attacker || target.state === 'dead' || target.state === 'respawning' || target.state === 'grabbed') continue;
      if (target.invincible > 0) continue;

      const tx = target.x - target.w / 2, ty = target.y - target.h;
      const hitboxRect = { x: hx - hb.w / 2, y: hy - hb.h / 2, w: hb.w, h: hb.h };

      if (aabb(hitboxRect, { x: tx, y: ty, w: target.w, h: target.h })) {
        if (target.state === 'shield') {
          target.shieldHP = Math.max(0, target.shieldHP - atk.damage * 1.5);
          spawnHitSparks(target.x, target.y - target.h / 2, 5, '#00aaff');
          playSound('shield');
          attacker.hitRegistered = true;
          state.hitstopFrames = 3;
          continue;
        }

        // Hit!
        target.damage += atk.damage;
        spawnDamageNumber(target.x, target.y - target.h, atk.damage);
        let kb = calcKnockback(atk, target.damage, target.def.weight);

        // Armor mechanic: halve knockback during attack startup
        if (target.def.armor === true && target.state === 'attack' && target.attackFrame < target.attackData.startup) {
          kb *= 0.5;
        }

        let angle = atk.angle * Math.PI / 180;

        // DI: shift angle toward target's input direction
        const targetInput = getPlayerInput(target);
        if (targetInput.left || targetInput.right || targetInput.up || targetInput.down) {
          const diX = (targetInput.right ? 1 : 0) - (targetInput.left ? 1 : 0);
          const diY = (targetInput.down ? 1 : 0) - (targetInput.up ? 1 : 0);
          if (diX !== 0 || diY !== 0) {
            const diAngle = Math.atan2(-diY, diX * attacker.facing);
            let angleDiff = diAngle - angle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            angle += Math.max(-DI_MAX_ANGLE, Math.min(DI_MAX_ANGLE, angleDiff * 0.3));
            target.diActive = true;
          }
        }

        const dirX = attacker.facing;
        target.vx = Math.cos(angle) * kb * dirX;
        target.vy = -Math.abs(Math.sin(angle) * kb);
        target.state = 'hitstun';
        target.stateTimer = Math.floor(kb / 15);
        target.grounded = false;
        attacker.hitRegistered = true;

        // Tumble: high knockback enters tumble state
        if (kb >= TUMBLE_KB_THRESHOLD) {
          target.tumbling = true;
          target.stateTimer += 8; // extra hitstun in tumble
        }

        const hitstop = HITSTOP_BASE + Math.floor(atk.damage / 4);
        // Asymmetric hitlag: attacker feels less freeze than defender
        target.personalHitstop = hitstop;
        attacker.personalHitstop = Math.max(1, hitstop - 2);
        state.hitstopFrames = hitstop; // global still needed for particles/camera
        state.screenShake.intensity = Math.min(atk.damage * 0.8, 15);
        // Character-themed hit spark colors
        let sparkColor = '#ffff00';
        if (attacker.fighterKey === 'deadmau5') sparkColor = atk.damage > 10 ? '#ff5db0' : '#ffb3d9';
        else if (attacker.fighterKey === 'skrillex') sparkColor = atk.damage > 10 ? '#9268ff' : '#c9a7ff';
        else if (attacker.fighterKey === 'marshmello') sparkColor = atk.damage > 10 ? '#ff9d3d' : '#ffb366';
        else if (attacker.fighterKey === 'daftpunk') sparkColor = atk.damage > 10 ? '#78f1ff' : '#a8feff';
        else if (attacker.fighterKey === 'tiesto') sparkColor = atk.damage > 10 ? '#b36dff' : '#d9a7ff';
        else if (attacker.fighterKey === 'subtronics') sparkColor = atk.damage > 10 ? '#a0ff5a' : '#c7ff9b';
        else sparkColor = atk.damage > 10 ? '#ff8800' : '#ffff00';
        spawnHitSparks(hx, hy, 8 + atk.damage, sparkColor, -attacker.facing);
        playSound(atk.damage >= 10 ? 'hit_heavy' : 'hit_light');

        // Gamepad rumble
        if (target.gamepadIndex !== null) triggerRumble(target.gamepadIndex, Math.min(kb / 300, 1), 100 + atk.damage * 5);
        if (attacker.gamepadIndex !== null) triggerRumble(attacker.gamepadIndex, 0.2, 50);
      }
    }
  }
}

// --- Damage Numbers ---
function spawnDamageNumber(x, y, value) {
  state.damageNumbers.push({ x, y: y - 10, value, timer: 50, vy: -1.5 });
}

function updateDamageNumbers() {
  for (let i = state.damageNumbers.length - 1; i >= 0; i--) {
    const d = state.damageNumbers[i];
    d.y += d.vy; d.timer--;
    if (d.timer <= 0) state.damageNumbers.splice(i, 1);
  }
}

function renderDamageNumbers() {
  for (const d of state.damageNumbers) {
    const pos = worldToScreen(d.x, d.y);
    const alpha = Math.min(1, d.timer / 20);
    ctx.globalAlpha = alpha;
    const color = d.value >= 12 ? '#ff4400' : d.value >= 8 ? '#ffaa00' : '#ffffff';
    ctx.fillStyle = color;
    ctx.font = `bold ${14 + d.value}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`${d.value}`, pos.x, pos.y);
  }
  ctx.globalAlpha = 1;
}

// --- Blast Zones / Death ---
function checkBlastZones() {
  for (const p of state.players) {
    if (p.state === 'dead' || p.state === 'respawning') continue;
    if (p.x < BLAST.left || p.x > BLAST.right || p.y < BLAST.top || p.y > BLAST.bottom) {
      // KO!
      if (state.matchType === 'time') {
        // Time match: score system
        const killer = state.players.find(pl => pl !== p && pl.state !== 'dead');
        if (killer) killer.score++;
        else p.score--; // self-destruct
        // Respawn
        const spawn = currentStage.spawns[p.idx];
        p.x = spawn.x; p.y = spawn.y - 100;
        p.vx = 0; p.vy = 0; p.damage = 0;
        p.state = 'respawning'; p.stateTimer = 60;
        p.invincible = RESPAWN_INVINCIBILITY;
        playSound('death'); playSound('cheer');
        spawnHitSparks(p.x, p.y, 15, '#ff0000');
        return;
      }

      if (state.matchType === 'training') {
        // Training: instant respawn
        const spawn = currentStage.spawns[p.idx];
        p.x = spawn.x; p.y = spawn.y - 100;
        p.vx = 0; p.vy = 0; p.damage = 0;
        p.state = 'respawning'; p.stateTimer = 30;
        p.invincible = RESPAWN_INVINCIBILITY;
        return;
      }

      // Stock match
      p.stocks--;
      playSound('ko'); playSound('cheer');
      spawnHitSparks(p.x, p.y, 20, '#ff0000');

      if (p.stocks <= 0) {
        p.state = 'dead';
        const alive = state.players.filter(pl => pl.stocks > 0);
        if (alive.length <= 1) {
          state.winner = alive.length === 1 ? alive[0].idx : -1;
          // Final KO slow-mo
          state.slowMo = 0.3; state.slowMoTimer = 90;
          state.slowMoTarget = { x: p.x, y: p.y };
        }
      } else {
        const spawn = currentStage.spawns[p.idx];
        p.x = spawn.x; p.y = spawn.y - 100;
        p.vx = 0; p.vy = 0; p.damage = 0;
        p.state = 'respawning'; p.stateTimer = 60;
        p.invincible = RESPAWN_INVINCIBILITY;
        playSound('death');
      }
    }
  }
}

// --- Moving Platforms ---
function updateMovingPlatforms(dt) {
  if (!state.hazardsOn) return;
  for (const plat of currentStage.platforms) {
    if (!plat.moving) continue;
    if (plat._baseX === undefined) { plat._baseX = plat.x; plat._baseY = plat.y; plat._moveTimer = 0; }
    plat._moveTimer += dt;
    const prevX = plat.x;
    if (plat.moving.axis === 'x') plat.x = plat._baseX + Math.sin(plat._moveTimer * plat.moving.speed) * plat.moving.range;
    if (plat.moving.axis === 'y') plat.y = plat._baseY + Math.sin(plat._moveTimer * plat.moving.speed) * plat.moving.range;
    plat._deltaX = plat.x - prevX;
  }
}

function carryPlayersOnMovingPlatforms() {
  for (const p of state.players) {
    if (!p.grounded || p.state === 'dead' || p.state === 'respawning') continue;
    for (const plat of currentStage.platforms) {
      if (!plat.moving || !plat._deltaX) continue;
      const px = p.x - p.w / 2;
      if (px + p.w > plat.x && px < plat.x + plat.w && Math.abs(p.y - plat.y) < 3) {
        p.x += plat._deltaX;
      }
    }
  }
}

// --- Camera ---
function updateCamera() {
  const alive = state.players.filter(p => p.state !== 'dead');
  if (alive.length === 0) return;
  let cx = 0, cy = 0, minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of alive) {
    cx += p.x; cy += p.y;
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  }
  cx /= alive.length; cy /= alive.length;

  // Slow-mo zoom
  if (state.slowMoTimer > 0 && state.slowMoTarget) {
    cx = state.slowMoTarget.x; cy = state.slowMoTarget.y;
    state.camera.zoom += (1.5 - state.camera.zoom) * 0.1;
  } else {
    const dist = Math.max(maxX - minX, maxY - minY, 200);
    const targetZoom = Math.max(0.85, Math.min(1.5, 500 / dist));
    state.camera.zoom += (targetZoom - state.camera.zoom) * 0.05;
  }
  state.camera.x += (cx - state.camera.x) * 0.08;
  state.camera.y += (cy - state.camera.y) * 0.08;
}

function updateScreenShake() {
  if (state.screenShake.intensity > 0.5) {
    state.screenShake.x = (Math.random() - 0.5) * state.screenShake.intensity * 2;
    state.screenShake.y = (Math.random() - 0.5) * state.screenShake.intensity * 2;
    state.screenShake.intensity *= 0.85;
  } else { state.screenShake.x = 0; state.screenShake.y = 0; state.screenShake.intensity = 0; }
}

// --- Main Update ---
function update(dt) {
  // Slow-mo
    if (state.slowMoTimer > 0) {
      state.slowMoTimer--;
      dt *= state.slowMo;
      if (state.slowMoTimer <= 0) {
        state.slowMo = 1;
        if (state.winner >= 0) enterResultsMode();
      }
    }

  if (state.mode === 'playing' || state.mode === 'training') {
    state.frameCount++;

    // Time match timer
      if (state.matchType === 'time') {
        state.timeRemaining -= dt;
        if (state.timeRemaining <= 0) {
          state.timeRemaining = 0;
          // Winner by score
          const p1 = state.players[0], p2 = state.players[1];
          state.winner = p1.score > p2.score ? 0 : p2.score > p1.score ? 1 : -1;
          enterResultsMode();
          return;
        }
      }

    if (state.hitstopFrames > 0) {
      state.hitstopFrames--;
      // Per-player hitstop: decrement individually
      for (const p of state.players) {
        if (p.personalHitstop > 0) p.personalHitstop--;
      }
      updateParticles(dt); updateScreenShake(); updateDamageNumbers();
      return;
    }
    // Clear any lingering personal hitstop
    for (const p of state.players) p.personalHitstop = 0;

    updateMovingPlatforms(dt);

    for (const p of state.players) updatePlayer(p, dt);

    // Collision
    for (const p of state.players) {
      if (p.state === 'dead' || p.state === 'respawning' || p.state === 'grabbed') continue;
      const wasGrounded = p.grounded;
      const preLandVy = p.vy; // capture fall speed before collision
      p.grounded = false;
      for (const plat of currentStage.platforms) resolvePlayerPlatform(p, plat);

      // --- Landing ---
      if (!wasGrounded && p.grounded) {
        spawnLandDust(p.x, p.y);
        p.squish = { sx: 1.3, sy: 0.7, timer: 8 };
        p.coyoteTimer = 0;
        p.tumbling = false;
        p.afterimages = [];
        p.onLedge = false;

        // Landing lag: scale by fall velocity
        const fallSpeed = Math.abs(preLandVy);
        let lag = LANDING_LAG_BASE + Math.floor(fallSpeed * LANDING_LAG_VEL_SCALE);

        // Aerial attack landing: if landing during active attack frames, extra lag
        if (p.state === 'attack' && p.attackData && !p.grounded) {
          // This is handled below
        }
        if (p.aerialAttackActive) {
          lag += 4; // punish whiffed aerials that clip the ground
          p.aerialAttackActive = false;
        }

        p.landingLag = lag;
      }

      // --- Coyote time tracking ---
      if (wasGrounded && !p.grounded) {
        p.coyoteTimer = COYOTE_TIME; // just left ground
      } else if (!p.grounded && p.coyoteTimer > 0) {
        p.coyoteTimer--;
      }

      // --- Ledge grab detection ---
      if (!p.grounded && !p.onLedge && p.vy >= 0 && p.state !== 'dead' &&
          p.state !== 'respawning' && !p.tumbling) {
        for (const plat of currentStage.platforms) {
          if (plat.type === 'passthrough') continue; // only solid platform edges
          // Left edge
          const leftEdgeX = plat.x;
          const leftEdgeY = plat.y;
          const dxL = p.x - leftEdgeX;
          const dyL = (p.y - p.h * 0.5) - leftEdgeY;
          if (dxL > -LEDGE_SNAP_RANGE && dxL < 5 && Math.abs(dyL) < LEDGE_SNAP_RANGE && p.vx < 0) {
            p.onLedge = true; p.ledgeTimer = LEDGE_HANG_FRAMES; p.ledgeSide = -1;
            p.x = leftEdgeX - 5; p.y = leftEdgeY + p.h * 0.5;
            p.vx = 0; p.vy = 0; p.jumpsLeft = p.def.maxJumps || MAX_JUMPS;
            p.usedAirDodge = false; p.specialFall = false;
            break;
          }
          // Right edge
          const rightEdgeX = plat.x + plat.w;
          const dxR = p.x - rightEdgeX;
          const dyR = (p.y - p.h * 0.5) - plat.y;
          if (dxR < LEDGE_SNAP_RANGE && dxR > -5 && Math.abs(dyR) < LEDGE_SNAP_RANGE && p.vx > 0) {
            p.onLedge = true; p.ledgeTimer = LEDGE_HANG_FRAMES; p.ledgeSide = 1;
            p.x = rightEdgeX + 5; p.y = plat.y + p.h * 0.5;
            p.vx = 0; p.vy = 0; p.jumpsLeft = p.def.maxJumps || MAX_JUMPS;
            p.usedAirDodge = false; p.specialFall = false;
            break;
          }
        }
      }

      // --- Ledge hang update ---
      if (p.onLedge) {
        p.vy = 0; p.vx = 0; p.grounded = false;
        p.ledgeTimer--;
        const input = getPlayerInput(p);
        // Drop from ledge
        if (p.ledgeTimer <= 0 || input.down) {
          p.onLedge = false; p.vy = 50;
        }
        // Jump from ledge
        else if (input.jump) {
          p.onLedge = false;
          p.vy = p.def.jumpForce; p.jumpsLeft--;
          p.state = 'jump'; playSound('jump');
        }
        // Climb up (toward stage)
        else if ((p.ledgeSide === -1 && input.right) || (p.ledgeSide === 1 && input.left)) {
          p.onLedge = false;
          p.y -= p.h; // teleport up onto stage
          p.invincible = 8; // brief i-frames on getup
        }
        // Attack from ledge
        else if (input.attack) {
          p.onLedge = false;
          p.y -= p.h;
          p.attackData = cloneAttackData(p.def.attacks.neutral);
          p.attackFrame = 0; p.hitRegistered = false;
          p.attackKey = 'neutral'; p.state = 'attack';
          p.chargeFrames = 0; p.charging = false;
        }
        if (p.onLedge) {
          // Stay on ledge — skip state assignment
          p.state = 'idle'; // visual only
          continue; // skip normal state labels
        }
      }

      // State labels
      if (!['attack', 'hitstun', 'shield', 'dodge', 'spotdodge', 'airdodge', 'grab', 'grabbing', 'grabbed'].includes(p.state)) {
        if (p.landingLag > 0) {
          p.landingLag--;
          p.state = 'idle'; // frozen in landing
        } else if (p.grounded) {
          p.state = Math.abs(p.vx) > 10 ? 'walk' : 'idle';
        } else {
          p.state = p.vy < 0 ? 'jump' : 'fall';
        }
      }

      // --- Tumble afterimages ---
      if (p.tumbling && p.state === 'hitstun') {
        p.afterimages.unshift({ x: p.x, y: p.y, alpha: 0.3, facing: p.facing });
        if (p.afterimages.length > AFTERIMAGE_COUNT) p.afterimages.pop();
      } else if (p.afterimages.length > 0) {
        // Fade out
        for (const ai of p.afterimages) ai.alpha -= 0.05;
        p.afterimages = p.afterimages.filter(ai => ai.alpha > 0);
      }
    }

    carryPlayersOnMovingPlatforms();
    checkHits();
    checkBlastZones();
    updateCamera();
    updateScreenShake();
    updateParticles(dt);
    updateDamageNumbers();
  }
}

// --- Festival Tour Helpers ---
function hydrateTourStateFromSave(saved, fallbackRunId) {
  const run = getTourRun((saved && saved.runId) || fallbackRunId || DEFAULT_TOUR_RUN_ID);
  Object.assign(state.tourState, {
    runId: run.id,
    currentLegIndex: Math.max(0, Math.min((saved && saved.currentLegIndex) || 0, run.legs.length - 1)),
    completedLegs: Math.max(0, (saved && saved.completedLegs) || 0),
    losses: Math.max(0, (saved && saved.losses) || 0),
    rewardState: (saved && saved.rewardState) || '',
    active: true,
    completed: false,
    playerFighter: (saved && saved.playerFighter) || state.p1Fighter || FIGHTER_KEYS[0],
    lastOutcome: null,
  });
}

function startOrResumeTourRun(runId) {
  const targetRun = getTourRun(runId || DEFAULT_TOUR_RUN_ID);
  const saved = tourStorage.activeRun && tourStorage.activeRun.runId === targetRun.id ? tourStorage.activeRun : null;
  hydrateTourStateFromSave(saved, targetRun.id);
  launchCurrentTourLeg();
}

function launchCurrentTourLeg() {
  const leg = getActiveTourLeg();
  if (!leg) return;
  startMatch({
    matchType: 'stock',
    stageKey: leg.stage,
    p1Fighter: state.tourState.playerFighter || state.p1Fighter,
    p2Fighter: leg.opponent,
    p1Cpu: false,
    p2Cpu: true,
    p1CpuLevel: state.charSelectCursors[0].cpuLevel,
    p2CpuLevel: leg.cpuLevel || 3,
    hazardsOn: leg.hazardsOn !== undefined ? leg.hazardsOn : options.hazardsOn,
  });
}

function suspendTourRun() {
  if (state.tourState.active && !state.tourState.completed) persistActiveTourProgress();
  state.tourState.active = false;
  state.tourState.completed = false;
  state.tourState.lastOutcome = null;
}

function resetLiveTourState() {
  const fresh = createTourState();
  state.tourState.runId = fresh.runId;
  state.tourState.currentLegIndex = fresh.currentLegIndex;
  state.tourState.completedLegs = fresh.completedLegs;
  state.tourState.losses = fresh.losses;
  state.tourState.rewardState = fresh.rewardState;
  state.tourState.active = fresh.active;
  state.tourState.completed = fresh.completed;
  state.tourState.playerFighter = fresh.playerFighter;
  state.tourState.lastOutcome = fresh.lastOutcome;
}

function resolveTourResults() {
  if (!state.tourState.active) return;
  const run = getTourRun(state.tourState.runId);
  const leg = getActiveTourLeg();
  if (!run || !leg) return;

  if (state.winner === 0) {
    state.tourState.completedLegs = Math.max(state.tourState.completedLegs, state.tourState.currentLegIndex + 1);
    if (state.tourState.currentLegIndex >= run.legs.length - 1) {
      state.tourState.completed = true;
      state.tourState.lastOutcome = 'complete';
      state.tourState.rewardState = `${getTourMedal(state.tourState.losses).label} ${run.completionReward}`;
      updateBestTourClear();
      clearSavedTourProgress();
    } else {
      state.tourState.lastOutcome = 'advance';
      state.tourState.rewardState = leg.rewardLabel || '';
      persistActiveTourProgress();
    }
  } else {
    state.tourState.losses++;
    state.tourState.completed = false;
    state.tourState.lastOutcome = 'fail';
    state.tourState.rewardState = leg.rewardLabel || '';
    persistActiveTourProgress();
  }
}

function enterResultsMode() {
  state.mode = 'results';
  state.confettiSpawned = false;
  resolveTourResults();
}

function handleResultsConfirm() {
  if (!state.tourState.active) {
    startMatch();
    return;
  }
  if (state.tourState.lastOutcome === 'advance') {
    const run = getTourRun(state.tourState.runId);
    state.tourState.currentLegIndex = Math.min(state.tourState.currentLegIndex + 1, run.legs.length - 1);
    state.tourState.lastOutcome = null;
    launchCurrentTourLeg();
    return;
  }
  if (state.tourState.lastOutcome === 'fail') {
    state.tourState.lastOutcome = null;
    launchCurrentTourLeg();
    return;
  }
  if (state.tourState.lastOutcome === 'complete') {
    const runId = state.tourState.runId;
    const playerFighter = state.tourState.playerFighter || state.p1Fighter;
    resetLiveTourState();
    state.tourState.playerFighter = playerFighter;
    startOrResumeTourRun(runId);
    return;
  }
  startMatch();
}

function handleResultsEscape() {
  if (state.tourState.active) suspendTourRun();
  state.mode = 'title';
}

// --- Rendering ---
function resizeCanvas() {
  const aspect = BASE_W / BASE_H;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > aspect) w = h * aspect; else h = w / aspect;
  canvas.width = BASE_W; canvas.height = BASE_H;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}

function worldToScreen(wx, wy) {
  const cam = state.camera;
  return {
    x: BASE_W / 2 + (wx - cam.x) * cam.zoom + state.screenShake.x,
    y: BASE_H / 2 + (wy - cam.y) * cam.zoom + state.screenShake.y,
  };
}

function seeded01(n) {
  const s = Math.sin(n * 12.9898 + 78.233) * 43758.5453123;
  return s - Math.floor(s);
}

function seededRange(n, min, max) {
  return min + (max - min) * seeded01(n);
}

function wrapValue(v, span) {
  return ((v % span) + span) % span;
}

function renderParallaxBG(stage) {
  if (!stage.bgLayers) return;
  const t = state.frameCount;
  for (const layer of stage.bgLayers) {
    const ox = -state.camera.x * layer.parallax;
    const oy = -state.camera.y * layer.parallax * 0.3;
    ctx.save();
    if (layer.shapes === 'stars') {
      const seed = layer.parallax * 997.3;
      const dust = ctx.createLinearGradient(0, BASE_H * 0.08 + oy * 0.2, BASE_W, BASE_H * 0.72 + oy * 0.2);
      dust.addColorStop(0, 'rgba(140,160,255,0.04)');
      dust.addColorStop(0.5, 'rgba(255,255,255,0.02)');
      dust.addColorStop(1, 'rgba(255,180,120,0.03)');
      ctx.fillStyle = dust;
      ctx.fillRect(0, 0, BASE_W, BASE_H);
      for (let i = 0; i < 100; i++) {
        const sx = wrapValue(seeded01(seed + i * 17.1) * BASE_W + ox * (0.2 + seeded01(seed + i * 8.4) * 0.3), BASE_W);
        const sy = wrapValue(seeded01(seed + i * 31.7) * BASE_H + oy * 0.35, BASE_H);
        const twinkle = 0.2 + (Math.sin(t * 0.03 + i * 1.73) * 0.5 + 0.5) * 0.8;
        const starSize = 0.7 + seeded01(seed + i * 48.5) * 1.8 + (i % 13 === 0 ? 1.2 : 0);
        const starTone = i % 11 === 0 ? '#ffd8a6' : i % 7 === 0 ? '#a9cfff' : '#ffffff';
        ctx.globalAlpha = twinkle;
        ctx.fillStyle = starTone;
        ctx.beginPath();
        ctx.arc(sx, sy, starSize, 0, Math.PI * 2);
        ctx.fill();
        if (starSize > 2.2) {
          const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, starSize * 5);
          halo.addColorStop(0, starTone === '#ffffff' ? 'rgba(255,255,255,0.22)' : starTone === '#a9cfff' ? 'rgba(140,190,255,0.25)' : 'rgba(255,200,140,0.24)');
          halo.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = halo;
          ctx.fillRect(sx - starSize * 5, sy - starSize * 5, starSize * 10, starSize * 10);
        }
      }
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#b8c8ff';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const ax = wrapValue(seeded01(seed + i * 18.9) * BASE_W + ox * 0.22, BASE_W);
        const ay = seededRange(seed + i * 27.3, 40, BASE_H * 0.45);
        const bx = wrapValue(ax + seededRange(seed + i * 11.4, 40, 120), BASE_W);
        const by = ay + seededRange(seed + i * 7.8, -35, 35);
        if (Math.abs(ax - bx) < BASE_W * 0.4) {
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
      if (t % 320 < 18) {
        const progress = (t % 320) / 18;
        const sx = 90 + (seed % 470);
        const sy = 30 + (seed % 70);
        ctx.strokeStyle = `rgba(255,255,255,${0.95 - progress * 0.9})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sx + progress * 260, sy + progress * 86);
        ctx.lineTo(sx + progress * 260 - 40, sy + progress * 86 - 12);
        ctx.stroke();
      }
    } else if (layer.shapes === 'nebula') {
      const clouds = [
        { x: BASE_W * 0.28 + ox * 0.18, y: BASE_H * 0.36 + Math.sin(t * 0.008) * 10, r: 310, inner: 'rgba(122,64,186,0.18)', outer: 'rgba(20,26,70,0)' },
        { x: BASE_W * 0.62 + ox * 0.13, y: BASE_H * 0.28 + Math.sin(t * 0.006 + 1.3) * 12, r: 250, inner: 'rgba(44,132,184,0.15)', outer: 'rgba(0,0,0,0)' },
        { x: BASE_W * 0.78 + ox * 0.08, y: BASE_H * 0.58, r: 190, inner: 'rgba(38,208,178,0.10)', outer: 'rgba(0,0,0,0)' },
      ];
      for (const cloud of clouds) {
        const grd = ctx.createRadialGradient(cloud.x, cloud.y, 30, cloud.x, cloud.y, cloud.r);
        grd.addColorStop(0, cloud.inner);
        grd.addColorStop(0.55, cloud.inner.replace(/0\.\d+\)/, '0.06)'));
        grd.addColorStop(1, cloud.outer);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, BASE_W, BASE_H);
      }
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 12; i++) {
        const nx = wrapValue(seeded01(i * 12.8 + 40) * BASE_W + ox * 0.16, BASE_W);
        const ny = seededRange(i * 31.2 + 22, BASE_H * 0.08, BASE_H * 0.82) + Math.sin(t * 0.004 + i) * 12;
        const rx = seededRange(i * 22.1 + 9, 60, 170);
        const ry = seededRange(i * 16.2 + 18, 18, 52);
        ctx.save();
        ctx.translate(nx, ny);
        ctx.rotate(seededRange(i * 13.4 + 7, -0.8, 0.8));
        ctx.fillStyle = i % 2 === 0 ? 'rgba(138,92,255,0.05)' : 'rgba(92,230,214,0.05)';
        ctx.scale(rx, ry);
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalCompositeOperation = 'source-over';
    } else if (layer.shapes === 'planet') {
      const px = BASE_W * 0.79 + ox * 0.1;
      const py = BASE_H * 0.66;
      const pr = 84;
      const grd = ctx.createRadialGradient(px - pr * 0.3, py - pr * 0.35, pr * 0.18, px, py, pr);
      grd.addColorStop(0, 'rgba(84,92,170,0.92)');
      grd.addColorStop(0.45, 'rgba(30,38,92,0.96)');
      grd.addColorStop(1, 'rgba(6,8,28,0.98)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fill();
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.clip();
      for (let i = 0; i < 4; i++) {
        ctx.strokeStyle = `rgba(160,210,255,${0.08 - i * 0.012})`;
        ctx.lineWidth = 10 - i * 2;
        ctx.beginPath();
        ctx.ellipse(px - 10 + i * 14, py - 12 + i * 18, pr * (0.78 - i * 0.1), pr * (0.26 + i * 0.03), -0.2, 0, Math.PI * 2);
        ctx.stroke();
      }
      for (let i = 0; i < 5; i++) {
        const cx = px + seededRange(i * 5.7 + 4, -34, 24);
        const cy = py + seededRange(i * 7.9 + 13, -24, 32);
        const cr = seededRange(i * 9.2 + 1, 8, 18);
        ctx.fillStyle = 'rgba(5,10,22,0.22)';
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(168,206,255,0.08)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx - cr * 0.1, cy - cr * 0.1, cr * 0.8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
      ctx.save();
      ctx.translate(px - 6, py + 10);
      ctx.rotate(-0.24);
      ctx.strokeStyle = 'rgba(120,150,255,0.16)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.ellipse(0, 0, pr * 1.28, pr * 0.34, 0, 0.12, Math.PI - 0.08);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(210,240,255,0.08)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, pr * 1.4, pr * 0.38, 0, 0.22, Math.PI - 0.18);
