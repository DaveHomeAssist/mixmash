  ctx.save(); ctx.globalAlpha = 0.06;
  ctx.fillStyle = color;
  for (let i = 0; i < 12; i++) {
    const ly = y + ((i * 47 + frame * 2) % (h + 20)) - 10;
    const lw = 40 + (i * 17) % 60;
    ctx.fillRect(x + (i % 2) * 30, ly, lw, 2);
  }
  ctx.restore();
}

function renderCharSelect() {
  const t = state.frameCount;
  // Dark background
  ctx.fillStyle = '#08081a'; ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Split screen — P1 side blue tint, P2 side red tint
  const halfW = BASE_W / 2;
  // P1 territory
  const grd1 = ctx.createLinearGradient(0, 0, halfW, 0);
  grd1.addColorStop(0, 'rgba(30,50,100,0.15)');
  grd1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd1; ctx.fillRect(0, 0, halfW, BASE_H);
  // P2 territory
  const grd2 = ctx.createLinearGradient(halfW, 0, BASE_W, 0);
  grd2.addColorStop(0, 'rgba(0,0,0,0)');
  grd2.addColorStop(1, 'rgba(100,30,30,0.15)');
  ctx.fillStyle = grd2; ctx.fillRect(halfW, 0, halfW, BASE_H);

  // Speed lines behind each side
  drawSpeedLines(0, 0, halfW, BASE_H, '#4488ff', t);
  drawSpeedLines(halfW, 0, halfW, BASE_H, '#ff4444', t);

  // Center divider — VS spark
  ctx.fillStyle = '#ff6600';
  ctx.save();
  ctx.translate(halfW, BASE_H / 2 - 30);
  ctx.rotate(Math.PI / 4);
  const vsSize = 20 + Math.sin(t * 0.08) * 3;
  ctx.fillRect(-vsSize, -vsSize, vsSize * 2, vsSize * 2);
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
  ctx.fillText('VS', halfW, BASE_H / 2 - 25);
  // Divider line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(halfW, 0); ctx.lineTo(halfW, BASE_H); ctx.stroke();

  // Title
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT FIGHTER', BASE_W / 2, 35);

  // Draw each player's side
  for (let ci = 0; ci < 2; ci++) {
    const cur = state.charSelectCursors[ci];
    const fighterKey = FIGHTER_KEYS[cur.pos];
    const def = FIGHTER_DEFS[fighterKey];
    const sideX = ci === 0 ? 0 : halfW;
    const centerX = sideX + halfW / 2;
    const curColor = ci === 0 ? '#4488ff' : '#ff4444';

    // Character preview — large scale
    const scale = 2.2;
    ctx.save();
    ctx.translate(centerX, BASE_H / 2 + 20);
    const previewP = { facing: ci === 0 ? 1 : -1, state: 'idle', fighterKey, attackData: null, attackFrame: 0, squish: { sx: 1, sy: 1 }, shieldHP: 100, w: def.w, h: def.h, useAltColor: false, def: def };
    if (fighterKey === 'knight') drawKnight(ctx, previewP, def.w * scale, def.h * scale, scale, def.color, def.outlineColor, def.color);
    else drawStriker(ctx, previewP, def.w * scale, def.h * scale, scale, def.color, def.outlineColor, def.color);
    ctx.restore();

    // Confirmed flash
    if (cur.confirmed) {
      ctx.fillStyle = `rgba(68,255,68,${0.05 + Math.sin(t * 0.1) * 0.03})`;
      ctx.fillRect(sideX, 0, halfW, BASE_H);
    }

    // Name banner (angled trapezoid)
    const bannerY = BASE_H - 160;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.moveTo(sideX + 20, bannerY);
    ctx.lineTo(sideX + halfW - 20, bannerY - 8);
    ctx.lineTo(sideX + halfW - 20, bannerY + 55);
    ctx.lineTo(sideX + 20, bannerY + 55);
    ctx.fill();
    // Banner accent line
    ctx.fillStyle = curColor;
    ctx.fillRect(sideX + 20, bannerY + (ci === 0 ? 0 : -8), halfW - 40, 3);

    // Fighter name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
    ctx.fillText(def.name.toUpperCase(), centerX, bannerY + 28);
    // Description
    ctx.fillStyle = '#999'; ctx.font = '11px monospace';
    ctx.fillText(def.desc || '', centerX, bannerY + 45);

    // Stat bars
    const barX = sideX + 40, barW = halfW - 80;
    const barY = BASE_H - 90;
    drawStatBar(barX, barY, barW, 'WEIGHT', def.weight, 1.5, '#6688cc');
    drawStatBar(barX, barY + 22, barW, 'SPEED', def.walkSpeed, 600, '#66cc66');
    drawStatBar(barX, barY + 44, barW, 'POWER', def.attacks.forward.damage, 20, '#cc6644');

    // Player label / CPU badge
    const labelY = 60;
    if (cur.cpu) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(centerX - 50, labelY - 12, 100, 24);
      ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
      const stars = cur.cpuLevel === 1 ? '\u2605' : cur.cpuLevel === 3 ? '\u2605\u2605\u2605' : '\u2605\u2605\u2605\u2605\u2605';
      ctx.fillText(`CPU ${stars}`, centerX, labelY + 5);
    } else {
      ctx.fillStyle = curColor; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`PLAYER ${ci + 1}`, centerX, labelY + 5);
    }

    // Pulsing cursor border around the whole side
    if (!cur.confirmed) {
      const pulse = Math.sin(t * 0.06) * 0.3 + 0.7;
      ctx.strokeStyle = curColor; ctx.globalAlpha = pulse; ctx.lineWidth = 3;
      ctx.strokeRect(sideX + 5, 50, halfW - 10, BASE_H - 60);
      ctx.globalAlpha = 1;
    }

    // Fighter selection arrows
    if (!cur.confirmed && FIGHTER_KEYS.length > 1) {
      ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(t * 0.08) * 0.15})`;
      ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
      ctx.fillText('\u25C4', sideX + 30, BASE_H / 2 - 20);
      ctx.fillText('\u25BA', sideX + halfW - 30, BASE_H / 2 - 20);
    }
  }

  // Controls
  ctx.fillStyle = '#555'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('P1: A/D select, J confirm, W/S CPU  |  P2: Arrows, Num1 confirm, Up/Down CPU  |  ESC Back', BASE_W / 2, BASE_H - 8);
}

function renderStageSelect() {
  // Selected stage as full background
  const selStage = STAGES[STAGE_KEYS[state.stageCursor]];
  ctx.fillStyle = selStage.bg; ctx.fillRect(0, 0, BASE_W, BASE_H);
  // Render parallax for selected stage (fake camera at 0,0)
  const savedCam = { ...state.camera };
  state.camera = { x: 0, y: 100, zoom: 1 };
  renderParallaxBG(selStage);
  state.camera = savedCam;
  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, BASE_W, BASE_H);

  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT STAGE', BASE_W / 2, 50);

  const cellW = 220, cellH = 140, gap = 25;
  const totalW = STAGE_KEYS.length * (cellW + gap) - gap;
  const startX = (BASE_W - totalW) / 2;

  for (let i = 0; i < STAGE_KEYS.length; i++) {
    const stg = STAGES[STAGE_KEYS[i]];
    const x = startX + i * (cellW + gap), y = 110;
    const selected = state.stageCursor === i;

    // Card background with stage color
    ctx.fillStyle = stg.bg; ctx.fillRect(x, y, cellW, cellH);

    // Mini parallax preview
    ctx.save();
    ctx.beginPath(); ctx.rect(x, y, cellW, cellH); ctx.clip();
    const fakeCamera = state.camera;
    state.camera = { x: 0, y: 80, zoom: 0.5 };
    // Draw just stars for thumbnail
    for (const layer of (stg.bgLayers || [])) {
      if (layer.shapes === 'stars') {
        const seed = (layer.parallax || 0.1) * 1000;
        ctx.fillStyle = '#fff';
        for (let s = 0; s < 15; s++) {
          ctx.globalAlpha = 0.3;
          ctx.fillRect(x + (seed + s * 73) % cellW, y + (seed + s * 47) % cellH, 1, 1);
        }
        ctx.globalAlpha = 1;
      } else if (layer.shapes === 'sunset') {
        const grd = ctx.createLinearGradient(x, y, x, y + cellH);
        grd.addColorStop(0, '#1a0a2e'); grd.addColorStop(0.5, '#cc5533'); grd.addColorStop(1, '#ffaa44');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'torchglow') {
        const grd = ctx.createLinearGradient(x, y + cellH, x, y + cellH * 0.5);
        grd.addColorStop(0, 'rgba(180,80,20,0.2)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      } else if (layer.shapes === 'nebula') {
        const grd = ctx.createRadialGradient(x + cellW * 0.4, y + cellH * 0.4, 10, x + cellW * 0.4, y + cellH * 0.4, 80);
        grd.addColorStop(0, 'rgba(100,40,150,0.2)'); grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.fillRect(x, y, cellW, cellH);
      }
    }
    state.camera = fakeCamera;

    // Mini platforms
    for (const plat of stg.platforms) {
      const scale = 0.3;
      const px = x + cellW / 2 + plat.x * scale;
      const py = y + cellH / 2 + (plat.y - 100) * scale;
      ctx.fillStyle = plat.type === 'solid' ? '#777' : '#666';
      ctx.fillRect(px, py, plat.w * scale, Math.max(2, plat.h * scale));
    }
    ctx.restore();

    // Selection border
    if (selected) {
      const pulse = Math.sin(state.frameCount * 0.06) * 0.3 + 0.7;
      ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.globalAlpha = pulse;
      ctx.strokeRect(x - 4, y - 4, cellW + 8, cellH + 8);
      ctx.globalAlpha = 1;
      // Glow
      ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 15;
      ctx.strokeRect(x - 4, y - 4, cellW + 8, cellH + 8);
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cellW, cellH);
    }

    // Stage name
    ctx.fillStyle = selected ? '#fff' : '#aaa';
    ctx.font = `bold ${selected ? 16 : 14}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(stg.name, x + cellW / 2, y + cellH + 22);
  }

  // Navigation arrows
  ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(state.frameCount * 0.08) * 0.15})`;
  ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
  ctx.fillText('\u25C4', startX - 30, 110 + cellH / 2 + 10);
  ctx.fillText('\u25BA', startX + totalW + 30, 110 + cellH / 2 + 10);

  ctx.fillStyle = '#555'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('A/D or Arrows to select  |  J or Enter to confirm  |  ESC Back', BASE_W / 2, BASE_H - 20);
}

function renderModeSelect() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SELECT MODE', BASE_W / 2, 80);

  const modes = [
    { name: 'Stock Match', desc: '3 stocks, last one standing wins', key: 'stock' },
    { name: 'Time Match', desc: '3 minutes, most KOs wins', key: 'time' },
    { name: 'Training', desc: 'Practice mode with hitbox display', key: 'training' },
  ];

  for (let i = 0; i < modes.length; i++) {
    const y = 160 + i * 80;
    const selected = state.modeCursor === i;
    ctx.fillStyle = selected ? '#2a2a4e' : '#1a1a2e';
    ctx.fillRect(BASE_W / 2 - 200, y, 400, 60);
    if (selected) { ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2; ctx.strokeRect(BASE_W / 2 - 200, y, 400, 60); }
    ctx.fillStyle = selected ? '#fff' : '#888'; ctx.font = 'bold 18px monospace';
    ctx.fillText(modes[i].name, BASE_W / 2, y + 25);
    ctx.fillStyle = '#666'; ctx.font = '12px monospace';
    ctx.fillText(modes[i].desc, BASE_W / 2, y + 45);
  }

  ctx.fillStyle = '#666'; ctx.font = '13px monospace';
  ctx.fillText('W/S or Up/Down to select, J or Enter to confirm  |  ESC = Back', BASE_W / 2, BASE_H - 40);
}

function renderOptions() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#ff6600'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
  ctx.fillText('OPTIONS', BASE_W / 2, 60);

  const items = [
    { label: 'Volume', value: `${Math.round(options.volume * 100)}%` },
    { label: 'Show Hitboxes', value: options.showHitboxes ? 'ON' : 'OFF' },
    { label: 'Stage Hazards', value: options.hazardsOn ? 'ON' : 'OFF' },
  ];

  for (let i = 0; i < items.length; i++) {
    const y = 140 + i * 60;
    const selected = state.optionsCursor === i;
    ctx.fillStyle = selected ? '#2a2a4e' : '#1a1a2e';
    ctx.fillRect(BASE_W / 2 - 200, y, 400, 45);
    if (selected) { ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2; ctx.strokeRect(BASE_W / 2 - 200, y, 400, 45); }
    ctx.fillStyle = '#ccc'; ctx.font = '16px monospace'; ctx.textAlign = 'left';
    ctx.fillText(items[i].label, BASE_W / 2 - 180, y + 28);
    ctx.fillStyle = '#ff6600'; ctx.textAlign = 'right';
    ctx.fillText(items[i].value, BASE_W / 2 + 180, y + 28);
  }

  ctx.fillStyle = '#666'; ctx.font = '13px monospace'; ctx.textAlign = 'center';
  ctx.fillText('W/S to navigate, A/D to change, ESC to save & return', BASE_W / 2, BASE_H - 40);
}

function renderResults() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
  if (state.winner >= 0) {
    const w = state.players[state.winner];
    const color = w.useAltColor ? w.def.altColor : w.def.color;
    ctx.fillStyle = color;
    ctx.fillText(`${w.def.name} WINS!`, BASE_W / 2, BASE_H / 2 - 20);
  } else {
    ctx.fillStyle = '#ff8800';
    ctx.fillText('DRAW!', BASE_W / 2, BASE_H / 2 - 20);
  }
  ctx.fillStyle = '#aaa'; ctx.font = '18px monospace';
  ctx.fillText('ENTER = Rematch  |  ESC = Title', BASE_W / 2, BASE_H / 2 + 40);

  // Confetti
  if (!state.confettiSpawned) { spawnConfetti(); state.confettiSpawned = true; }
}

function renderPaused() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PAUSED', BASE_W / 2, BASE_H / 2);
  ctx.font = '16px monospace';
  ctx.fillText('P to resume  |  ESC for title', BASE_W / 2, BASE_H / 2 + 30);
}

function render() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  switch (state.mode) {
    case 'title': renderTitle(); return;
    case 'charselect': renderCharSelect(); return;
    case 'stageselect': renderStageSelect(); return;
    case 'modeselect': renderModeSelect(); return;
    case 'options': renderOptions(); return;
    case 'results':
      renderStage(); renderPlatforms();
      for (const p of state.players) renderPlayer(p);
      renderParticles(); renderDamageNumbers(); renderHUD();
      renderResults(); return;
  }

  // Playing / paused / training
  renderStage(); renderPlatforms();
  for (const p of state.players) renderPlayer(p);
  renderParticles(); renderDamageNumbers(); renderHUD();
  if (state.mode === 'paused') renderPaused();
}

// --- Match Start ---
function startMatch() {
  const stageKey = state.selectedStage || 'battlefield';
  currentStage = STAGES[stageKey];
  // Reset moving platform state
  for (const plat of currentStage.platforms) {
    if (plat.moving) { plat._baseX = plat.x; plat._baseY = plat.y; plat._moveTimer = 0; plat._deltaX = 0; }
  }

  const p1Key = state.p1Fighter || 'knight';
  const p2Key = state.p2Fighter || 'striker';
  const c1 = state.charSelectCursors[0];
  const c2 = state.charSelectCursors[1];
  const mirror = p1Key === p2Key;

  state.players = [
    createPlayer(0, p1Key, currentStage.spawns[0], c1.cpu ? 'cpu' : 'human', c1.cpuLevel, false),
    createPlayer(1, p2Key, currentStage.spawns[1], c2.cpu ? 'cpu' : 'human', c2.cpuLevel, mirror),
  ];

  // Auto-assign gamepads
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let padIdx = 0;
  for (const p of state.players) {
    if (p.controlType === 'human' && pads[padIdx]) { p.gamepadIndex = padIdx; padIdx++; }
  }

  state.hitstopFrames = 0;
  state.screenShake = { x: 0, y: 0, intensity: 0 };
  state.camera = { x: 0, y: 100, zoom: 1 };
  state.winner = -1; state.frameCount = 0;
  state.damageNumbers = [];
  state.slowMo = 1; state.slowMoTimer = 0; state.slowMoTarget = null;
  state.confettiSpawned = false;
  state.hazardsOn = options.hazardsOn;
  state.timeRemaining = 180;
  particlePool.forEach(p => p.active = false);
  initAudio();

  state.mode = state.matchType === 'training' ? 'training' : 'playing';
}

// --- Menu Navigation ---
function handleCharSelectInput() {
  const p1b = getP1Binds(), p2b = getP2Binds();
  const c1 = state.charSelectCursors[0], c2 = state.charSelectCursors[1];

  // P1 navigation
  if (!c1.confirmed) {
    if (justPressed[p1b.right]) { c1.pos = (c1.pos + 1) % FIGHTER_KEYS.length; playSound('select'); }
    if (justPressed[p1b.left]) { c1.pos = (c1.pos - 1 + FIGHTER_KEYS.length) % FIGHTER_KEYS.length; playSound('select'); }
    if (justPressed[p1b.up]) { c1.cpu = !c1.cpu; playSound('select'); }
    if (justPressed[p1b.down]) { if (c1.cpu) { c1.cpuLevel = c1.cpuLevel === 1 ? 3 : c1.cpuLevel === 3 ? 5 : 1; playSound('select'); } }
    if (justPressed[p1b.attack] || (p1b.attack2 && justPressed[p1b.attack2])) { c1.confirmed = true; playSound('select'); }
  }

  // P2 navigation
  if (!c2.confirmed) {
    if (justPressed[p2b.right]) { c2.pos = (c2.pos + 1) % FIGHTER_KEYS.length; playSound('select'); }
    if (justPressed[p2b.left]) { c2.pos = (c2.pos - 1 + FIGHTER_KEYS.length) % FIGHTER_KEYS.length; playSound('select'); }
    if (justPressed[p2b.up]) { c2.cpu = !c2.cpu; playSound('select'); }
    if (justPressed[p2b.down]) { if (c2.cpu) { c2.cpuLevel = c2.cpuLevel === 1 ? 3 : c2.cpuLevel === 3 ? 5 : 1; playSound('select'); } }
    if (justPressed[p2b.attack]) { c2.confirmed = true; playSound('select'); }
  }

  // Enter confirms both
  if (justPressed['Enter']) {
    if (!c1.confirmed) c1.confirmed = true;
    if (!c2.confirmed) c2.confirmed = true;
    playSound('select');
  }

  if (c1.confirmed && c2.confirmed) {
    state.p1Fighter = FIGHTER_KEYS[c1.pos];
    state.p2Fighter = FIGHTER_KEYS[c2.pos];
    state.mode = 'stageselect';
    c1.confirmed = false; c2.confirmed = false;
  }
}

function handleStageSelectInput() {
  if (justPressed['KeyA'] || justPressed['KeyD'] || justPressed['ArrowLeft'] || justPressed['ArrowRight']) {
    const dir = (justPressed['KeyD'] || justPressed['ArrowRight']) ? 1 : -1;
    state.stageCursor = (state.stageCursor + dir + STAGE_KEYS.length) % STAGE_KEYS.length;
    playSound('select');
  }
  if (justPressed['KeyJ'] || justPressed['Enter'] || justPressed['Space'] || justPressed['Numpad1']) {
    state.selectedStage = STAGE_KEYS[state.stageCursor];
    state.mode = 'modeselect';
    playSound('select');
  }
}

function handleModeSelectInput() {
  if (justPressed['KeyW'] || justPressed['ArrowUp']) { state.modeCursor = (state.modeCursor - 1 + 3) % 3; playSound('select'); }
  if (justPressed['KeyS'] || justPressed['ArrowDown']) { state.modeCursor = (state.modeCursor + 1) % 3; playSound('select'); }
  if (justPressed['KeyJ'] || justPressed['Enter'] || justPressed['Space'] || justPressed['Numpad1']) {
    state.matchType = ['stock', 'time', 'training'][state.modeCursor];
    startMatch();
    playSound('select');
  }
}

function handleOptionsInput() {
  if (justPressed['KeyW'] || justPressed['ArrowUp']) { state.optionsCursor = Math.max(0, state.optionsCursor - 1); playSound('select'); }
  if (justPressed['KeyS'] || justPressed['ArrowDown']) { state.optionsCursor = Math.min(2, state.optionsCursor + 1); playSound('select'); }
  const left = justPressed['KeyA'] || justPressed['ArrowLeft'];
  const right = justPressed['KeyD'] || justPressed['ArrowRight'];
  if (left || right) {
    const d = right ? 1 : -1;
    if (state.optionsCursor === 0) options.volume = Math.max(0, Math.min(1, options.volume + d * 0.1));
    if (state.optionsCursor === 1) options.showHitboxes = !options.showHitboxes;
    if (state.optionsCursor === 2) options.hazardsOn = !options.hazardsOn;
    playSound('select');
  }
}

// --- Global Key Handlers ---
document.addEventListener('keydown', e => {
  if (state.mode === 'title') {
    if (e.code === 'Enter' || e.code === 'Space') { state.mode = 'charselect'; initAudio(); }
    if (e.code === 'KeyO') { state.mode = 'options'; }
  } else if (state.mode === 'results') {
    if (e.code === 'Enter' || e.code === 'Space') startMatch();
    if (e.code === 'Escape') state.mode = 'title';
  } else if (state.mode === 'playing' || state.mode === 'training') {
    if (e.code === 'KeyP') state.mode = state.mode === 'playing' ? 'paused' : state.mode;
    if (e.code === 'Escape') state.mode = 'title';
    // Training mode keys
    if (state.matchType === 'training') {
      if (e.code === 'KeyH') options.showHitboxes = !options.showHitboxes;
      if (e.code === 'KeyR') { for (const p of state.players) p.damage = 0; }
    }
  } else if (state.mode === 'paused') {
    if (e.code === 'KeyP') state.mode = 'playing';
    if (e.code === 'Escape') state.mode = 'title';
  } else if (state.mode === 'charselect' || state.mode === 'stageselect' || state.mode === 'modeselect') {
    if (e.code === 'Escape') {
      if (state.mode === 'modeselect') state.mode = 'stageselect';
      else if (state.mode === 'stageselect') state.mode = 'charselect';
      else state.mode = 'title';
    }
  } else if (state.mode === 'options') {
    if (e.code === 'Escape') { saveOptions(); state.mode = 'title'; }
  }

  if (e.code === 'KeyF') {
    if (!document.fullscreenElement) canvas.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  }
});

document.addEventListener('fullscreenchange', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

// --- Game Loop ---
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  accumulator += dt;

  // Process menu inputs (uses justPressed)
  if (state.mode === 'charselect') handleCharSelectInput();
  else if (state.mode === 'stageselect') handleStageSelectInput();
  else if (state.mode === 'modeselect') handleModeSelectInput();
  else if (state.mode === 'options') handleOptionsInput();

  // Clear justPressed after processing
  for (const k in justPressed) delete justPressed[k];

  while (accumulator >= FIXED_STEP) {
    update(FIXED_STEP);
    accumulator -= FIXED_STEP;
  }

  // Update particles even on results (for confetti)
  if (state.mode === 'results') updateParticles(dt);

  render();
  requestAnimationFrame(gameLoop);
}

// --- Playwright APIs ---
window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (let i = 0; i < steps; i++) update(FIXED_STEP);
  render();
};

window.render_game_to_text = function () {
  return JSON.stringify({
    mode: state.mode,
    frame: state.frameCount,
    matchType: state.matchType,
    stage: state.selectedStage,
    timeRemaining: state.matchType === 'time' ? Math.round(state.timeRemaining) : undefined,
    players: state.players.map(p => ({
      idx: p.idx, fighter: p.fighterKey,
      x: Math.round(p.x), y: Math.round(p.y),
      vx: Math.round(p.vx), vy: Math.round(p.vy),
      state: p.state, damage: Math.round(p.damage),
      stocks: p.stocks, score: p.score,
      facing: p.facing, grounded: p.grounded,
      shieldHP: Math.round(p.shieldHP), invincible: p.invincible,
      controlType: p.controlType, cpuLevel: p.cpuLevel,
      grabTarget: p.grabTarget,
    })),
    hitstop: state.hitstopFrames,
    camera: { x: Math.round(state.camera.x), y: Math.round(state.camera.y), zoom: +state.camera.zoom.toFixed(2) },
    winner: state.winner,
    slowMo: state.slowMo !== 1 ? state.slowMo : undefined,
    activeParticles: particlePool.filter(p => p.active).length,
    damageNumbers: state.damageNumbers.length,
    coordSystem: '+x right, +y down, origin at stage center',
  });
};

// --- Init ---
resizeCanvas();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
